[workspace]
resolver = "2"
members = [
    "crates/core",
    "crates/cli",
    "crates/mcp",
]

[workspace.package]
version = "0.4.18"
edition = "2021"
license = "MIT"
authors = ["Hugh Cameron"]
repository = "https://github.com/meridian-online/orbit"
homepage = "https://meridian.online/projects/orbit/"
description = "orbit-state — files-canonical agent substrate (Rust + SQLite + MCP)"

[workspace.dependencies]
# Schema + serialisation
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1.0"

# Storage
rusqlite = { version = "0.31", features = ["bundled"] }

# Errors
thiserror = "1.0"
anyhow = "1.0"

# CLI
clap = { version = "4.5", features = ["derive"] }

# Async + MCP (added when needed)
tokio = { version = "1.40", features = ["rt-multi-thread", "macros", "io-std"] }

# Timestamps — RFC 3339 / ISO-8601 formatting for substrate-written events.
time = { version = "0.3", features = ["formatting", "macros"] }

# Session ids — UUIDv4 generated by `session.start`.
uuid = { version = "1", features = ["v4"] }

# Word-boundary regex matching for spec.close's topology_warnings heuristic
# (spec 2026-05-18-topology-substrate-wires ac-03). Subsystem names are
# passed through regex::escape before \b...\b interpolation.
regex = "1.10"

# Test utilities
tempfile = "3.10"

# Internal crates
orbit-state-core = { path = "crates/core" }

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
