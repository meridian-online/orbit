key: four-pillars
body: 'Four pillars are the load-bearing user outcomes orbit exists to deliver: (1) executive-level interaction — agents pay the compression cost; (2) agent self-learning — Hermes-style memory and skill growth across sessions; (3) agent state-persistence — durable state keeps agents on track, the author won''t read most of it; (4) long-running R&D — full session of work before check-in, start/stop kills progress. Every card must cite at least one. Memo: .orbit/memos/2026-05-08-four-pillars.md.'
