key: claude-code-at-import-fork-behaviour
body: 'Verdict 2026-05-08 (corrected): @filepath imports in CLAUDE.md DO resolve in subagent forks at session start. Empirical fresh-session test today: forked general-purpose agent recalled a STYLE.md-only sentence (''Address the reader as a peer who reads fast and decides faster'') and distinguished STYLE.md''s ''## Tone contract'' heading from CLAUDE.md''s ''### Tone'' heading — both verbatim, no tools. The ''@'' resolves into the cache snapshot loaded at session start. Caveat that still holds: mid-session edits to CLAUDE.md or to imported files do NOT propagate to forks within the same session — the fork inherits the session-start snapshot. Implication: same-session subagent recall is not a valid verification mechanism for a CLAUDE.md or @-imported edit; spot-checks need a fresh session. The inline STYLE.md duplication at CLAUDE.md:9-42 was dropped after this verification.'
