key: feedback-card-vs-choice-distinction
body: 'Implementation-shape decisions (''should X live in bash or rust?'', ''should this be MCP-native or shell-out?'', ''tiered review vs progressive review'') are CHOICES (MADR records under .orbit/choices/), not CARDS. Cards describe capabilities the product provides in user language; the capability already exists, the question is HOW it is realised — that is architectural, which means choice. Why: I (Claude, 2026-05-09) suggested ''file a card for orbit spec promote in rust'' as the follow-up to porting promote.sh; Hugh corrected — that is a choice about implementation surface, not a new capability. He noted this misclassification is consistent across agents, which means the substrate''s signal is too weak. How to apply: when a user asks to ''make a card for X'', first ask ''is X a NEW capability the product provides, or a decision about HOW an existing capability is implemented?'' If the latter, route to /orb:choice (or a new spec citing the choice). The CLAUDE.md vocabulary section names choice but the decision tree at the bottom only covers card/spec/memo — extending it to add the choice branch is the durable fix.'
