id: 2026-05-09-orbit-method-md
goal: Create canonical .orbit/METHOD.md (vocabulary, pipeline, substrate rules, four pillars, BLUF/Decision Brief skeleton, card-vs-choice discrimination) and wire /orb:setup to copy it into projects + append @.orbit/METHOD.md to CLAUDE.md; audit the existing Mandatory Workflow / Session Completion section so rules are either substrate-baked into METHOD.md or sharpened to project-specific git discipline. Pillar attribution — pillar 2 (agent self-learning), since the substrate teaches new agents how to use it.
cards:
- 0017-setup-is-bead-aware
status: open
labels:
- spec
- setup
- vocabulary
acceptance_criteria:
- id: ac-01
  description: 'A canonical METHOD.md template lands at `plugins/orb/skills/setup/METHOD.md` — the source of truth that /orb:setup copies into projects. Content covers (in this order): one-line ''what orbit is''; the orbit pipeline (memo → distill → card → design → spec → implement → review-pr; rally / drive variants); the artefact vocabulary table (card / spec / choice / memo / interview / progress / review / drive state / rally state) with paths and one-line definitions; the card-vs-choice-vs-spec-vs-memo decision tree (including the new card-vs-choice discrimination from spec 2026-05-09-card-vs-choice-discrimination); substrate rules (orbit verbs not TodoWrite, `orbit session prime` at session start, `orbit memory remember` not MEMORY.md); the four pillars (compressed to single-screen, mirroring CLAUDE.md); and the BLUF / Decision Brief skeleton **inlined directly** (TL;DR / Recommendation / Why / Detail / Confidence) so downstream projects without `.orbit/STYLE.md` get the prose contract too — no dangling pointer at STYLE.md. Single screen target — if it overflows, the artefact vocabulary table is the trimmable section (defer extended definitions to a glossary doc), not the four pillars or substrate rules.'
  gate: true
  checked: true
- id: ac-02
  description: 'METHOD.md carries a top-of-file ''How to update'' line: ''This file is generated by /orb:setup from plugins/orb/skills/setup/METHOD.md. To customise per-project, edit in place; to refresh from canonical, re-run /orb:setup (which prompts before overwriting local edits).'' This makes the relationship between the canonical template and the project copy legible. The line is part of the canonical template — it participates in byte-for-byte comparisons (ac-03c, ac-07).'
  gate: false
  checked: true
- id: ac-03
  description: '/orb:setup SKILL.md §6 is rewritten end-to-end. The current "Snippet to append" inline markdown block (currently embedded in SKILL.md at §6 plus the Case A/B/C migration logic) is removed; METHOD.md is the single source of truth. The rewritten §6 performs, **in this order** (legacy detection runs BEFORE any file is written so a refused migration leaves no orphan METHOD.md): (a) **legacy-CLAUDE.md detection** — scan CLAUDE.md for the legacy markers `## Workflow (orbit)`, `## Orbit vocabulary`, `## Current Sprint` (anywhere in the file). If any are present, prompt to remove them in a single atomic transaction together with the @-import addition. **Decline → REFUSE the entire setup operation** (no METHOD.md copy, no @-import). Exit with one-line message naming the recovery command (e.g. ''re-run /orb:setup once you have removed the legacy blocks, or accept the migration prompt''); (b) copy `plugins/orb/skills/setup/METHOD.md` to `.orbit/METHOD.md` in the project; (c) ensure the project''s CLAUDE.md contains an `@.orbit/METHOD.md` line — idempotent: if the line is already present anywhere in the file, no-op; otherwise append it on its own line at end-of-file with a single blank line above (matching the existing `@.orbit/STYLE.md` shape in orbit-repo CLAUDE.md — **no marker heading**); (d) on subsequent re-runs, compare the project''s `.orbit/METHOD.md` to the canonical via **byte-for-byte equality of the entire file including the ''How to update'' line** (no whitespace tolerance, no hash-only check) and prompt before overwriting if they differ.'
  gate: true
  checked: true
- id: ac-04
  description: 'Card 0017 is amended to reflect the new richer priming. Specifically: the "Greenfield setup creates .orbit/ layout..." scenario''s `then` clause is updated from "writes the CLAUDE.md vocabulary block" to "writes `.orbit/METHOD.md` and ensures CLAUDE.md @-imports it". A new scenario is added for the idempotency / drift-detection behaviour described in ac-03(d). A second new scenario covers ac-03(a) atomic legacy-CLAUDE.md migration (decline path refuses the entire setup operation). Pillar attribution: a `relations:feeds` entry pointing at card 0028 (four pillars) is added with reason naming pillar 2 (agent self-learning). No separate top-level `pillars:` shorthand field is added — the relations:feeds edge IS the canonical attribution per card 0028''s pattern (relations are the structural wire). The card stays maturity:planned until the spec ships.'
  gate: true
  checked: true
- id: ac-05
  description: '**This is the AC that performs the edits to orbit-repo CLAUDE.md** — ac-06 produces the audit verdict (a spec note classifying each Session Completion rule), ac-05 is the AC that lands the edits. The orbit repo dogfoods its own setup output: the orbit-repo CLAUDE.md is rewritten to use the @-import pattern. Sections that move to METHOD.md (substrate-shaped — vocabulary, decision tree, pipeline, substrate rules, four pillars, key concepts) are deleted from CLAUDE.md and replaced by `@.orbit/METHOD.md`. The Session Completion section is reshaped per ac-06''s audit verdict (delete substrate-shaped rules, keep project-specific git discipline as a 1-3 line block, delete stale process). The existing `@.orbit/STYLE.md` import **stays alongside** `@.orbit/METHOD.md` — STYLE.md is the BLUF prose contract''s expanded form (governed by card 0026, project-shaped) and the orbit repo retains the richer version; downstream projects get only the BLUF skeleton inlined in METHOD.md (per ac-01). Sections that stay inline in orbit-repo CLAUDE.md (repo-specific): the ''# orbit'' intro paragraph, ''Working in This Repo'' (skill paths etc.), ''Deployment'', and the audit-survivor of ''Session Completion''.'
  gate: true
  checked: true
- id: ac-06
  description: '**This AC produces the audit verdict only — it does NOT edit any file.** ac-05 consumes the verdict and lands the actual CLAUDE.md edits. The existing orbit-repo CLAUDE.md ''Session Completion'' / ''Mandatory Workflow'' section is audited rule-by-rule. Each rule is classified into one of: (i) **substrate-shaped, baked into orbit verbs** (e.g. "File tasks for remaining work" is `orbit task open`; "Update task status" is `orbit task done`) — to be deleted from CLAUDE.md by ac-05, summarised in METHOD.md''s substrate-rules section by ac-01; (ii) **project-specific git/CI discipline** (e.g. "git push is mandatory") — to be kept by ac-05 as a tight 1-3 line block in orbit-repo CLAUDE.md only; (iii) **stale orbit-era process** — to be deleted by ac-05. The audit verdict is recorded via `orbit spec note 2026-05-09-orbit-method-md "<audit verdict — rule-by-rule classification>"`. ac-05 reads this note and lands the corresponding edits.'
  gate: true
  checked: true
- id: ac-07
  description: 'A smoke test under `plugins/orb/scripts/tests/` runs /orb:setup-equivalent steps against synthetic projects under a temp directory. Three scenarios labelled (1)/(2)/(3) at the outer level, with sub-asserts labelled t1/t2/t3 inside each (deliberately distinct from ac-03''s a/b/c/d sub-step labels to avoid cross-AC label collision): (1) **fresh project (non-interactive)** — empty CLAUDE.md, no .orbit/METHOD.md. t1: `.orbit/METHOD.md` is created with content matching the canonical template under **byte-for-byte equality of the entire file** (same primitive as ac-03d); t2: `CLAUDE.md` contains exactly one `@.orbit/METHOD.md` line after first run; t3: re-running is idempotent — no duplicate import line, no METHOD.md content drift, no prompt fired. (2) **drift-prompt firing (assertion-only, no interaction)** — modify the project''s `.orbit/METHOD.md`, re-run setup. t1: the drift prompt fires (test confirms the prompt path exists; does NOT supply an answer — exits when the prompt would block on stdin). (3) **legacy migration (scripted answers)** — CLAUDE.md contains the legacy `## Workflow (orbit)` / `## Orbit vocabulary` / `## Current Sprint` blocks, no `.orbit/METHOD.md` exists. Two sub-cases: t1 script answers `y` → asserts legacy blocks removed AND `.orbit/METHOD.md` created AND @-import added; t2 script answers `n` → asserts legacy blocks intact AND no `.orbit/METHOD.md` created AND @-import NOT added (atomic refuse), with the recovery message on stderr.'
  gate: false
  checked: true
- id: ac-08
  description: 'The load-bearing principle uncovered by this work is recorded via `orbit spec note 2026-05-09-orbit-method-md "<principle body>"`: orbit-shaped rules (substrate vocabulary, pipeline shape, BLUF prose skeleton, agent-self-learning patterns, state-persistence rules) belong in METHOD.md (the substrate distillation downstream projects @-import); project-specific repo discipline (git push, CI gates, branch naming, CLAUDE.md repo intro, expanded STYLE.md if any) stays in project CLAUDE.md. This is the discrimination rule for "what goes in METHOD.md vs project CLAUDE.md" so future audits don''t re-derive it. The note lands before the implementation finishes (so future readers of the spec can reach the rationale through the spec''s notes stream, not just the closed PR).'
  gate: false
  checked: true
- id: ac-09
  description: 'Implementation order is declared explicitly so `/orb:implement` does not claim ACs in a sequence that produces dangling @-imports or stale state. Ownership seam between ac-06 and ac-05 is pinned: ac-06 produces a spec-note audit verdict (no file edits), ac-05 reads the verdict and lands ALL edits to orbit-repo CLAUDE.md (replacing substrate sections AND reshaping the Session Completion section per the verdict). Required order: ac-01 (canonical METHOD.md template, with inlined BLUF skeleton — no STYLE.md dependency) → ac-02 (top-of-file ''How to update'' line, since it participates in byte comparisons) → ac-03 (rewrite /orb:setup §6 with atomic legacy-migration semantics) → ac-06 (Session Completion audit verdict written as spec note — no file edits) → ac-05 (dogfood orbit-repo CLAUDE.md edits, consuming ac-06''s verdict) → ac-04 (card 0017 scenario amendment + pillar 2 attribution, naming the post-rewrite shape) → ac-07 (smoke test, exercises the full /orb:setup) → ac-08 (principle note, captured before close).'
  gate: true
  checked: true
