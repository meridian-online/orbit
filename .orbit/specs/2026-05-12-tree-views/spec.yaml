id: 2026-05-12-tree-views
goal: Ship navigation and synthesis verbs that make the existing orbit substrate readable as a tree of knowledge — card.tree, card.specs reverse-lookup, overview, graph render, drift audit — read-only, file-walking, no new tables
cards:
- 0033-see-the-tree
- 0030-canonical-schema-and-glossary
status: closed
labels:
- spec
acceptance_criteria:
- id: ac-01
  description: '`orbit card tree <id>` returns the local subgraph from a card — outgoing and incoming `relations:` edges to depth N (default 2), rendered as nested text or `--json`. Walks files; resolves card slugs via the existing prefix-match. Cycle-safe.'
  gate: true
  checked: true
- id: ac-02
  description: '`orbit card specs <id>` lists the specs advancing a card — dereferences the card''s `specs:` array AND cross-checks against each spec''s `cards:` array, surfacing any one-way drift (card claims a spec the spec doesn''t back-reference, or vice versa).'
  gate: false
  checked: true
- id: ac-03
  description: '`orbit overview` produces a single-screen synthesis bounded by the same shape as `session prime`: open spec count + last K=10 spec ids by id (with `+N more` suffix when count exceeds K), cards-by-maturity counts (planned / emerging / established), recent memories (last K=10), most-connected card (degree = outgoing `relations:` count + incoming `relations:` references from other cards; `specs:` array entries do NOT count toward connectivity; ties resolved by lowest numeric card id), and orphans (cards with `specs: []` AND zero incoming `relations:` from any other card).'
  gate: true
  checked: true
- id: ac-04
  description: '`orbit graph` emits a mermaid (default) or graphviz rendering of the cards-choices-specs graph to stdout — pasteable into markdown or a renderer. No file-write side-effect. Supported flags: `--card <id>` (scope to one card and its neighbourhood), `--depth <N>` (default 2, applies only with `--card`), `--format <mermaid|graphviz>` (default mermaid). Other filters are out of scope for this spec. The unscoped default render (no `--card`) is permitted to exceed single-screen — it serves the share-or-paste use case, not the synthesis use case; the bounded contract applies to `overview`, not `graph`.'
  gate: false
  checked: true
- id: ac-05
  description: '`orbit audit drift` performs a permissive YAML scan over `.orbit/cards/`, `.orbit/specs/`, `.orbit/choices/`, and `.orbit/memories/`, comparing each top-level field against a canonical field set declared as `const FIELDS: &[&str]` per struct (`Card::FIELDS`, `Spec::FIELDS`, `Choice::FIELDS`, `Memory::FIELDS` in `orbit-state/crates/core/src/schema.rs`), with a unit test per struct asserting the constant matches its serde representation so the audit field set cannot silently drift from the struct definition. For each unknown field, reports file path, field name, and a proposed disposition (map / drop / quarantine — matching card 0032''s vocabulary). Differs from `orbit verify`: permissive (does not bail at first parse failure) and surfaces pre-canonical content like brownfield legacy files; read-only, no rewrites.'
  gate: false
  checked: true
- id: ac-06
  description: 'All new verbs are read-only and walk files — they do NOT consult `state.db`. Each verb ships on both CLI and MCP surfaces calling the same Rust core, with the canonical `<verb>: <category>: <sentence>` error format. Parity tests in `orbit-state/crates/cli/tests/parity.rs` and `orbit-state/crates/mcp/tests/parity.rs` cover each new verb''s `--json` envelope. SQLite remains a verify-only correctness fixture until a query verb explicitly justifies promoting it.'
  gate: true
  checked: true
- id: ac-07
  description: Surfacing wired into the agent path — `session prime` output references `orbit overview` so a fresh session reaches the synthesis layer in one step (this is the load-bearing wire). At least one author-facing SKILL.md additionally names the navigation verbs where browsing the tree is the genuine next move; candidates are `/orb:card` (after `card show`, suggest `card tree`) and `/orb:distill` (before authoring a new card, suggest checking the existing tree for adjacent capabilities). Without these wires the verbs exist but nobody reaches for them.
  gate: true
  checked: true
- id: ac-08
  description: 'Structured error envelopes — each new verb emits the canonical `<verb>: <category>: <sentence>` error envelope (matching `orbit card show <unknown-id>` today) for at least three error paths: (a) unknown id lookup, (b) broken referenced file (e.g. a card''s `specs:` entry points to a missing file), (c) malformed YAML encountered during a walk. One parity-tested case per path per verb where applicable.'
  gate: true
  checked: true
