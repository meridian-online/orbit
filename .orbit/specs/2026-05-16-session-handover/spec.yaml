id: 2026-05-16-session-handover
goal: 'Per-card session handover lands on top of the agent-learning-loop infrastructure shipped 2026-05-15 and the AC-taxonomy schema bump shipped 2026-05-16: `Session` entity gains an optional `card_id` field (the `Session` struct in `orbit-state/crates/core/src/schema.rs`), schema-version bumps 0.3 â†’ 0.4 (additive no-op migration on the same chain as the 0.1 â†’ 0.2 â†’ 0.3 precedents in `migrations.rs`), `orbit session distill` accepts `--card <id>` (CLI) / `card_id: Option<String>` (MCP) and falls back to reading `.orbit/.session-card` when neither is passed; a new `orbit session set-card <id>` CLI + MCP verb writes that file atomically and validates the id via the existing card-lookup helper; `orbit session distill` learns to extract `last_assistant_message` from a Claude Code Stop-hook JSON envelope on stdin (keeping plain-text stdin verbatim for non-hook invocations) â€” this is the load-bearing fix for the carrier currently dumping raw JSON into `Session.distillate`; a new `orbit session handover [--card <id>] [--since <iso>]` CLI + MCP verb returns the most-recent matching Session; `orbit session prime`''s envelope gains a `handover` field carrying the most-recent Session across all cards (per-card lookup is via the explicit verb, not prime â€” v1 surfaces the global latest); `.claude/settings.json`''s Stop hook updates so both `.session-id` and `.session-card` are deleted after distill; a new MADR at `.orbit/choices/0024-handover-register-is-discursive.yaml` records the deliberate divergence from STYLE.md''s BLUF discipline because audience and purpose differ â€” the handover is reading-for-orientation prose written for the next agent, not a decision brief written for Hugh; a new convention at `.orbit/conventions/session-handover.md` codifies the agent-facing discipline (call set-card early, write a discursive reflection covering what was tried + what worked + what didn''t + where to pick up); end-to-end smoke against the released brew binary verifies the handover round-trips through Stop hook â†’ Session.yaml â†’ next session prime. Intent contract: see the user-voice paragraph at `.orbit/specs/2026-05-16-session-handover/interview.md`.'
cards:
- 0036-session-handover
status: open
labels:
- spec
acceptance_criteria:
- id: ac-01
  description: '`Session` entity gains an optional `card_id` field. In `orbit-state/crates/core/src/schema.rs` at the `Session` struct definition, add `pub card_id: Option<String>` with `#[serde(default, skip_serializing_if = "Option::is_none")]` so existing on-disk Session files (which have no `card_id` key) deserialise cleanly and so writing a session without a card_id stays byte-identical to today''s output. Update `Session::FIELDS` const (locate via `grep -n "Session::FIELDS" orbit-state/crates/core/src/schema.rs`) to include `"card_id"` in declaration order matching the struct (id, started_at, ended_at, distillate, card_id, labels). The existing `deny_unknown_fields` attribute on the struct stays â€” the new field is now known. The `session_fields_matches_struct` unit test colocated with the FIELDS-drift tests continues to assert against the updated FIELDS const.'
  gate: true
  checked: false
  verification: '`cargo test --manifest-path orbit-state/Cargo.toml session_fields_matches_struct` passes. New unit tests: `session_round_trips_with_card_id` (constructs Session with `card_id: Some("0036-session-handover".into())`, serialises to YAML, parses back, asserts byte-identical and value-equal); `session_card_id_omitted_when_none` (asserts a Session with `card_id: None` serialises to YAML that contains no `card_id:` line â€” verifies the `skip_serializing_if` is wired); `session_legacy_yaml_parses_with_none_card_id` (parses an existing-shape YAML blob without a `card_id:` line, asserts the deserialised value has `card_id: None`).'
- id: ac-02
  description: 'Schema-version bumps 0.3 â†’ 0.4 with an additive no-op migration. `CURRENT_SCHEMA_VERSION` in `orbit-state/crates/core/src/migrations.rs` bumps from `"0.3"` to `"0.4"` (note: 0.3 was set today by spec `2026-05-16-ac-taxonomy` ac-03 which landed the `migrate_time_gated_to_ac_type` step; this spec extends the chain rather than colliding with it). A new migration step `("0.3", "0.4", migrate_add_card_id_to_session)` registers in `registry()` immediately after the existing 0.2 â†’ 0.3 entry. The migration function is a structural no-op â€” the new `card_id` field is `Option<String>` with `#[serde(default)]`, so existing Session YAML files do not need to be rewritten to remain parseable under the new schema. The function only bumps the `.orbit/schema-version` file from `"0.3"` to `"0.4"` and returns success; no Session files are touched, no spec files are touched. The existing 0.1 â†’ 0.2 and 0.2 â†’ 0.3 chain stays unchanged (regression). Idempotent: re-running on a 0.4 tree is a no-op. Unknown-version error path stays the same (any version other than 0.1/0.2/0.3/0.4 â†’ `Error::malformed`). This mirrors the migration discipline of the 0.2 â†’ 0.3 step from spec 2026-05-16-ac-taxonomy ac-03 (which itself mirrored the 0.1 â†’ 0.2 step from spec 2026-05-15-agent-learning-loop ac-02).'
  gate: true
  checked: false
  verification: 'Unit tests in `migrations.rs`: `migrate_0_3_to_0_4_writes_new_version_and_leaves_files_untouched` (fixture at 0.3 with one Session yaml; run migration; assert `schema-version` is now 0.4 and the Session yaml byte-content is unchanged); `migrate_already_at_0_4_is_noop` (fixture at 0.4; assert zero files changed); `migrate_unknown_version_is_malformed` (regression â€” fixture with bogus version returns `Error::malformed`); `migrate_0_1_to_0_4_chains_through_0_2_and_0_3` (fixture at 0.1; run migration; assert version flips to 0.4 and all three steps â€” 0.1â†’0.2, 0.2â†’0.3, 0.3â†’0.4 â€” fire in order); `migrate_0_2_to_0_4_runs_remaining_steps` (fixture at 0.2; assert both 0.2â†’0.3 and 0.3â†’0.4 fire â€” the ac-taxonomy time_gated migration still runs even though this spec lands after it). All existing migration tests from prior specs continue to pass unchanged.'
- id: ac-03
  description: '`orbit session distill` accepts a card_id. CLI: a new `--card <id>` flag, optional. MCP: `SessionDistillArgs` (the existing args struct backing `orbit session distill` per spec 2026-05-15-agent-learning-loop ac-05) gains a `card_id: Option<String>` field with `#[serde(default, skip_serializing_if = "Option::is_none")]`. Resolution precedence inside the verb: explicit arg first (CLI `--card` flag or MCP `card_id` field); else fall back to reading `.orbit/.session-card` (a single-line file written by `orbit session set-card` â€” ac-04); else `None`. The resolved value is written to the Session''s `card_id` field. The card-id value is NOT validated against the card-lookup helper at distill time â€” validation lives at set-card time (ac-04) so the hot path stays cheap and the failure surfaces early in the session. Idempotency rule: subsequent distill calls on the same session_id overwrite `card_id` along with `distillate` and `ended_at` (matches the existing distill idempotency contract â€” latest write wins for everything except `started_at`, which is preserved).'
  gate: false
  checked: false
  verification: 'New tests: `cli_distill_with_card_flag_writes_card_id` (CLI invocation with `--card 0036-session-handover` produces a Session yaml with that card_id); `mcp_distill_with_card_arg_writes_card_id` (MCP equivalent on `SessionDistillArgs`); `distill_reads_session_card_file_when_no_flag` (writes `.orbit/.session-card` containing a slug, invokes distill without `--card`, asserts the slug lands in the Session''s card_id); `distill_explicit_flag_overrides_session_card_file` (writes both; asserts the flag wins); `distill_card_id_none_when_neither_source` (no flag, no file; asserts the Session''s card_id is None and the yaml omits the key); `distill_subsequent_call_overwrites_card_id` (first call with `--card A`, second with `--card B` on the same session_id; asserts B persists, `started_at` is preserved). CLI + MCP parity test added at `orbit-state/crates/cli/tests/parity.rs` and `orbit-state/crates/mcp/tests/parity.rs`.'
- id: ac-04
  description: '`orbit session set-card <id>` CLI + MCP verb writes `.orbit/.session-card`. Behaviour: takes a positional `<id>` arg (CLI) or `SessionSetCardArgs { card_id: String }` (MCP); validates the id via the existing card-lookup prefix-match helper (`load_card` / `list_card_files` per `.orbit/conventions/id-conventions.md` â€” full slug, padded NNNN, or bare unpadded number all resolve); on success writes the resolved canonical slug atomically (`write_atomic`) to `.orbit/.session-card` and returns an ok envelope `{ card_id: "<resolved-slug>", path: ".orbit/.session-card" }`; on unknown card returns `Error::not_found` with the searched id in the message and writes nothing. The file is a single-line newline-terminated slug â€” same shape as `.orbit/.session-id`. The `.orbit/.gitignore` file gains a `.session-card` entry alongside the existing `.session-id` entry (the existing gitignore-content test asserts both are present).'
  gate: false
  checked: false
  verification: 'New tests: `session_set_card_writes_resolved_slug` (call with bare `36` or padded `0036`; assert `.orbit/.session-card` contains `0036-session-handover\n`); `session_set_card_rejects_unknown_card` (call with `9999`; assert `Error::not_found` and file is not created); `session_set_card_atomic_overwrite` (call twice with different ids; assert file ends up with the second slug, no intermediate state observable); `gitignore_includes_session_card` (regression â€” asserts `.orbit/.gitignore` matches both `.session-id` and `.session-card`); `session_set_card_returns_envelope_with_resolved_slug` (asserts the ok envelope''s `card_id` field is the resolved canonical slug, not the input). CLI + MCP parity test added.'
- id: ac-05
  description: '`orbit session distill` learns to extract `last_assistant_message` from a Claude Code Stop-hook JSON envelope on stdin. This is the load-bearing fix for the current behaviour where Stop-hook-piped JSON lands verbatim in `Session.distillate` (visible in any session file under `.orbit/sessions/` written before this spec lands). Detection algorithm in the distill verb''s stdin-reading path: read stdin to bytes; lossy-utf8-convert to a `String` (`String::from_utf8_lossy(&buf).into_owned()`) so non-UTF-8 input never panics the verb â€” the U+FFFD replacement characters land in the distillate and the operator sees the corruption rather than a verb failure; attempt `serde_json::from_str::<serde_json::Value>(&s)`; if parsing succeeds AND the resulting value is a JSON object containing a string field `hook_event_name` with value `"Stop"`, extract the string field `last_assistant_message` from the same object and use that as the distillate body; otherwise (parse fails, value is not an object, missing `hook_event_name`, `hook_event_name` is not `"Stop"`, or `last_assistant_message` is missing or is not a string) treat the lossy-converted stdin as plain-text verbatim and preserve today''s behaviour. The extraction is non-fatal: malformed JSON that looks like it might be a Stop event but is missing `last_assistant_message` falls through to plain-text-verbatim treatment (defensive â€” the verb never refuses a distill on stdin shape grounds). A code comment cites the Stop-hook payload shape and this spec.'
  gate: true
  checked: false
  verification: 'New tests: `distill_extracts_last_assistant_message_from_stop_hook_payload` (feeds stdin = `{"hook_event_name":"Stop","last_assistant_message":"the actual handover prose","transcript_path":"..."}`; asserts the on-disk distillate is `the actual handover prose` verbatim and NO wrapping JSON envelope appears); `distill_treats_plain_text_stdin_verbatim` (feeds `Hello, world.`; asserts the distillate is `Hello, world.\n` per existing behaviour); `distill_treats_non_stop_json_verbatim` (feeds `{"some_other_key":"value"}`; asserts the JSON lands as-is â€” defensive: only `hook_event_name: "Stop"` triggers extraction); `distill_falls_through_when_stop_payload_missing_last_assistant_message` (feeds `{"hook_event_name":"Stop"}` only; asserts the JSON lands as-is rather than failing); `distill_non_utf8_stdin_does_not_panic` (feeds invalid-UTF-8 bytes including a Stop-event-shaped wrapper; asserts the verb exits 0 with the lossy-converted bytes â€” including U+FFFD replacements â€” in the distillate, no panic). Regression: the existing `session_distill_*` tests from spec 2026-05-15-agent-learning-loop continue to pass with no fixture changes.'
- id: ac-06
  description: '`orbit session handover [--card <id>] [--since <iso>]` CLI + MCP verb returns the most-recent matching Session. CLI: positional or `--card` flag accepts a card id (full slug, padded, or bare unpadded â€” same prefix-match helper as ac-04); `--since <rfc3339>` optional. MCP: `SessionHandoverArgs { card_id: Option<String>, since: Option<String> }`. Behaviour: walks `.orbit/sessions/*.yaml` (no SQLite â€” files-canonical); filters to sessions whose `card_id` matches the requested id (when `--card` provided); filters out sessions whose `started_at` is lexically less than `--since` (when provided â€” RFC 3339 sorts correctly); returns the session with the maximum `started_at` from the filtered set. Output ok envelope: `{ handover: { session_id, started_at, ended_at, card_id, distillate } }` when a match exists, or `{ handover: null }` when no match (NOT `Error::not_found` â€” querying for an unrecorded card is a legitimate question, same shape as the `orbit skill recurrence` precedent at ac-04 of spec 2026-05-15-agent-learning-loop). When no `--card` is passed, returns the most-recent Session across all cards (global latest). When the sessions directory is absent or empty, returns `{ handover: null }`.'
  gate: false
  checked: false
  verification: 'New tests: `handover_returns_most_recent_matching_card` (fixture with three Session files, two on card A with different `started_at`, one on card B; call with `--card A`; assert the returned session is the later A-session); `handover_returns_global_latest_when_no_card_flag` (fixture mixing cards; call without `--card`; assert the response is the max-started_at session across all); `handover_null_when_no_matching_card` (fixture with sessions only on card A; call with `--card B`; assert `handover: null`, exit=0); `handover_null_when_sessions_dir_absent` (no `.orbit/sessions/` dir; assert `handover: null`); `handover_filters_by_since_lexically` (fixture with sessions at 2026-05-15 and 2026-05-16; call with `--since 2026-05-16T00:00:00Z`; assert only the 2026-05-16 session is considered); `handover_card_id_resolved_via_prefix_match` (call with bare `36` or padded `0036`; asserts the resolution matches the canonical slug). CLI + MCP parity test added.'
- id: ac-07
  description: '`orbit session prime` envelope gains a `handover` field. The `session_prime` fn in `orbit-state/crates/core/src/verbs.rs` (locate via `grep -n "fn session_prime" verbs.rs`) returns the most-recent Session globally (no card filter at prime â€” per-card lookup is via `orbit session handover --card <id>`, ac-06) in a new field. Envelope addition: `handover: Option<HandoverSummary>` where `HandoverSummary { session_id: String, card_id: Option<String>, started_at: String, ended_at: Option<String>, distillate: String }`. The field is `None` when no sessions exist on disk. The `item_bound` formula (the `let item_bound = ...` line a few dozen lines below the fn header) gains a `+1` addend when `handover` is Some, otherwise the handover is invisible to the bound and clients have no way to know it''s there. The existing `next_step` text at the bottom of the envelope is updated to surface the handover when one is present: when `handover.is_some()`, the next_step string is prefixed with a stable sentinel `"Read the handover above before any other action. "` (note trailing space joining to the existing text); when `handover.is_none()`, the next_step is unchanged. The sentinel''s exact wording is allowed to drift over time â€” tests assert via `starts_with` on the sentinel prefix, not full-string equality, so copy edits to the suggestion do not require test updates. The `memories` relevance heuristic (label-overlap with open-spec labels) from spec 2026-05-15-agent-learning-loop ac-06 stays unchanged.'
  gate: true
  checked: false
  verification: 'New tests: `prime_returns_latest_handover_when_sessions_exist` (fixture with two Session files at different `started_at`; call `session prime`; assert the envelope''s `handover` field carries the later session''s distillate verbatim); `prime_handover_null_when_no_sessions` (no sessions dir; assert envelope has `handover: null`); `prime_handover_carries_distillate_verbatim` (fixture with a known distillate string; assert it appears in the envelope byte-equal to disk); `prime_item_bound_includes_handover` (compare item_bound between a fixture with and without sessions; assert the difference is exactly 1); `prime_next_step_starts_with_handover_sentinel_when_present` (asserts `next_step.starts_with("Read the handover above")` when handover is Some â€” uses `starts_with`, NOT full-string equality, so future copy edits to the suggestion text do not break the test). The existing `session_prime_*` tests from spec 2026-05-15-agent-learning-loop continue to pass after fixture adjustments (any fixture that does not now write a Session file remains unaffected; fixtures that do gain a `handover` field assertion).'
- id: ac-08
  description: '`.claude/settings.json` Stop hook updates to delete both session-state files post-distill, preserving the existing error-tolerance wrapper. The current Stop hook command is `(orbit session distill 2>/dev/null && rm -f .orbit/.session-id) || true` â€” note the `2>/dev/null` stderr suppression and the `|| true` fallthrough that prevents a failing distill from blocking Stop. After this AC: `(orbit session distill 2>/dev/null && rm -f .orbit/.session-id .orbit/.session-card) || true`. The verb itself (per ac-03) reads `.orbit/.session-card` automatically when no `--card` flag is passed, so the hook command takes no new flag â€” the wiring stays cli-flag-free and shell-fallback-free. The stderr-suppression and `|| true` wrapper MUST be preserved (any rewrite that drops them is a regression: a distill failure or a missing `.session-id` file would block Stop, and clients have no way to recover the session). SessionStart and PreCompact hooks are unchanged. After this AC: a fresh Claude Code session that invokes `orbit session set-card <id>` mid-session, then hits Stop, produces a `.orbit/sessions/<id>.yaml` file with `card_id` populated; both `.session-id` and `.session-card` are absent from disk afterwards.'
  gate: true
  checked: false
  verification: 'Manual smoke: from a fresh Claude Code session, run `orbit session set-card 0036` (this spec''s own card resolves), let the session run, terminate via Stop; verify the resulting Session yaml under `.orbit/sessions/` has `card_id: 0036-session-handover` (grep); verify `.orbit/.session-id` is absent (`test ! -f`); verify `.orbit/.session-card` is absent (`test ! -f`). Grep assertions: `grep -F "(orbit session distill 2>/dev/null && rm -f .orbit/.session-id .orbit/.session-card) || true" .claude/settings.json` returns one hit (confirms exact baseline + new file inside the same error-tolerance wrapper); `grep -F "rm -f .orbit/.session-id)" .claude/settings.json` returns zero hits (confirms the old single-file delete is gone). The pre-existing settings.json structure is preserved (only the Stop hook command line changes â€” no other hooks or fields touched).'
  ac_type: config
- id: ac-09
  description: '`.orbit/choices/0024-handover-register-is-discursive.yaml` lands as a MADR record. Status: `accepted`. Decision: the handover register is discursive reflection (multi-paragraph what-I-tried + what-worked + where-to-pick-up), not BLUF / Decision Brief shape. Context cites the deliberate divergence from `.orbit/STYLE.md`''s BLUF discipline on the grounds that audience and purpose differ â€” STYLE.md governs agent-to-Hugh prose where Hugh is deciding; the handover''s audience is the next agent (orienting) with Hugh reading over its shoulder. Alternatives considered: (a) terse-BLUF â€” rejected because orientation prose carries judgement that BLUF compression discards; (b) hybrid (BLUF header + discursive tail) â€” rejected for v1 in favour of a single register, but flagged as a candidate evolution once handover usage matures. Consequences section notes: the divergence is bounded to the handover artefact (Session.distillate written by Stop-hook-mediated agent prose); all other agent-to-Hugh prose continues to follow STYLE.md unchanged. The file mirrors the shape of existing choice files under `.orbit/choices/` (e.g. `0023-reconcile-as-canonicalise-mode.yaml`).'
  gate: false
  checked: false
  verification: 'Manual review: the file exists at `.orbit/choices/0024-handover-register-is-discursive.yaml`; `orbit choice show 24` (or `0024` or full slug) parses cleanly and returns the expected status / decision / alternatives. Keyword greps for `BLUF`, `discursive`, `STYLE.md`, and `audience` all return hits inside the file. The number 0024 is confirmed unused at write time via `ls .orbit/choices/ | grep ^0024` returning nothing pre-write.'
  ac_type: doc
- id: ac-10
  description: '`.orbit/conventions/session-handover.md` codifies the agent-facing discipline. The file documents: (a) the agent calls `orbit session set-card <id>` early in the session â€” ideally as soon as the active card is known â€” so the Stop-hook-mediated handover is scoped correctly; (b) the agent''s final assistant message before Stop IS the handover (the Stop hook reads `last_assistant_message` from the JSON envelope per ac-05); (c) the register is discursive reflection per choice 0024 â€” what was tried, what worked, what didn''t, what''s left, where the next session should pick up; (d) the format is freeform markdown â€” no required sections, no template â€” but the convention names four orientation elements the prose should cover (current state of the work, what was tried this session, blockers or open threads, next concrete step); (e) the convention is the v1 enforcement surface (matching the precedent from spec 2026-05-15-agent-learning-loop ac-08 for skill-self-improvement) â€” no front-matter on SKILL.md files is changed by this AC; (f) failure modes the discipline prevents: re-discovery cost ("I had to grep and ask before doing anything") and wrong direction ("I picked up on a different angle and wasted the session"); (g) **mid-session re-set-card is legal and overwrites** â€” calling `orbit session set-card <id>` a second time within a single session replaces the previous slug in `.orbit/.session-card`; the Stop hook then writes the most-recent card_id into the Session yaml (matches the rest of orbit''s "latest write wins" discipline); (h) **direct verb-call leak case named** â€” if `orbit session distill` is invoked manually (e.g., from a script or during testing) without the Stop hook firing afterwards, `.orbit/.session-card` is NOT auto-deleted; the file remains until the next Stop hook runs or the operator removes it manually. This is a deliberate scope choice â€” distill is read-only on `.session-card`, the hook owns deletion. Operators running distill manually should clear the file themselves if they want a fresh card-id context. Cites this spec, card 0036, and choice 0024.'
  gate: false
  checked: false
  verification: 'Manual review: the file exists at `.orbit/conventions/session-handover.md`; keyword greps for `set-card`, `last_assistant_message`, `discursive`, `0024`, `0036`, `re-discovery`, and `wrong direction` all return hits. The four orientation elements (state, tried, blockers, next step) appear as named items. Cross-reference: the file mirrors the structural shape of the existing `.orbit/conventions/skill-self-improvement.md` (one-page convention with named rules + cited specs).'
  ac_type: doc
- id: ac-11
  description: 'End-to-end smoke against the released brew binary verifies the handover round-trips through the full surface. After this spec ships and is released (a separate /orb:release cycle), on the beelink: (1) start a fresh Claude Code session in this repo; (2) invoke `orbit session set-card 0036` early in the session and verify `.orbit/.session-card` contains `0036-session-handover`; (3) write a multi-paragraph discursive handover as the agent''s final assistant message; (4) hit Stop; (5) verify a `.orbit/sessions/<uuid>.yaml` file lands with `card_id: 0036-session-handover` and `distillate` containing the agent''s curated prose VERBATIM (no JSON envelope, no `hook_event_name` key, no `transcript_path`); (6) verify both `.orbit/.session-id` and `.orbit/.session-card` are absent; (7) start a fresh second Claude Code session in the same repo; (8) verify `orbit session prime --json` returns an envelope whose `handover` field carries the previous session''s distillate; (9) verify `orbit session handover --card 0036 --json` returns the same handover. This AC has `ac_type: ops` and legitimately defers `spec.close` per the AC-taxonomy two-band rule from spec 2026-05-16-ac-taxonomy.'
  gate: false
  checked: false
  verification: Manual smoke on the beelink against the brew-distributed orbit binary at the version that ships this spec. The seven verification steps in the description are executed in order; each is captured in the session.close artefact (or this spec's drive.yaml progress) with the observed values. Sign-off recorded as a versioned memory `session-handover-brew-smoke-passed-<version>` (where `<version>` is the released orbit version, e.g. `session-handover-brew-smoke-passed-0.4.16`) capturing the binary version, the resolved session_ids, and the captured distillate prose excerpt. The version suffix prevents the memory from being overwritten on subsequent smoke runs against later releases â€” each release that re-runs the smoke writes a new memory rather than clobbering the previous record. The AC checks once the version-suffixed memory exists.
  ac_type: ops
