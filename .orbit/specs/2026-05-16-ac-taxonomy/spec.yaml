id: 2026-05-16-ac-taxonomy
goal: 'Typed acceptance criteria: `AcceptanceCriterion` carries a five-value `ac_type` enum (`code / config / doc / ops / observation`) with `code` as the default; `spec.close` honours the enum via a two-band rule (`code/config/doc` block close when unchecked; `ops/observation` defer); `/orb:design` prompts the author for the type, `/orb:review-pr` selects type-appropriate evidence, `/orb:drive` routes each AC into the matching workflow; `canonicalise --reconcile` maps brownfield legacy `ac_type` values onto the canonical enum (splitting `gate`-as-type into orthogonal `ac_type` + `gate: true`) via a new `Disposition::Transform` variant; `time_gated: bool` is removed from the schema in the same release; orbit''s own corpus migrates in one canonicalise pass. Single spec, all framework wires atomic — see interview.md for the user-voice intent contract derived from card 0035.'
cards:
- 0035-ac-taxonomy
- 0034-spec-close-ac-preflight
- 0030-canonical-schema-and-glossary
- 0032-brownfield-spec-migration
status: closed
labels:
- spec
acceptance_criteria:
- id: ac-01
  description: 'Substrate field + enum lands in `orbit-state/crates/core/src/schema.rs`. Add `pub enum AcType { Code, Config, Doc, Ops, Observation }` with `#[serde(rename_all = "snake_case")]` and a `Default` impl returning `Code`. Add `ac_type: AcType` field to `AcceptanceCriterion` (struct at `schema.rs:152`) with `#[serde(default)]` so existing untyped corpora deserialise as `Code` — this matches today''s implicit assumption that every AC is code-shaped. Remove the `time_gated: bool` field from the struct (the bool is superseded by `ac_type: observation`). Add `impl AcType { pub fn blocks_close(&self) -> bool { matches!(self, Self::Code | Self::Config | Self::Doc) } }` as the single source of truth for the two-band split. Update `AcceptanceCriterion::FIELDS` const at `schema.rs:109-112` to include `"ac_type"` and remove `"time_gated"`. Update the `acceptance_criterion_fields_matches_struct` test fixture at `schema.rs:752` and the `Spec` test fixture at `schema.rs:519` to populate `ac_type: AcType::Observation` instead of `time_gated: true` (the round-trip-with-time_gated-true test at `schema.rs:828` is rewritten as round-trip-with-ac-type-observation). Skip-on-default behaviour for `ac_type` is left to implementer judgement — if applied, the dominant `code` case stays byte-identical to today''s output; document the choice in code comments either way.'
  gate: true
  checked: true
  verification: '`cargo test --manifest-path orbit-state/Cargo.toml` passes. New unit tests cover: (a) every `AcType` variant round-trips through snake_case; (b) `AcceptanceCriterion` with `ac_type: observation` round-trips byte-identical; (c) legacy YAML omitting `ac_type` deserialises to `AcType::Code`; (d) `blocks_close()` returns true for Code/Config/Doc and false for Ops/Observation; (e) `acceptance_criterion_fields_matches_struct` passes against the new field set. `grep -n "time_gated" orbit-state/crates/core/src/schema.rs` returns nothing.'
- id: ac-02
  description: '`spec.close` honours the enum. The unchecked-blocking computation in `spec_close` at `orbit-state/crates/core/src/verbs.rs:1296-1306` switches from `!ac.checked && !ac.time_gated` to `!ac.checked && ac.ac_type.blocks_close()`. The deferrable-open list keys on `!ac.checked && !ac.ac_type.blocks_close()`. The envelope field name `time_gated_open` (at `verbs.rs:1459` and surrounding response construction) is renamed to `deferrable_open` — the new name carries the broader semantics; the rustdoc at `verbs.rs:629` is updated to match. Error message wording adjusts from "unchecked AC(s) in spec" to "unchecked blocking AC(s) in spec" so the deferred-set distinction surfaces in the error itself. The `--force` bypass path is unchanged behaviourally (forced_unchecked still lists every AC the operator overrode regardless of band). All call sites of the envelope field name update in the same commit: CLI renderer, MCP handler, parity tests, AND `plugins/orb/skills/drive/SKILL.md:489-492` (where the agent is instructed to read the response envelope''s deferred-AC list — currently spelled `time_gated_open` — to populate its deferred-checkpoint registry). Any other SKILL.md or doc that names `time_gated_open` is updated in the same commit.'
  gate: true
  checked: true
  verification: 'Unit tests in verbs.rs mirroring the existing time_gated trilogy from spec 2026-05-13-spec-close-ac-preflight: (a) spec with one unchecked code AC: exit=1, error envelope category=conflict, blocking list includes the ac id; (b) spec with one unchecked observation AC: exit=0, ok envelope deferrable_open list includes the ac id, status=closed; (c) spec with mixed unchecked (one code + one observation): exit=1, blocking list code only, deferrable_open observation only; (d) --force on (a) proceeds, forced_unchecked includes the code ac id, status=closed. MCP parity tests for the same matrix. Post-implementation, `grep -rEn "time_gated_open|time_gated" orbit-state/ plugins/` returns zero hits across non-archive paths.'
- id: ac-03
  description: 'Schema-version migration. The const `CURRENT_SCHEMA_VERSION` in `orbit-state/crates/core/src/migrations.rs:26` bumps from `"0.2"` to `"0.3"`. A new migration step `("0.2", "0.3", migrate_time_gated_to_ac_type)` registers in `registry()` (the existing 0.1→0.2 step stays unchanged). The migration function walks every spec.yaml under `.orbit/specs/**/`, parses raw YAML (not the typed struct — the bool field is gone from the struct), for each AC carrying `time_gated: true` sets `ac_type: observation` and removes the `time_gated` key entirely; ACs with `time_gated: false` simply have the key removed (the default `ac_type: code` is implicit). The file is written back via the canonical writer (`write_atomic`). After all files succeed, the schema-version file is bumped to `"0.3"`. Partial-failure semantics follow the existing migration runner contract: per-step persistence so an interrupted run leaves a known intermediate state. Idempotent: re-running on a 0.3 tree is a no-op. This auto-migration handles `time_gated → ac_type` for ALL spec corpora (orbit''s own + any brownfield repo running orbit-state ≥ 0.4.13 with `time_gated: true` ACs in their tree); brownfield `ac_type` VALUE normalisation is a separate path through `canonicalise --reconcile` (ac-06).'
  gate: true
  checked: true
  verification: 'Unit test in migrations.rs: fixture tree containing one spec.yaml with `time_gated: true` on ac-X and `time_gated: false` on ac-Y → migration runs → ac-X carries `ac_type: observation` and no `time_gated` key; ac-Y carries no `time_gated` key (default `code` implicit); both parse cleanly under the new schema. Idempotency test: second migration run on the same tree produces zero filesystem diff. Schema-version test: pre-migration file shows `version: 0.2`; post-migration shows `version: 0.3`. The 0.1→0.2 chain still applies on a fresh-from-zero tree (regression test).'
- id: ac-04
  description: 'Orbit''s own corpus migrates in the same commit as the schema change (ac-01) and migration runner (ac-03). The 0.2 → 0.3 migration walks every spec.yaml under `.orbit/specs/**/` regardless of status — closed specs are in-scope because the schema is global; rewriting a closed spec''s field shape does not reopen it (the migration commit is the audit record per the 2026-04-20 precedent). At this spec''s authoring time, three live target files carry field-level `time_gated: true`: (1) `.orbit/specs/2026-05-13-spec-close-ac-preflight/spec.yaml` ac-09 (closed status — the precursor spec''s own dogfood AC); (2) `.orbit/specs/2026-05-16-memos-own-folder/spec.yaml` ac-12 (closed status); (3) `.orbit/specs/2026-05-16-ac-taxonomy/spec.yaml` ac-13 + ac-14 (this spec''s own release + post-release smoke ACs — open at migration time, rewritten alongside the others). Post-migration, every `time_gated: true` instance has been replaced with `ac_type: observation` and the `time_gated` key removed; every `time_gated: false` instance has simply had the key removed (default `ac_type: code` implicit). The schema-version file flips from `0.2` to `0.3` in the same commit. Archive specs under `.orbit/archive/specs/` are out-of-scope per existing archive-is-frozen convention.'
  gate: true
  checked: true
  verification: '`grep -rEn "^  time_gated:" .orbit/specs/ | grep -v archive` returns nothing. `orbit spec show 2026-05-13-spec-close-ac-preflight` shows ac-09 with `ac_type: observation`. `orbit spec show 2026-05-16-memos-own-folder` shows ac-12 with `ac_type: observation`. `orbit spec show 2026-05-16-ac-taxonomy` shows ac-13 and ac-14 with `ac_type: observation`. `cat .orbit/schema-version` shows `version: ''0.3''`. `orbit verify` against the repo exits 0.'
- id: ac-05
  description: 'Reconcile `Disposition` enum extension. The existing enum at `orbit-state/crates/core/src/reconcile.rs:76-87` carries `Map(&''static str) / Drop / Quarantine` — only field-name renames. The typed-AC reconcile (ac-06) needs value-level rewrites (`ac_type: docs` → `ac_type: doc`) and conditional sibling-field writes (`ac_type: gate` → `ac_type: code` or `observation` + `gate: true`), neither of which the current enum expresses. Add a new variant `Transform(TransformFn)` where `TransformFn = fn(&serde_yaml::Value, &serde_yaml::Mapping) -> TransformResult`. The function receives the field''s current value and the surrounding AC mapping, returns either `Replace { value: serde_yaml::Value, sibling_writes: Vec<(&''static str, serde_yaml::Value)> }` (the new value + any sibling fields to set atomically) or `Quarantine(String)` (fall back to the existing Quarantine path with a reason string). `Disposition::action_str()` at `reconcile.rs:90-97` gains a `"transform"` arm. `DispositionRecord` at `reconcile.rs:134-146` gains an optional `transform_detail: Option<String>` field surfacing the per-AC routing rationale (which regex matched, which fallback applied) in the run summary and JSON envelope. The existing `Map / Drop / Quarantine` callers and the seeded entries at `reconcile.rs:111-130` continue to work unchanged — the new variant is purely additive. This AC is the second-project trigger called out in the precursor spec `2026-05-12-reconcile-mode` (which scoped v1 reconcile to field-name renames "until a second project demands" value-transforms).'
  gate: true
  checked: true
  verification: 'Unit tests in reconcile.rs: (a) a `Transform` rule returning `Replace { value: "doc", sibling_writes: vec![] }` rewrites the field value and leaves siblings untouched; (b) a `Transform` rule returning `Replace { value: "code", sibling_writes: vec![("gate", true.into())] }` rewrites the value AND sets the sibling field atomically; (c) a `Transform` rule returning `Quarantine(reason)` falls back to the existing quarantine path and the reason surfaces in the run summary; (d) the resulting `DispositionRecord` carries the new `transform_detail` payload; (e) regression: existing `Map / Drop / Quarantine` rules continue to work unchanged on the seeded entries (the four entries at `reconcile.rs:111-130` minus the `ac_type → Drop` rule that ac-06 replaces). `Disposition::action_str()` returns `"transform"` for the new variant.'
- id: ac-06
  description: '`canonicalise --reconcile` registry mappings for the typed-AC migration. Builds on ac-05''s `Transform` variant. The existing seeded rule at `orbit-state/crates/core/src/reconcile.rs:121-125` — `(EntityType::Spec, "acceptance_criteria[].ac_type", Disposition::Drop)`, which drops brownfield `ac_type` entirely because the canonical schema previously had no equivalent — is REPLACED with `Disposition::Transform(reconcile_ac_type)` pointing at a new module-level function. The function inspects the field''s current value and the surrounding AC mapping''s `description` field, then routes: (a) value `docs` → `Replace { value: "doc", sibling_writes: vec![] }` (typo normalisation); (b) value `code` / `config` / `doc` / `ops` / `observation` (already canonical) → `Replace { value: <same>, sibling_writes: vec![] }` (no-op pass-through); (c) value `gate` with description matching the case-insensitive regex `\b(build|cargo|cmake|make|compile)\b` → `Replace { value: "code", sibling_writes: vec![("gate", true.into())] }`; (d) value `gate` with description matching `\b(eval|score|accuracy|completes|training|trained|metric|val_accuracy|profile_eval)\b` → `Replace { value: "observation", sibling_writes: vec![("gate", true.into())] }`; (e) value `gate` matching neither regex → `Quarantine("unclassified gate-as-type; manual classification required")`; (f) any other unknown value → `Quarantine("unknown ac_type value")`. Reconcile mode remains dry-run by default; `--apply` performs the rewrite. Per-AC dispositions surface in the run summary via ac-05''s `transform_detail` field per card 0032 ac-03.'
  gate: false
  checked: true
  verification: 'Unit tests on synthetic AC fixtures: each of (a)/(b)/(c)/(d)/(e)/(f) exercised in isolation, asserting both the Replace value and any sibling writes. Integration test: a fixture brownfield tree containing one AC of each disposition runs `canonicalise --reconcile --dry-run` and the planned-changes report matches expected (six dispositions, transform_detail strings populated); `--apply` rewrites the files; re-running produces no diff. The original `Disposition::Drop` for `ac_type` is gone — `grep -nE "ac_type.*Drop|Drop.*ac_type" orbit-state/crates/core/src/reconcile.rs` returns nothing.'
- id: ac-07
  description: '`/orb:design` SKILL.md at `plugins/orb/skills/design/SKILL.md` adds, in §6 (Conduct the Design Session), an instruction that the agent prompts the author for `ac_type` per AC while ACs are being shaped. The prompt presents the five canonical values (`code / config / doc / ops / observation`) with one-line semantics each and surfaces the two close-time bands (`code/config/doc` block close; `ops/observation` defer) inline so the author understands what they are declaring. Default visible value is `code`. The same instruction is added to §4 (Closed Mode: Produce a Design Note) so design-note paths also gain the type signal. The implementation-question filter (§6) is not relaxed by this addition — `ac_type` is an intent declaration, not an implementation question.'
  gate: false
  checked: true
  verification: '`grep -n "ac_type" plugins/orb/skills/design/SKILL.md` returns the enum citation and the per-AC prompt. All five values and both close-time bands appear in the SKILL.md text. The §6 and §4 additions are in place; the implementation-question filter wording is unchanged. The skill''s structure (sections, ordering) is otherwise preserved.'
- id: ac-08
  description: '`/orb:review-pr` SKILL.md at `plugins/orb/skills/review-pr/SKILL.md` adds a per-AC evidence-expectation table keyed on `ac_type`, used during the AC-walk to select what evidence the reviewer asks for: `code` → passing test + commit ref; `config` → grep + file diff (+ external-system check if the config touches an external system); `doc` → grep + content check on the named artefact; `ops` → operator log line + signoff quote (PR comment, chat record, or substrate memory entry); `observation` → dated metric window + metric reference (dashboard URL, log query, empirical artefact). The instruction explicitly states that ACs with `ac_type: ops` or `ac_type: observation` MUST NOT be flagged as missing test evidence — these never had unit tests and the review walk routes them to the appropriate evidence shape instead. This directly addresses the live-trigger pattern from spec 2026-05-16-memos-own-folder ac-12 (memo-based smoke that the previous review treated as test-shaped).'
  gate: false
  checked: true
  verification: '`grep -n "ac_type" plugins/orb/skills/review-pr/SKILL.md` returns the table. All five enum values are addressed with named evidence expectations. The "MUST NOT flag ops/observation as missing test evidence" instruction is present and explicit. The table appears before the AC-walk instruction so the agent reads it before applying it.'
- id: ac-09
  description: '`/orb:drive` SKILL.md at `plugins/orb/skills/drive/SKILL.md` adds routing rules to the implement step that branch by `ac_type`: `code` → existing implement-and-test loop; `config` → file-edit loop with grep/diff verification; `doc` → file-edit loop with content-check verification on the named artefact; `ops` → operator-handoff escalation — drive halts on the AC, files a memo at `.orbit/memos/<date>-drive-handoff-<spec-id>-<ac-id>.md` flagging the handoff, and surfaces it in the run report; `observation` → deferred-checkpoint entry — drive records the AC as deferred (it lands in the spec.close `deferrable_open` list per ac-02) and proceeds past it without blocking. The escalation contract for `ops` names the memo-file path convention so the operator can find the handoff record. The `observation` routing explicitly states drive does not block on these ACs — they are the deferred-checkpoint set. Note: the SKILL.md surface that previously named `time_gated_open` (lines 489-492) updates to `deferrable_open` as part of ac-02''s rename sweep, not this AC.'
  gate: false
  checked: true
  verification: '`grep -n "ac_type" plugins/orb/skills/drive/SKILL.md` returns the routing rules. All five enum values have a named workflow. The `ops` escalation names the memo-path convention. The `observation` routing explicitly states drive does not block. The implement step of the skill cites the table before applying it.'
- id: ac-10
  description: '`.orbit/METHOD.md` and the byte-equal mirror at `plugins/orb/skills/setup/METHOD.md` add documentation for `ac_type`. A new entry (under substrate rules or the vocabulary table — settle in implementation) names the five canonical values with a one-line semantic each and the two close-time bands. The two files remain byte-equal per existing discipline. README.md adds a mention only if it already covers AC fields; otherwise unchanged. `.orbit/STYLE.md` is not affected (style is prose-shape, not field-shape). When card 0030 (canonical-schema-and-glossary) ships its dedicated SCHEMA doc, the enum entry will move there — until then, METHOD.md is the canonical home.'
  gate: false
  checked: true
  verification: '`diff .orbit/METHOD.md plugins/orb/skills/setup/METHOD.md` shows no differences. `grep -n "ac_type" .orbit/METHOD.md` shows the five canonical values and the two close-time bands. README.md unchanged unless prior AC-field content exists.'
- id: ac-11
  description: Full test suite passes against the new schema. `cargo test --manifest-path orbit-state/Cargo.toml` runs the unit, integration, and CLI/MCP parity suites with no new failures versus main. `orbit audit drift` (per spec 2026-05-12-tree-views) reports zero drift between `AcceptanceCriterion::FIELDS` and the struct's serde fields after the field addition + removal. `orbit verify` against this repo (post-migration) exits 0. No new clippy warnings introduced. All cards under `.orbit/cards/*.yaml` and all live specs under `.orbit/specs/**/spec.yaml` parse cleanly under the new schema.
  gate: true
  checked: true
  verification: '`cargo test --manifest-path orbit-state/Cargo.toml` exits 0. `orbit audit drift` exits 0. `orbit verify` exits 0. `cargo clippy --manifest-path orbit-state/Cargo.toml` exits 0 with no new warnings.'
- id: ac-12
  description: 'Pre-release brownfield dry-run against a locally-built binary, before the release lands. With the new orbit binary built via `cargo build --release --manifest-path orbit-state/Cargo.toml`, run `target/release/orbit canonicalise --reconcile --dry-run --root /home/hugh/github/meridian-online/arcform` and the same against `/home/hugh/github/meridian-online/finetype`. The planned-changes reports should match the evidence from the design session: arcform shows 122 `code` pass-through + 5 `doc` pass-through + 1 `gate` → `code + gate: true`; finetype shows 176 `code` pass-through + 52 `doc` pass-through + 5 `config` pass-through + 2 `docs` → `doc` + 60 `gate` split per the description heuristic (training/eval → `observation + gate: true`; build/test → `code + gate: true`; uncategorised → quarantine). Quarantine list expected to be empty or very small; any unexpected quarantines are inspected and either the registry is extended (returning to ac-06) or the quarantine is acknowledged with a one-line rationale in this AC''s checked-flip commit message. This AC catches registry-coverage gaps BEFORE the brewed binary ships — running ac-13''s release with an under-spec''d registry would require another release cycle.'
  gate: false
  checked: false
  verification: Local-build invocation against both public brownfield repos exits 0 (dry-run reports planned changes). Disposition counts match the design-session evidence within 5 entries per repo (allowing for any post-2026-05-16 churn in the brownfield corpora). Zero unexpected quarantines OR all quarantines are acknowledged with a rationale captured in this AC's checked-flip commit message. The local-build invocation paths in this AC are not retained in any release artefact — they exist only for pre-release smoke.
- id: ac-13
  description: Release the next orbit version via the `/orb:release` flow — bump `orbit-state/Cargo.toml`, `Cargo.lock`, `plugins/orb/.claude-plugin/plugin.json`; add a CHANGELOG entry naming the typed-AC migration, the `time_gated` retirement, the brownfield reconcile registry extension, and the `Disposition::Transform` variant addition; commit; push; `git tag v<new_version> && git push origin v<new_version>`; wait for the release.yml workflow to publish the brew tap update at meridian-online/orbit. This is an observation-shaped AC — brew tap propagation has its own latency. ac-13's `checked:` is flipped to `true` in a small follow-up commit once the release is published.
  gate: false
  checked: true
  verification: '`gh release view v<new_version>` shows the release published. `git tag --list v<new_version>` confirms the tag exists locally and on origin. The CHANGELOG entry for the new version names the typed-AC migration explicitly.'
  ac_type: observation
- id: ac-14
  description: 'Post-release brewed-binary smoke confirming the released orbit picks up the typed-AC migration. On the beelink: `brew upgrade meridian-online/tap/orbit` installs the new tag; `/home/linuxbrew/.linuxbrew/bin/orbit --version` reports it; `orbit canonicalise --reconcile --dry-run --root /home/hugh/github/meridian-online/arcform` produces a planned-changes report consistent with ac-12''s pre-release dry-run (the brewed binary reports the same dispositions as the local build, since neither rewrites files in dry-run mode); same against `/home/hugh/github/meridian-online/finetype`. This is the post-merge confirmation that the brew tap update flowed through and the binary in operators'' hands behaves correctly against external repo trees. The verification artefact saved into orbit (commit message or substrate memory body) names only the two public brownfield repos (per the Working-with-Hugh visibility discipline in CLAUDE.md); any private repos surfaced during the smoke are referred to generically.'
  gate: false
  checked: false
  verification: 'Beelink terminal output captured in a follow-up commit message or substrate memory: `brew upgrade` line, `orbit --version` line, both `orbit canonicalise --reconcile --dry-run` invocations with their planned-changes summary lines (disposition counts only — not full per-AC dispositions which may be long). ac-14''s `checked:` is flipped to `true` in a small follow-up commit once captured.'
  ac_type: observation
- id: ac-15
  description: 'Wired into the framework — the meta-gate from card 0035 scenario 6. All wires are present and live: `AcceptanceCriterion::FIELDS` includes `ac_type` (ac-01); the canonical schema documentation (METHOD.md per ac-10; will move to SCHEMA.md when card 0030 ships) names the enum and its two close-time bands; `spec.close` honours the enum (ac-02); `/orb:review-pr` and `/orb:drive` read the enum (ac-08, ac-09); `/orb:design` prompts authors for `ac_type` as ACs are being shaped (ac-07); `canonicalise --reconcile` absorbs brownfield AC taxonomies via the `Transform` variant + registry mappings (ac-05 + ac-06). Without every wire, this card describes intent but the framework does not surface it — the gate fails if any wire is missing.'
  gate: true
  checked: true
  verification: 'Each citation above resolves: `grep` against the named SKILL.md or doc returns the expected reference. `orbit verify` and `orbit audit drift` exit 0 against the migrated repo. The pre-release dry-run (ac-12) confirms the reconcile path absorbs the legacy values without lossy mapping.'
