id: 2026-05-18-topology-substrate-migration
goal: Reshape topology from a single docs/topology.md markdown doc into per-subsystem yaml under .orbit/topology/, per choice 0025. Preserves substrate-engagement envelopes (session-prime topology_drift, spec.close topology_warnings) shipped under spec 2026-05-18-topology-substrate-wires; replaces the markdown parser with structural yaml validation; rewrites the /orb:topology skill; ports setup-topology.sh into an orbit topology setup Rust verb per choice 0020 that scaffolds a self-describing seed (one entry per .orbit/ entity type). Gracefully retires the docs.topology config key — kept as a deprecated parse-only field this release so brownfield consumer repos that wired topology under 0.4.19 do not fail session-prime; orbit topology setup strips it from on-disk config; full field deletion is a follow-on spec after consumer-repo soak. No data-migration verb is shipped — the just-shipped capability has zero adopters with real content and there is no existing populated topology.md to import. Intent contract and pinned approach in design-note.md; pending-decision answers from the 2026-05-18 partial-mode design pass plus review-spec cycle-1 findings are captured in acceptance_criteria below.
cards:
- 0040-documentation-topology
status: open
labels: []
acceptance_criteria:
- id: ac-01
  description: 'TopologyEntry schema + .orbit/topology/ layout. orbit-state/crates/core/src/schema.rs gains a TopologyEntry serde struct with FIELDS const (mirroring Card / Choice / Spec schema shape); field set is subsystem (required, slug-shaped key, ≥ 5 chars to honour the existing word-boundary heuristic threshold), canonical_code (required, list of opaque strings — paths typically, but stored verbatim per design pass Q2; subsystems span multiple files), decision_record (optional, list of opaque strings — typically choice ids resolved via Layout::choice_path_for at drift-check time, but may also be a path), operational_doc (optional, list of opaque strings — paths typically), test_surface (optional, list of opaque strings — paths or test-target identifiers). Strings are stored verbatim by serde (no resolution at parse time); drift detection (ac-02) dispatches per-field: canonical_code / operational_doc / test_surface check filesystem existence on each path; decision_record entries resolve via the existing two-step pattern resolve_numeric_slug(VERB, &layout.choices_dir(), id) then layout.choice_file(&resolved); on resolution failure, fall through to direct path check. Layout::topology_dir() returns the canonical .orbit/topology/ path; new scanner method list_topology_files() returns each <subsystem>.yaml in that dir, mirroring list_card_files / list_choice_files. verify_all extends with a topology-entry branch that round-trips every file through serde::from_str → canonical writer → serde and fails on drift. Schema tests cover the round-trip path, deny-unknown-fields, missing-required-field (subsystem, canonical_code), the slug-shape constraint on subsystem name, and the ≥ 5 char length constraint.'
  gate: true
  checked: false
  verification: Grep schema.rs for TopologyEntry struct and FIELDS const. Run `cargo test -p orbit-state-core schema::topology` and assert the round-trip / unknown-field / missing-field / slug-shape / length tests pass. Invoke `orbit verify` on a fixture .orbit/topology/ dir with a well-formed entry and assert clean; invoke against a fixture with a drifted entry (added unknown field, missing required field, wrong-type pointer) and assert verify catches each case.
- id: ac-02
  description: audit_topology parser swap — markdown to per-file yaml. orbit-state/crates/core/src/verbs.rs::audit_topology replaces the existing markdown-doc parser (which reads docs.topology→single file and scans headers/lists) with a per-file yaml parser that reads each .orbit/topology/<subsystem>.yaml via TopologyEntry serde. The legacy parser function parse_topology_doc and the legacy helper load_topology_subsystem_names are removed from verbs.rs; the existing call site at verbs.rs:1652 (session-prime drift detection invocation of load_topology_subsystem_names) is rewired to the new per-file scanner so session-prime drift detection picks up entries from .orbit/topology/ directly; the existing test at verbs.rs:7237 (config-present-but-docs.topology-absent) is removed or rewritten to test the new "topology-dir-empty" path. Existing TopologyDriftEntry envelope shape preserved for parity continuity with spec 2026-05-18-topology-substrate-wires ac-02/ac-03 — the envelope shape is the contract floor; the drift-code vocabulary inside the envelope is the implementer's call (replace stale_pointer/missing_entry/shape_drift with structural codes, alias them, or extend — design-pass Q4 routes this to implementation). The canonical predicate audit_topology(...).configured returns true iff .orbit/topology/ directory exists AND contains ≥ 1 entry (populated == configured per design-pass Q1). CLI + MCP parity tests cover the new envelope shape across configured-clean (dir exists + ≥ 1 entry, no drift), configured-drift (dir + entries + at least one drifted entry), and unconfigured (dir absent or empty) states.
  gate: true
  checked: false
  verification: Grep verbs.rs for `fn parse_topology_doc` and `fn load_topology_subsystem_names` and assert both absent (markdown parser removed). Grep verbs.rs::audit_topology for the per-file yaml parse path. Assert the three legacy audit_topology tests on the dropped predicate (verbs.rs:7015 audit_topology_not_configured_when_docs_topology_unset, verbs.rs:7024 audit_topology_stale_pointer_when_topology_doc_missing, verbs.rs:7237 session_prime_topology_drift_none_when_docs_topology_unset) are removed or rewritten to cover the new empty-directory path. Run parity tests in orbit-state/crates/cli/tests/parity.rs and orbit-state/crates/mcp/tests/parity.rs covering audit topology against fixtures (clean substrate, drifted entry with unknown field, dangling canonical_code pointer, unconfigured repo with absent dir, unconfigured repo with empty dir). Run a session prime against a fixture with drift and confirm topology_drift envelope still populates with the new parser (regression net for ac-02 of the predecessor spec). Assert configured returns false against an empty .orbit/topology/ directory.
- id: ac-03
  description: /orb:topology skill rewrite. plugins/orb/skills/topology/SKILL.md write/read/audit modes rewritten for per-file yaml editing. Write-mode operates on one .orbit/topology/<subsystem>.yaml at a time (Write tool against the canonical path; subsystem-slug validation per ac-01 schema). Read-mode loads one file by subsystem key (Read tool against the canonical path). Audit-mode invokes `orbit audit topology` against the substrate verb. Skill prose names the per-file shape as canonical and removes references to the single markdown doc. SKILL.md cites choice 0025 as the architectural pin.
  gate: false
  checked: false
  verification: Grep plugins/orb/skills/topology/SKILL.md for the three modes (write/read/audit) and the canonical path .orbit/topology/<subsystem>.yaml. Assert references to docs/topology.md are removed or quarantined. Assert SKILL.md cites choice 0025. Invoke /orb:topology write-mode against a scratch subsystem and assert the file lands at .orbit/topology/<subsystem>.yaml with the canonical schema.
  ac_type: doc
- id: ac-04
  description: 'Wiring rewire — graceful docs.topology retirement + cross-skill prose + envelope continuity. DocsConfig::topology field is RETAINED in this spec (not deleted) but marked as deprecated and unused — no code path reads it; serde continues to accept it so brownfield consumer repos that wired topology under 0.4.19 do not hard-fail Config::from_str on session-prime (resolves review-spec cycle-1 MEDIUM finding 2 via Option A). A source-level doc comment names the field as deprecated and points at this spec; a follow-on spec deletes the field after a consumer-repo soak window. No runtime signal fires when the deprecated field is parsed — discovery is via the source-level doc comment, the .orbit/config.yaml schema docs, and the follow-on deletion spec''s release notes (silent path keeps session-prime output uncluttered). .orbit/config.yaml schema docs are updated to flag the key as deprecated. Three plugin skills update their prose to align with the new substrate predicate (resolves review-spec cycle-1 MEDIUM finding 1): plugins/orb/skills/setup/SKILL.md §6d (no docs.topology mention; invokes the orbit topology setup verb from ac-05); plugins/orb/skills/distill/SKILL.md (the topology-update step gates on .orbit/topology/ presence-and-populated per ac-02, not docs.topology config key); plugins/orb/skills/release/SKILL.md (the orbit audit topology invocation gates on the new predicate). Session-prime topology_drift envelope and spec.close topology_warnings envelope continue to populate against the new parser — covered by parity tests (regression net for ac-02 + ac-03 of the predecessor spec).'
  gate: true
  checked: false
  verification: Grep orbit-state/crates/core/src/schema.rs for DocsConfig::topology — assert PRESENT, with a deprecation doc comment naming this spec id. Round-trip test fixture .orbit/config.yaml whose docs.topology key points at docs/topology.md and assert Config::from_str succeeds and the field round-trips intact through the canonical writer (the key is preserved on write so verify_all sees no drift; the follow-on deletion spec performs the actual removal once consumer-repo soak completes). Grep plugins/orb/skills/setup/SKILL.md §6d and assert references to docs/topology.md and docs.topology are removed; assert the new Rust verb is named. Grep plugins/orb/skills/distill/SKILL.md and plugins/orb/skills/release/SKILL.md for docs.topology and assert no remaining references; assert each cites the new ".orbit/topology/ exists and is populated" predicate (verbatim phrasing optional, semantic match required). Run a session prime against a fixture with a drifted topology entry and assert topology_drift envelope still populates. Run spec close on a fixture spec naming a touched subsystem and assert topology_warnings still populates. Parity tests on CLI + MCP cover the envelopes.
- id: ac-05
  description: '`orbit topology setup` Rust verb — replaces setup-topology.sh per choice 0020, with brownfield config cleanup. New `orbit topology setup` CLI + MCP verb that scaffolds the topology substrate AND opportunistically cleans legacy config. Operation order: (a) if `.orbit/config.yaml` exists and carries `docs.topology`, transactionally rewrite the file with that key removed (and the now-empty `docs:` block elided if it has no other keys) — this is the brownfield cleanup arm of the graceful retirement (ac-04 keeps the field parseable; this verb removes it from on-disk config when run). (b) create the .orbit/topology/ directory (idempotent). (c) write a self-describing seed (per design-pass Q1) — one TopologyEntry per .orbit/ entity type (cards, choices, specs, memories, topology itself), each pointing at the orbit-state schema struct (canonical_code), the relevant choice (decision_record), the writing SKILL.md (operational_doc), and the schema tests (test_surface). The seed is universal across any orbit-using repo: every consumer has the same .orbit/<dir>/ structure. Existing .orbit/topology/<entity>.yaml files are skipped (does not overwrite operator-edited seeds). plugins/orb/scripts/setup-topology.sh is deleted (and its bash test plugins/orb/scripts/tests/test-setup-topology.sh); /orb:setup §6d invokes `orbit topology setup` directly via Bash tool. The §6d byte-compare-and-prompt voice still applies: prompt fires when .orbit/topology/ is absent or empty OR when legacy docs.topology cleanup is pending; idempotent on a populated repo with a clean config.'
  gate: false
  checked: false
  verification: Invoke `orbit topology setup` in a scratch greenfield repo and assert .orbit/topology/ directory exists and contains the seed templates (one per .orbit/ entity type — cards, choices, specs, memories, topology). Assert each seed entry round-trips through the canonical writer (orbit verify clean after invocation). Re-invoke and assert idempotent (no prompt; existing files unchanged). Modify one seed entry and re-invoke; assert the modified entry is preserved (skip-on-exist, not overwrite). Invoke `orbit topology setup` twice in succession against a brownfield fixture whose config carries a docs.topology entry and assert the second invocation produces no on-disk diff (idempotency holds in two stages — first invocation mutates the brownfield config and seeds the directory; subsequent invocations are no-ops on both surfaces). Invoke in a brownfield fixture with `.orbit/config.yaml` carrying a docs.topology entry pointing at docs/topology.md and assert the legacy key is removed (grep the post-invocation config — `docs.topology` absent). Invoke in a brownfield fixture with `.orbit/config.yaml` carrying ONLY `docs.topology` (no other docs keys) and assert the entire `docs:` block is elided post-cleanup. Assert plugins/orb/scripts/setup-topology.sh and plugins/orb/scripts/tests/test-setup-topology.sh are deleted. Grep plugins/orb/skills/setup/SKILL.md §6d for the new verb invocation. Parity test on CLI + MCP confirms envelope shape.
