id: 2026-05-15-agent-learning-loop
goal: 'Implement v1 of the agent learning loop scoped by the 2026-05-15 discovery (interview amended after the first /orb:review-spec BLOCK), grounded in the actual orbit-state model — files canonical (YAML + JSONL), SQLite as a derived index. Track A (skill self-improvement) adds an `InvocationOutcome` serde enum, a `SkillInvocation` event struct, an append-only JSONL stream at `.orbit/skills/<skill_id>.invocations.jsonl` (matching the `TaskEvent` / `NoteEvent` precedent at `schema.rs:165` and `:204`), and two CLI verbs (`orbit skill record-invocation` appends; `orbit skill recurrence` reads with per-outcome counts). Live SKILL.md edits are agent-decision, gated at ≥2 same-skill-same-outcome rows across sessions; enforcement is documented in `.orbit/conventions/skill-self-improvement.md` (the convention is the v1 boundary because card 0022''s curator front-matter is not yet shipped — see ac-08). Track B (memory-driven session continuity) adds a `Session` canonical YAML entity at `.orbit/sessions/<session-id>.yaml` (substrate-written, round-trippable, schema-version bumped), an idempotent `orbit session distill` verb keyed by session_id, a relevance enhancement on `orbit session prime` that prefers memories with labels overlapping open-spec labels before falling back to recency, and session-id sourcing via `ORBIT_SESSION_ID` env var or `.orbit/.session-id` file written by the SessionStart hook. Integration wiring lives in `.claude/settings.json` (the existing hook surface, not a new directory) — SessionStart writes the session id, Stop fires distill. Out of scope: a parallel `tags` field (memory already has `labels: Vec<String>` at `schema.rs:332` — reuse it), SQLite tables (orbit-state is files-canonical), live-edit enforcement via curator metadata (deferred to card 0022). The runtime boundary is corrected from the rolled-back choice 0024: files for state, CLI verbs for the API, hooks for integration. Intent contract: see the "Goal" and "Success Criteria" sections at `.orbit/specs/2026-05-15-agent-learning-loop/interview.md`.'
cards:
- 0022-skill-curator
- 0023-memory-loop
status: open
labels:
- spec
acceptance_criteria:
- id: ac-01
  description: '`InvocationOutcome` serde enum and `SkillInvocation` event struct land in `orbit-state/crates/core/src/schema.rs` in the "append-only event" family alongside `TaskEvent` (`schema.rs:165`) and `NoteEvent` (`:204`). Outcome enum is `{Worked, Partial, DidntApply, Incorrect}` with `#[serde(rename_all = "kebab-case")]`, matching the `TaskEventKind` precedent (`:184`). `SkillInvocation` fields: `{skill_id: String, session_id: String, outcome: InvocationOutcome, correction: Option<String> (skip_serializing_if = "Option::is_none"), timestamp: String}` with `#[serde(deny_unknown_fields)]`. `SkillInvocation::FIELDS` const declared and gated by a new `skill_invocation_fields_matches_struct` unit test colocated with the existing FIELDS-drift tests (`schema.rs:509`). Disk layout: `.orbit/skills/<skill_id>.invocations.jsonl` — per-skill, append-only, not round-trippable, excluded from the CI round-trip gate per the same exemption that covers tasks and notes (`schema.rs:21`).'
  gate: true
  checked: true
  verification: '`cargo test skill_invocation_fields_matches_struct` passes. New tests `skill_invocation_rejects_unknown_field` (parses YAML/JSON with an extra key, asserts `unknown` in the error message) and `invocation_outcome_kebab_case_round_trip` (asserts `didnt-apply` parses to `DidntApply` and serialises back to `didnt-apply`) pass. The CI round-trip gate continues to exclude `*.invocations.jsonl` per the existing append-only-stream exemption.'
- id: ac-02
  description: '`Session` canonical YAML entity lands in `schema.rs` alongside `Memory` (`:327`). Fields: `{id: String, started_at: String, ended_at: Option<String> (skip_serializing_if = "Option::is_none"), distillate: String, labels: Vec<String> (#[serde(default)])}` with `#[serde(deny_unknown_fields)]`. `Session::FIELDS` const declared and gated by `session_fields_matches_struct` unit test alongside the others. Disk layout: `.orbit/sessions/<session-id>.yaml` — substrate-written, round-trippable, included in the CI round-trip gate (sessions are summaries, not event streams). `.orbit/schema-version` bumps to the next minor (from `0.1` to `0.2`) per the migration discipline (`schema.rs:33`). **Migration semantics**: `migrate.rs` (or the existing migration runner) reads `.orbit/schema-version` on startup; when the on-disk version is `0.1`, the runner writes `0.2` and is a structural no-op (the new `Session` entity is additive — no existing files need rewriting); when the on-disk version is already `0.2` (fresh workspaces seeded by `orbit setup` after this AC ships), the runner is a complete no-op; when the on-disk version is anything else, the runner returns `Error::malformed` rather than guessing. Fresh-at-0.2 workspaces never trigger the 0.1 → 0.2 path.'
  gate: true
  checked: false
  verification: '`cargo test session_fields_matches_struct` passes. New tests `session_rejects_unknown_field`, `session_round_trips_byte_identical`, and `session_optional_ended_at_skipped_when_none` (asserts `ended_at: null` does not appear on disk when `None`) pass. `orbit verify` continues to pass against the bumped schema-version. New migration tests: `migrate_0_1_to_0_2_writes_new_version_and_leaves_files_untouched` (fixture at 0.1 with existing canonical files; run migration; assert schema-version is now 0.2 and no other file was modified); `migrate_already_at_0_2_is_noop` (fixture at 0.2; run migration; assert zero files changed); `migrate_unknown_version_is_malformed` (fixture with bogus version; run migration; assert `Error::malformed`).'
- id: ac-03
  description: '`orbit skill record-invocation <skill_id> --outcome <enum> [--correction <str>]` CLI + MCP verb appends one row to `.orbit/skills/<skill_id>.invocations.jsonl`, creating the file (and `.orbit/skills/` dir) on first call. The outcome arg accepts the kebab-case enum values (`worked`, `partial`, `didnt-apply`, `incorrect`); any other value returns `Error::invalid` with the accepted set in the message. `--correction` is free text, optional, written to the `correction` field; absence writes `null` (which is omitted from the JSONL row per `skip_serializing_if`). `session_id` is sourced from the env var `ORBIT_SESSION_ID` if set; otherwise from `.orbit/.session-id` (the file written by the SessionStart hook per ac-07); if neither is available, the verb returns `Error::unavailable` with a sentence-form message naming both sources. `timestamp` is RFC 3339 UTC, written by the substrate at append time (use `current_rfc3339_utc` at `verbs.rs:2898`).'
  gate: false
  checked: false
  verification: 'New tests: `skill_record_invocation_appends_row` (writes one row, reads back, asserts JSONL line shape); `skill_record_invocation_rejects_bad_outcome` (asserts `Error::invalid` for unknown enum values); `skill_record_invocation_missing_session_id` (asserts `Error::unavailable` when neither env var nor file is present); `skill_record_invocation_omits_null_correction` (asserts the on-disk row does not include `correction: null`); `skill_record_invocation_creates_skills_dir` (asserts the directory is created lazily). CLI + MCP parity test added at `orbit-state/crates/cli/tests/parity.rs` and `orbit-state/crates/mcp/tests/parity.rs`.'
- id: ac-04
  description: '`orbit skill recurrence <skill_id> [--since <iso-date>]` CLI + MCP verb reads the invocation stream and returns per-outcome counts plus the recorded invocations (so the agent has both the count and the *what went wrong* needed to decide a SKILL.md edit — see ac-08). Output shape: `{"skill_id": "...", "by_outcome": {"worked": {"count": N, "invocations": [{"timestamp": "...", "correction": "..."}, ...]}, "partial": {...}, "didnt-apply": {...}, "incorrect": {...}}, "total": N}`. The `correction` key is omitted from an invocation entry when the original record had none (matching the `skip_serializing_if` discipline on the source struct). Every outcome key appears in the response even when count is 0 — agents check `by_outcome["incorrect"].count >= 2` without first having to handle a missing key. `--since` filters by timestamp lexicographically (RFC 3339 sorts correctly). Default scope is across all sessions (no session filter). When the invocation file is absent, the verb returns the same shape with all counts 0 and `total: 0` rather than NotFound — recurrence-of-an-unrecorded-skill is a legitimate query.'
  gate: false
  checked: false
  verification: 'New tests: `skill_recurrence_returns_per_outcome_counts` (writes mixed-outcome rows under multiple session ids, asserts the counts sum across sessions); `skill_recurrence_all_outcome_keys_present` (asserts every enum variant key exists in `by_outcome` even when its count is 0); `skill_recurrence_returns_corrections` (writes rows with `--correction` text, asserts the text round-trips through the verb output verbatim and is reachable at `by_outcome.<outcome>.invocations[i].correction`); `skill_recurrence_omits_null_correction` (asserts entries without a correction omit the key entirely rather than emitting `null`); `skill_recurrence_filters_by_since` (writes rows before and after a cutoff, asserts only post-cutoff rows count); `skill_recurrence_empty_when_no_file` (asserts the empty-shape response for an unrecorded skill, not NotFound). CLI + MCP parity test added.'
- id: ac-05
  description: '`orbit session distill` is an idempotent CLI + MCP verb that writes or updates `.orbit/sessions/<session-id>.yaml` keyed by session_id. **Surface differs per transport**: the CLI accepts `[--session-id <id>] [--from <path>]` and reads the distillate from stdin by default (the Stop hook in ac-09 pipes it); MCP accepts a `SessionDistillArgs { session_id: Option<String>, distillate: String }` payload — the distillate is a required string argument over MCP because MCP has no stdin equivalent. The session_id sourcing is shared via `read_session_id` (ac-07): `--session-id` arg overrides `ORBIT_SESSION_ID` env var, which overrides `.orbit/.session-id`. **First call**: writes the file with `started_at = current_rfc3339_utc()`, `ended_at = current_rfc3339_utc()` (same timestamp — single-instant write), `distillate` set to the input. **Subsequent calls** on the same session_id: read the existing file, preserve `started_at`, set `ended_at = current_rfc3339_utc()`, overwrite `distillate` with the new input. The verb does not append rows. Writes use the existing atomic-write primitive (`write_atomic`). The verb does NOT delete `.orbit/.session-id` (per ac-07''s ownership pin) — file removal is the Stop hook''s job.'
  gate: false
  checked: false
  verification: 'New tests: `session_distill_first_call_creates_file` (asserts the file lands with `started_at == ended_at == now`, `distillate` matches input); `session_distill_is_idempotent` (calls the verb twice on the same session_id, asserts only one file exists, `started_at` is preserved across calls, `ended_at` advances); `session_distill_cli_reads_stdin_and_from_flag` (CLI-only test: asserts both input paths produce identical files); `session_distill_mcp_takes_distillate_arg` (MCP-only test: asserts the `distillate: String` field on the args payload is required and round-trips to disk); `session_distill_session_id_precedence` (asserts `--session-id` overrides the env var which overrides `.orbit/.session-id`); `session_distill_does_not_delete_session_id_file` (already in ac-07 verification, but listed here to make the cross-AC invariant explicit). CLI + MCP parity test added covering the shared surface (file-on-disk identical, response payload identical for equivalent inputs).'
- id: ac-06
  description: '`orbit session prime` (currently at `verbs.rs:2867`) is enhanced: when at least one open spec has a non-empty `labels` field, memories are sorted first by label-overlap with open-spec labels (descending), then by timestamp DESC as today, then truncated to the cap. When no open spec has labels, behaviour is unchanged (timestamp DESC, cap-truncated). The cap (`DEFAULT_MEMORY_CAP = 10` at `:2869`) is unchanged. The `item_bound` formula and `next_step` text are unchanged. This is the v1 prime-relevance mechanic — cheap heuristic, no new fields, no LLM classification.'
  gate: false
  checked: false
  verification: 'New tests: `session_prime_prefers_label_overlap_memories` (constructs open specs with labels `["foo", "bar"]` and memories with labels `["foo"]` vs `["unrelated"]`, asserts the foo-labelled memory comes first in the result); `session_prime_falls_back_to_recency_when_no_overlap` (asserts equal-overlap memories are ordered by timestamp DESC); `session_prime_unchanged_when_no_spec_labels` (asserts the existing behaviour when every open spec has empty labels). The existing `session_prime` tests (find via `grep -n "fn session_prime" verbs.rs`) continue to pass after fixture adjustments.'
- id: ac-07
  description: 'Session-id sourcing and lifecycle are owned by orbit-state CLI verbs, not shell. (a) **Sourcing precedence**: `ORBIT_SESSION_ID` env var if set; else `.orbit/.session-id` (single-line file); else `Error::unavailable` with a sentence-form message naming both sources. (b) **A new CLI + MCP verb `orbit session start [--id <uuid>]`** generates a UUIDv4 and writes it to `.orbit/.session-id` atomically (`write_atomic`). When `--id` is passed (test fixtures, replay scenarios), it is used verbatim instead of generating. The verb is idempotent on the same `.orbit/.session-id` content — re-running with no `--id` overwrites with a new UUID, which is the intended "fresh session" semantics. (c) **File lifecycle ownership is pinned on the Stop hook (ac-09)**: at session end, the Stop hook reads `.orbit/.session-id`, fires `orbit session distill` with the id available, then deletes `.orbit/.session-id`. `orbit session distill` does NOT delete the file. The verb in `verbs.rs` for `record-invocation` and `distill` only reads `.orbit/.session-id`; deletion is the hook''s responsibility (so manual CLI use without hooks does not unintentionally clear session state). (d) **`.orbit/.session-id` is gitignored** — added to `.orbit/.gitignore` alongside `state.db` and `locks/`. (e) A shared helper `read_session_id(layout) -> Result<String>` lives in `orbit-state/crates/core/src/session.rs` (new module) and is called by `record-invocation`, `distill`, and any future session-scoped verb.'
  gate: true
  checked: false
  verification: 'New tests: `read_session_id_prefers_env_var` (sets `ORBIT_SESSION_ID`, writes a different value to the file, asserts the env var wins); `read_session_id_falls_back_to_file` (unsets env, writes the file, asserts the file value is returned); `read_session_id_unavailable_when_neither` (returns `Error::unavailable` when both sources are absent); `session_start_writes_uuid_v4` (asserts the file lands with a valid UUIDv4 by regex / parse); `session_start_with_id_arg_uses_verbatim` (asserts `--id` value lands on disk unchanged); `session_distill_does_not_delete_session_id_file` (calls distill twice on the same session, asserts the file is still present after both calls). `.orbit/.gitignore` confirmed to include `.session-id` via a grep assertion in the existing gitignore-content test. CLI + MCP parity test added for `session start`.'
- id: ac-08
  description: '`.orbit/conventions/skill-self-improvement.md` ships, codifying the v1 rules for agent-judgment live edits to SKILL.md files: (a) recurrence threshold is **≥2 same-skill-same-outcome rows across sessions**, queried via `orbit skill recurrence`; (b) one-off failures (count < 2) route to `orbit memory remember`, not a SKILL.md edit; (c) the v1 allowlist of agent-editable skills is named explicitly in the convention (initial set: `card`, `design`, `discovery`, `implement`, `review-spec`, `spec` — pick the agent-facing skills that already produce structured outputs); (d) the convention names card 0022 as the future home of metadata-based enforcement (`created_by`, `pinned` front-matter) and declares the allowlist as a deliberate stopgap that retires when card 0022 ships; (e) **the agent decides the edit by reading the recurrence output''s `by_outcome.<outcome>.invocations[].correction` field** (per ac-04''s shape) — the count tells the agent *whether* to edit, the corrections tell the agent *what to change*. The convention includes a worked example showing the read-recurrence → reason-from-corrections → edit-SKILL.md flow. SKILL.md files in `plugins/orb/skills/*/` are NOT modified by this AC — the convention is the v1 enforcement surface, not skill-front-matter, precisely because the metadata system is unshipped.'
  gate: false
  checked: false
  verification: Manual review confirms the file exists and contains all five named elements (threshold, one-off routing, allowlist with named skills, card-0022 stopgap clause, recurrence-output-drives-the-edit clause with worked example). Keyword greps for "recurrence", "threshold", "allowlist", "0022", and "correction" return hits in the file. The named skills in the allowlist are cross-checked against `plugins/orb/skills/` to confirm each directory exists.
- id: ac-09
  description: '`.claude/settings.json` is updated to wire the loop into Claude Code via three changes, all using portable `orbit` CLI verbs — no shell-fallback `uuidgen` or `/tmp/` files. (a) **SessionStart hook**: command becomes `orbit session start` (the verb defined in ac-07, which writes `.orbit/.session-id`). The existing stale `bd prime` line is replaced with `orbit session prime` in the same edit (the file is being touched anyway; replacing stale commands is in-scope). (b) **Stop hook (new)**: command is `orbit session distill` invoked so the agent pipes its end-of-session reflection on stdin — the hook command takes no `--from` path argument and no `/tmp/` scratch file. After distill returns, the Stop hook deletes `.orbit/.session-id` (per ac-07''s lifecycle ownership) — concretely, the hook is two commands chained: `orbit session distill && rm -f .orbit/.session-id`. The agent provides the distillate text in its final response before the Stop fires; the hook reads it via the Claude Code stdin mechanism. (c) **PreCompact hook**: existing `bd prime` is replaced with `orbit session prime` for consistency. After this AC: a fresh Claude Code session writes `.orbit/.session-id` at start, all session-scoped CLI verbs work, Stop produces one `.orbit/sessions/<id>.yaml` file, and the session-id file is removed. Hook absence is a degraded mode: the CLI continues to work manually (no hook = `ORBIT_SESSION_ID` must be set manually or the verbs return `Error::unavailable` cleanly).'
  gate: true
  checked: false
  verification: 'Manual smoke: starting Claude Code in this repo runs `orbit session start` and writes `.orbit/.session-id` (verify with `cat`); a `Stop` results in `.orbit/sessions/<that-id>.yaml` (verify with `ls`) AND removes `.orbit/.session-id` (verify with `test ! -f .orbit/.session-id`). The pre-existing stale `bd prime` invocations are no longer present (grep `bd prime .claude/settings.json` returns nothing). A unit-level test `session_verbs_work_without_hooks` in `verbs.rs` confirms that with `ORBIT_SESSION_ID` set in env, both `record-invocation` and `distill` succeed without any hook installed — proving CLI independence from hooks. No `/tmp/session-distillate.md` or similar shared-path artefact appears in `.claude/settings.json` or any hook command (grep assertion). The replaced `bd prime` lines are noted in the commit message so the change is visible at review.'
