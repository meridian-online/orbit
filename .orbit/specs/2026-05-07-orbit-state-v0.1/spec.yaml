acceptance_criteria:
- id: ac-01
  description: Rust core canonical serde — round-trip byte-identical, atomic temp+rename writes, deny-unknown-fields strict schema conformance, multiline-body edge case fixtures (code fence, trailing blank, hard tabs, CRLF rejection)
  gate: true
  checked: true
- id: ac-02
  description: SQLite index rebuildable from files alone — orbit verify mode diffs index against files
  gate: true
  checked: true
- id: ac-03
  description: File-level locking — 30s default timeout, pid+timestamp stale-lock recovery (3x timeout), read-during-write returns pre-write state without lock
  gate: false
  checked: true
- id: ac-04
  description: schema-version file present from day one, migration runner exists, idempotent (twice = no-op on second run)
  gate: true
  checked: true
- id: ac-05
  description: 'MCP server and CLI both call same Rust core — state-mutation parity (canonical files + state.db byte-identical), error format `<verb>: <category>: <sentence>`'
  gate: true
  checked: true
- id: ac-06
  description: Spec verbs — create/show/list/update/close/note; transactional spec.close updates linked cards' specs_array atomically; rejects if child tasks unfinished
  gate: false
  checked: true
- id: ac-07
  description: Task verbs — ready/show/list/claim/update/done; append-only JSONL event stream; state reconstructs from last event; survives session reset
  gate: false
  checked: true
- id: ac-08
  description: Memory verbs — remember/list/search; cross-session, cross-machine via git
  gate: false
  checked: true
- id: ac-09
  description: Card verbs — show/list/search read-only; specs_array side-effect from spec.close is the only substrate-driven write
  gate: false
  checked: true
- id: ac-10
  description: Choice verbs — show/list/search read-only
  gate: false
  checked: true
- id: ac-11
  description: Session verb — prime; bounded output formula `f(N specs, M memories) ≤ 40 + 2*open_specs + min(M,10)`; K=10 memory cap
  gate: false
  checked: true
