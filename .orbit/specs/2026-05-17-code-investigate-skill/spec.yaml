id: 2026-05-17-code-investigate-skill
goal: Ship /orb:code-investigate as a sub-skill that coaches agents to reach for AST-aware tools (ast-grep, tree-sitter, rg, rtk wrappers) for code investigation in both narrow query and broad neighbourhood modes; embed call-points in /orb:implement, /orb:researcher, and /orb:review-pr; install a soft PreToolUse hook that warns when Edit/Write is invoked without a recent investigation; seed the learning loop via memories labelled code-investigate. Intent contract and design decisions in .orbit/specs/2026-05-17-code-investigate-skill/interview.md.
cards:
- 0025-codebase-mastery
status: closed
labels:
- spec
acceptance_criteria:
- id: ac-01
  description: '/orb:code-investigate skill exists at plugins/orb/skills/code-investigate/SKILL.md with two documented modes. Narrow mode — agent passes a specific query ("find X matching pattern Y", "where is feature Z implemented", "what calls function W") and the skill prose coaches the agent to pick the right tool per query type. Broad mode — agent invokes without a specific query (or with a directory/module scope) and the skill prose coaches the agent to gather a synthesised neighbourhood picture (directory structure, hot files, where complexity lives, what is adjacent to the area being changed). Tool taxonomy in the coaching prose: ast-grep for structural patterns regex cannot express, tree-sitter for AST queries, ripgrep for text search, rtk-wrapped variants for token-frugal output, Read/Glob for file context. Skill front-matter follows the curator convention from card 0022 (name, description, created_by, created_at, pinned).'
  gate: true
  checked: true
  verification: File exists at plugins/orb/skills/code-investigate/SKILL.md. Front-matter parses and includes the curator fields. Prose grep returns hits for "narrow mode", "broad mode", "ast-grep", "tree-sitter", "ripgrep", "rtk". Invocation as /orb:code-investigate from a fresh Claude Code session resolves the skill (not "skill not found").
- id: ac-02
  description: PreToolUse hook shipped with the plugin at plugins/orb/hooks/hooks.json — the Claude Code plugin loader registers hooks declared at this path automatically when the plugin is enabled (per the Claude Code plugins reference at https://code.claude.com/docs/en/plugins-reference.md, Hooks section), so consumer repos get the hook the moment they install orb. Hook fires on Edit and Write tool calls, reads the session-state marker from ac-03, and emits a non-blocking warning naming the file and pointing the agent at /orb:code-investigate when no recent investigation is recorded for the file being edited (or no investigation in the session at all). The edit proceeds regardless — this is a nudge, not a gate. Warning text stable enough to grep for ("consider /orb:code-investigate before editing") so subsequent audits can count warning fires across sessions. Graceful degradation — hook silently skips when .orbit/ is absent (non-orbit repos that happen to load the plugin); hook still warns when .orbit/ exists but the marker file does not (the "session with no investigation" case). Path filter — hook skips edits to paths under .orbit/ or .claude/ and to lockfiles (*.lock); all other paths trigger the warning when uninvestigated, including source-adjacent config (Cargo.toml, pyproject.toml, package.json, nested yaml/json) where investigate-before-change applies just as much as for source files.
  gate: true
  checked: true
  verification: plugins/orb/hooks/hooks.json exists and parses against the Claude Code plugin hook schema. Load-time smoke — install orb in a scratch repo with no .claude/settings.json orb entries, restart Claude Code, and confirm the loader reports the orb PreToolUse hook as registered (e.g. via /hooks or /reload-plugins — count ≥ 1 for PreToolUse, not 0); if the loader reports 0, ac-02 is not closeable on the plugin-shipped path and the fallback is dual-registration in .claude/settings.json. Fire-time smoke — in a fresh session with the plugin loaded, invoke Edit on a source file (e.g. an .rs or .ts file) without prior /orb:code-investigate; assert the warning appears in tool output and the edit still succeeds. Counter-smoke — invoke /orb:code-investigate first, then Edit the same file; assert no warning. Filter smoke — invoke Edit on a path under .orbit/ or on a *.lock file without prior investigation; assert no warning. Absent-substrate smoke — in a directory without .orbit/, invoke Edit; assert the hook does not error.
- id: ac-03
  description: Session-state surface that tracks recent /orb:code-investigate invocations so the ac-02 hook can read them. Single-file marker at .orbit/.code-investigate-recent with a session-id header line followed by newline-delimited entries shaped <unix-timestamp>\t<kind>\t<path> where kind is "file" or "scope". The skill writes to this file on each invocation; the hook reads it and considers an Edit/Write on file X investigated if X is a literal file entry or X sits under a scope-prefix entry. Marker lifecycle is session-scoped — the header line carries the current .orbit/.session-id value at write time; both the skill (on write) and the hook (on read) compare against the current .session-id and treat the marker as empty when they disagree. No clock TTL. Atomic write via the existing orbit-state write_atomic convention. The .orbit/.gitignore gains a .code-investigate-recent entry alongside the existing .session-id and .session-card entries.
  gate: true
  checked: true
  verification: 'Invoking /orb:code-investigate writes the marker file with a session-id header and an entry containing a parseable timestamp and the query/scope. Hook reads the marker correctly — no spurious warnings when an entry is present and the session-id matches; warning fires when the entry is absent or the session-id has rolled. gitignore_includes_code_investigate_recent regression test added alongside the existing gitignore-content tests. Manual smoke: marker file is absent on a fresh session (or present from a prior session with a stale session-id — both cases treat as empty), appears after first /orb:code-investigate, persists across the session, and is invalidated by session-id rollover at the next /orb:code-investigate invocation.'
- id: ac-04
  description: Call-points embedded in existing skills. plugins/orb/skills/implement/SKILL.md gets prose at the start of its instructions directing the agent to invoke /orb:code-investigate (broad mode) on the relevant module before proposing any non-trivial change, and to invoke narrow mode whenever a specific structural question arises mid-implementation. plugins/orb/skills/researcher/SKILL.md gets prose directing the agent to invoke /orb:code-investigate (broad mode) before opening any new research thread that touches code. plugins/orb/skills/review-pr/SKILL.md gets prose directing the agent to invoke /orb:code-investigate (narrow mode) when checking call sites, test coverage, and related-doc presence as part of the review checklist. Each call-point includes a one-line rationale matching the agent-equipment framing — the agent reaches for evidence cheaply enough that it actually reaches. Voice — imperative ("Run /orb:code-investigate ..." rather than "consider /orb:code-investigate ..."). Strong default per design pass 2 (interview.md Q2).
  gate: true
  checked: true
  verification: 'Grep each updated SKILL.md for "/orb:code-investigate" and assert at least one hit per file. Prose review confirms the call-points sit at the right structural moments (not buried in a footnote, not duplicated, named with a one-line rationale). Manual smoke: invoke each updated skill in a fresh session, observe whether the agent reaches for /orb:code-investigate at the expected moment.'
  ac_type: doc
- id: ac-05
  description: Memory label convention "code-investigate" documented in METHOD.md and in the skill prose. The skill prose includes a heuristic closing instruction — if something non-obvious surfaced (a tool that worked where another failed, a query shape worth reaching for again, or a structural insight worth keeping) write a short memory via `orbit memory remember <key> "<body>" --label code-investigate`, capturing (a) the query or scope, (b) the tools reached for, (c) what was non-obvious. Quality-gated reach rather than every-invocation write; the learning loop wants signal, not log volume. METHOD.md gains a one-line entry under the memory section naming "code-investigate" as the canonical label for code-investigation observations and pointing to the skill. The label is the substrate seam the learning loop pivots on — periodic distillation (manual or via a future lean-pass column) lifts recurring patterns from labelled memories into the skill prose.
  gate: false
  checked: true
  verification: 'Grep METHOD.md for "code-investigate" label mention. Grep skill SKILL.md for the heuristic closing instruction. Manual smoke: invoke the skill, follow the closing instruction, verify the memory lands with the expected label — `orbit memory search code-investigate` returns it (substring match on body + labels).'
  ac_type: doc
- id: ac-06
  description: Card 0025 (codebase-mastery) reframed to make the agent-equipment story explicit and to name /orb:code-investigate as the surface that delivers the capability. Reframe scope — as_a/i_want/so_that wording stays close to current but tightens the agent-facing framing; goal updated to reference /orb:code-investigate as the delivery vehicle for the token-frugal default; scenarios stay (all seven) with minor wording tightening where any read as user-facing rather than agent-facing. The references list adds .orbit/specs/2026-05-17-code-investigate-skill/spec.yaml. The card stays at maturity planned until the 4-week observation window (ac-07) confirms the capability is being used in practice — promotion to emerging is a follow-on lean-pass call, not part of this spec.
  gate: false
  checked: true
  verification: Grep card 0025 yaml for "/orb:code-investigate" — at least one hit in the goal field or scenarios. Spot-check that the seven scenarios still parse cleanly through orbit card show 25 (no schema drift). References list includes the spec path.
  ac_type: doc
- id: ac-07
  description: 'Observation-band: 4-week usage audit of the labelled memories. Earliest fire date: 4 weeks after this spec ships. Audit reads memories labelled code-investigate across orbit and consumer repos where /orb:code-investigate has been adopted, tabulates invocation count by week, tool-reach distribution (which tools the agent reached for, per query type), warning-fire count from the ac-02 hook (how often agents edited without prior investigation), and gaps that surfaced (queries the skill did not coach well, tools the agent reached for that were not in the taxonomy). The warning-fire count is segmented by file kind (source vs config vs doc) so the audit can distinguish nudge effectiveness from baseline noise. Audit produces a memo at .orbit/memos/<ship-date+4w>-code-investigate-4-week-audit.md with the data tables and a recommendation — keep coaching as-is, update skill prose with newly-learned patterns, or open a follow-on spec if the learning loop revealed a substrate gap.'
  gate: false
  checked: false
  verification: Audit memo exists at .orbit/memos/<ship-date+4w>-code-investigate-4-week-audit.md on or after the spec ship-date + 4 weeks. Memo includes invocation count table, tool-reach distribution table, warning-fire count (segmented by file kind), gaps section, recommendation. spec.close treats this AC as deferrable per the ac-taxonomy observation band (does not block close).
  ac_type: observation
