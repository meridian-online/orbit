id: 2026-05-18-documentation-topology
goal: 'Ship /orb:topology as the architecture-level analogue of /orb:code-investigate — a skill that scaffolds, writes, and audits a subsystem-keyed pointer-only doc whose location is consumer-owned via a .orbit/config.yaml pointer. Update triggers fire at learning moments (/orb:distill completion, orbit memory remember with the topology label) and at session boundaries (orbit session prime surfaces drift). Audit warns at gate moments (spec.close, orbit release) without blocking. Intent contract and design decisions in .orbit/specs/2026-05-18-documentation-topology/interview.md. Sequencing: ac-02 → ac-03 → ac-04 (Config artefact, docs.topology key, verify wiring) close before ac-06, ac-07, ac-08, ac-09 (the verbs that read the pointer) can be tested. Backout for the schema-level ac-02 change: revert the Config artefact addition; absence-of-config-file is a tolerated state, so consumer repos that created .orbit/config.yaml during a broken window remain valid (file becomes inert).'
cards:
- 0040-documentation-topology
status: closed
labels:
- spec
acceptance_criteria:
- id: ac-01
  description: /orb:topology skill exists at plugins/orb/skills/topology/SKILL.md with three documented modes. Write mode — agent passes a subsystem name and the skill scaffolds or updates an entry (interview-style if scaffolding; targeted edit if updating); each entry is five lines (authoritative code file / owning architectural decision / operational doc / test surface / one-sentence "what this gives you"). Read mode — agent passes a subsystem name (or a question like "how does X work?") and the skill returns the entry, citing the canonical sources by path. Audit mode — agent invokes without a subsystem name and the skill reports drift across the whole topology doc (stale pointers, missing entries for subsystems detected in the codebase, entries whose pointer targets no longer exist). Skill front-matter follows the curator convention from card 0022 (name, description, created_by, created_at, pinned). Skill prose names the architecture-level analogue framing (parallel to /orb:code-investigate at the file level).
  gate: true
  checked: true
  verification: 'File exists at plugins/orb/skills/topology/SKILL.md. Front-matter parses and includes the curator fields. Prose grep returns hits for "write mode", "read mode", "audit mode", "subsystem", "pointer-only". Invocation as /orb:topology from a fresh Claude Code session resolves the skill (not "skill not found"). Smoke: invoke write mode in a scratch repo, assert the topology doc gains a five-line entry; invoke read mode against the same subsystem, assert the entry is returned; invoke audit mode, assert drift is reported when a pointer target is deleted.'
  ac_type: doc
- id: ac-02
  description: 'Config artefact added to the orbit-state schema. New top-level struct Config in orbit-state/crates/core/src/schema.rs parallel to Card / Spec / Choice / Memory, with #[serde(deny_unknown_fields)] and a corresponding Config::FIELDS constant. Schema-drift unit test added alongside the existing tests at the bottom of schema.rs (mirrors the existing assert_eq for Spec::FIELDS) asserting Config::FIELDS matches the struct''s serde representation so the audit field set cannot drift from the struct definition. orbit verify treats Config as an opt-in artefact: absence of .orbit/config.yaml is tolerated (orbit-state continues to function without it).'
  gate: true
  checked: true
  verification: Config struct exists in orbit-state/crates/core/src/schema.rs with deny_unknown_fields. Config::FIELDS const exists. Unit test schema_drift_config (or equivalent name) passes and fails when Config gains/loses a field without the FIELDS constant being updated — verify by adding a temporary field, asserting the test fails, then removing. orbit verify on a repo without .orbit/config.yaml exits 0 (no regression).
- id: ac-03
  description: Pointer key on Config — Config carries a docs.topology key of type Option<String> (or equivalent — Option of a typed Path). The key names the consumer-chosen path for the topology doc relative to the repo root. Default in the canonical scaffolded config (per ac-07) is docs/topology.md. The key round-trips through orbit canonicalise without loss.
  gate: true
  checked: true
  verification: 'A .orbit/config.yaml fixture with docs.topology: docs/topology.md parses and round-trips through orbit canonicalise byte-identically. A fixture with docs.topology of the wrong type (e.g. a list, an int) fails to parse with a clear error. A fixture without docs.topology parses with Config { docs.topology: None } (or equivalent).'
  ac_type: config
- id: ac-04
  description: orbit verify wiring + parity. orbit verify validates .orbit/config.yaml against the Config schema when the file is present; exits non-zero with the standard error envelope on schema mismatch (e.g. wrong type on docs.topology); exits 0 on a valid config; exits 0 when the file is absent (opt-in tolerance per ac-02). Parity test in orbit-state/crates/cli/tests/parity.rs and orbit-state/crates/mcp/tests/parity.rs confirms CLI + MCP emit the same envelope shape for the three outcomes.
  gate: true
  checked: true
  verification: orbit verify on a fixture with a valid .orbit/config.yaml exits 0. orbit verify on a fixture with an invalid Config (wrong type on docs.topology) exits non-zero with an Error envelope naming the field. orbit verify on a fixture without .orbit/config.yaml exits 0. Parity-test cases added on both CLI and MCP sides.
- id: ac-05
  description: METHOD.md gains a posture line in the substrate-rules section — verbatim or close-paraphrase of "Before reasoning about how a subsystem works, grep the code tree and docs/ for it. Substrate beats extrapolation." The line lives where the other substrate-rules bullets live (memory loop, session prime, task tracking). METHOD.md also gains a brief mention of the topology label convention (parallel to the existing --label code-investigate documentation) naming "topology" as the canonical label that triggers the update-on-learning prompt in /orb:topology.
  gate: true
  checked: true
  verification: Grep METHOD.md for "Substrate beats extrapolation" — at least one hit. Grep METHOD.md for "topology" label mention — at least one hit naming the label as canonical for topology-relevant memories. /orb:setup's byte-compare propagates the updated METHOD.md to consumer repos on next setup invocation (existing mechanism per §6b; no new wiring needed here).
  ac_type: doc
- id: ac-06
  description: 'orbit audit topology verb on CLI + MCP. Reads the docs.topology pointer from .orbit/config.yaml; if absent, exits cleanly with a "topology capability not configured" envelope (not an error). When configured, walks the topology doc, parses entries, and reports drift in three categories — (a) stale_pointer (entry names a path that no longer exists), (b) missing_entry (subsystem detected in the codebase by an initial heuristic: top-level directory under src/ or crates/ with no entry in the topology doc), (c) shape_drift (entry doesn''t follow the five-line convention from ac-01). Output is the standard ok envelope with a topology_drift array. Exit code is 0 for all three outcomes (clean / drift-present / not-configured); discrimination is via the envelope topology_drift field and the envelope category field only — consumers MUST NOT reach for $? to detect drift. Symmetric with orbit audit drift''s exit-0-even-on-drift contract. Parity test on CLI + MCP.'
  gate: true
  checked: true
  verification: orbit audit topology returns ok envelope with empty topology_drift on a fixture with a clean topology doc (exit 0). Returns ok envelope with populated topology_drift on a fixture with each of the three drift categories injected (exit 0 — assert via `echo $?` capture). Returns ok envelope with a "topology capability not configured" message on a fixture without .orbit/config.yaml (exit 0). Parity test in orbit-state/crates/cli/tests/parity.rs and crates/mcp/tests/parity.rs confirms CLI + MCP emit the same envelope.
- id: ac-07
  description: '/orb:setup integration. Greenfield path scaffolds .orbit/config.yaml with docs.topology: docs/topology.md (the memo''s suggested default) and creates a stub docs/topology.md with a heading + a one-paragraph explainer + an empty entry list. Brownfield path detects whether .orbit/config.yaml exists and prompts to add the docs.topology key if missing (operator can decline; declining leaves the topology capability unconfigured but the rest of orbit still works). Brownfield-accept behaviour is explicit: if the target path named by docs.topology does not already exist on disk, /orb:setup ALSO creates the stub file at that path (suppresses first-prime drift noise that would otherwise fire because ac-06 would flag a stale pointer). If a file already exists at the target path, /orb:setup wires the pointer but does NOT overwrite the existing file. The /orb:setup SKILL.md gains a §6e (or equivalent placement) documenting the new scaffolding step in the same byte-compare-and-prompt voice as §6b for METHOD.md.'
  gate: false
  checked: false
  verification: Invoke /orb:setup in a scratch greenfield repo; assert .orbit/config.yaml exists with docs.topology=docs/topology.md and docs/topology.md exists with the stub content. Invoke /orb:setup in a scratch brownfield repo with no .orbit/config.yaml and no existing docs/topology.md; assert the operator is prompted; accept; assert both .orbit/config.yaml AND docs/topology.md are created. Invoke /orb:setup in a scratch brownfield repo with no .orbit/config.yaml but with an existing docs/topology.md; assert the pointer is wired but the existing file is not overwritten (byte-compare before/after). Re-invoke /orb:setup on the same brownfield repo; assert no prompt (idempotent on clean repo). Grep /orb:setup SKILL.md for the new step.
- id: ac-08
  description: 'orbit session prime envelope extends with a topology_drift field listing subsystems with drift. The session prime envelope today carries handover / item_bound / memories / next_step / open_specs (confirmed via `orbit --json session prime` against this repo on 2026-05-18). topology_drift is added as an additional key in data.result alongside those, additive and non-breaking. Each entry is an object { subsystem: string, drift_kind: string } where drift_kind matches the three categories from ac-06 (stale_pointer, missing_entry, shape_drift). When .orbit/config.yaml is absent or the topology capability is not configured, the topology_drift key is omitted entirely (skip-on-default — does not appear in the envelope). When configured and clean, the key is present and the value is an empty array. Parity test on CLI + MCP confirms the envelope shape across the three states.'
  gate: true
  checked: false
  verification: orbit --json session prime on a fixture with a configured + clean topology returns an envelope where data.result.topology_drift is []. Same on a fixture with drift returns the populated array, each entry shaped { subsystem, drift_kind }. Same on a fixture without .orbit/config.yaml returns an envelope without a topology_drift key (assert key absence, not empty array). Parity test in cli/tests/parity.rs and mcp/tests/parity.rs covers all three cases.
- id: ac-09
  description: spec.close emits a non-blocking topology_warnings field in its ok envelope when drift exists in subsystems the closing spec touched. "Subsystems touched" detection — read the spec's spec.yaml and (when present) interview.md, then for each topology entry whose subsystem name is ≥ 5 characters long, test for case-insensitive word-boundary match (regex \b<subsystem>\b) in the concatenated spec text. Subsystems with names < 5 characters are excluded from the heuristic to suppress false-positives on short common tokens (memo, spec, ac, etc.). Operators can suppress per-subsystem warnings via a topology.suppress array on Config in a follow-on spec (out of scope here — named as deferred). The warnings do not block closure (closure proceeds, exit 0) — they appear in the ok envelope's topology_warnings array as { subsystem, drift_kind } entries. Parity test confirms the envelope shape on both CLI + MCP.
  gate: true
  checked: false
  verification: spec close on a fixture spec whose text contains the word-boundary subsystem name returns exit 0 with topology_warnings populated. spec close on a fixture spec whose text matches a subsystem name only as a substring (not word-bounded) returns topology_warnings empty for that subsystem. spec close on a fixture spec with a subsystem name < 5 characters anywhere returns topology_warnings empty for that subsystem (length filter holds). spec close in a repo without .orbit/config.yaml returns the existing envelope shape (no topology_warnings key — skip-on-default). Parity test on CLI + MCP.
- id: ac-10
  description: '/orb:release SKILL.md gains a topology-drift surface step that runs orbit audit topology and reports drift to the release operator before bumping the version. Implementation is skill-prose only (the release flow is already author-facing prose, not a binary verb) — the new step sits in the pre-bump checklist and surfaces the audit output with a one-line framing ("topology drift surfaced — review before bumping"). Output truncation rule: if topology_drift contains > 10 entries, the skill prose summarises rather than dumps verbatim ("<N> topology drift items; run `orbit audit topology` for the full list" with the first 10 entries shown). Operator can proceed regardless (release is not gated by topology drift per Q4 of the interview).'
  gate: false
  checked: true
  verification: 'Grep plugins/orb/skills/release/SKILL.md for "orbit audit topology" — at least one hit in the pre-bump section. Grep for the truncation rule ("10" or "first ten" near the topology context). Prose review confirms the step is positioned before the version bump and uses the "review before bumping" voice. Manual smoke: invoke /orb:release on a repo with topology drift (≤ 10 entries), observe the audit output surfaces verbatim. Manual smoke (truncation): construct a topology with > 10 drift entries, observe the summarisation.'
  ac_type: doc
- id: ac-11
  description: /orb:distill SKILL.md gains an update-on-learning nudge at the §5 Write phase. After the cards are written, the skill prose prompts the agent to consider whether any of the new cards correspond to subsystems that should be added to or updated in the topology doc — invoking /orb:topology write-mode when the answer is yes. The nudge is conditional (only fires if .orbit/config.yaml is present and docs.topology is configured) and quality-gated (the skill prose frames it as "if this distillation corresponds to a subsystem-level capability, consider..." rather than firing every time).
  gate: false
  checked: true
  verification: 'Grep plugins/orb/skills/distill/SKILL.md for "/orb:topology" or "topology" — at least one hit in the §5 Write section. Prose review confirms the nudge is conditional and quality-gated, not unconditional. Manual smoke (positive): invoke /orb:distill on a memo that produces a subsystem-flavoured card (e.g. a memo about how a multi-file capability works); observe the agent reaches for /orb:topology after the write phase. Manual smoke (negative): invoke /orb:distill on a memo that produces a non-subsystem card (e.g. a style/prose card, a UX-tweak card); observe the agent does NOT reach for /orb:topology.'
  ac_type: doc
- id: ac-12
  description: orbit memory remember with --label topology emits a "consider /orb:topology" nudge to stderr (or to the ok envelope as an advisory field) after the memory is stored. Implementation is in the memory remember verb's post-store hook — checks the labels for "topology" and emits the nudge when present. The nudge is non-blocking (memory still stores successfully) and quiet (suppressible via --no-nudge flag or equivalent — final flag name decided in implementation). Parity test confirms the nudge fires on CLI + MCP.
  gate: false
  checked: false
  verification: orbit memory remember <key> "<body>" --label topology stores the memory and emits the nudge ("consider /orb:topology" or near-equivalent — exact wording locked at implementation). Without the label, no nudge fires. With --no-nudge (or chosen equivalent), no nudge fires even when the label is present. Parity test on CLI + MCP. Grep the verbs.rs handler for the nudge-emission code path.
- id: ac-13
  description: 'Observation-band: 4-week usage audit of the topology capability. Earliest fire date: 4 weeks after this spec ships. Audit reads (a) the topology doc in this repo and any consumer repos where /orb:topology has been adopted, tabulating entry count and update frequency by subsystem, (b) memories labelled topology over the 4-week window, (c) topology_warnings counts emitted by spec.close over the window, (d) topology_drift counts emitted by session prime. Audit produces a memo at .orbit/memos/<ship-date+4w>-topology-4-week-audit.md with the data tables and a recommendation — keep coaching as-is, tighten the audit heuristic, expand the trigger surfaces, or open a follow-on spec if the learning loop revealed a substrate gap.'
  gate: false
  checked: false
  verification: Audit memo exists at .orbit/memos/<ship-date+4w>-topology-4-week-audit.md on or after the spec ship-date + 4 weeks. Memo includes entry-count table, update-frequency table, labelled-memory count, topology_warnings count, topology_drift count, recommendation. spec.close treats this AC as deferrable per the ac-taxonomy observation band (does not block close).
  ac_type: observation
