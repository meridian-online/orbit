id: 2026-05-13-spec-close-ac-preflight
goal: '`orbit spec close` pre-flights acceptance-criterion state — it refuses to flip a spec to closed while any non-time-gated AC remains unchecked, returning `Error::conflict` with the offending ids (gate ACs flagged separately) and mirroring the existing unfinished-tasks guard at `verbs.rs:1147`. A deliberate `--force` flag is the only opt-in. Time-gated ACs (declared via a new `time_gated: bool` field on `AcceptanceCriterion`, default `false`, `#[serde(default)]` so existing specs are unaffected) are reported in the close output as deferred-OK but do not block. The happy path is unchanged. Intent contract: see the "What good looks like" paragraph at `.orbit/specs/2026-05-13-spec-close-ac-preflight/interview.md`.'
cards:
- 0034-spec-close-ac-preflight
status: open
labels:
- spec
acceptance_criteria:
- id: ac-01
  description: '`AcceptanceCriterion` in `orbit-state/crates/core/src/schema.rs` gains a `time_gated: bool` field, default `false`, with `#[serde(default)]` so existing specs parse unchanged. `AcceptanceCriterion::FIELDS` (currently `["id", "description", "gate", "checked", "verification"]`) is extended with `"time_gated"` in declaration order, and the existing `acceptance_criterion_fields_matches_struct` unit test continues to pass after the addition (the test is the FIELDS-drift gate).'
  gate: true
  checked: true
  verification: '`cargo test acceptance_criterion_fields_matches_struct` passes after the additions. A round-trip test (new) constructs an `AcceptanceCriterion` with `time_gated: true`, serialises to canonical YAML, deserialises, and asserts byte-identical equality. An existing spec.yaml without the `time_gated` field on any AC parses cleanly and the deserialised ACs carry `time_gated: false`.'
- id: ac-02
  description: '`orbit spec close <id>` computes the unchecked-blocking set as `{ ac : ac.checked == false && ac.time_gated == false }`. If the set is non-empty, the verb returns `Error::conflict` with verb `"spec.close"` and a sentence-form message listing the offending AC ids; gate ACs in the set are flagged separately within the same message (e.g. `"3 unchecked AC(s) in spec ''<id>'': ac-04, ac-07, ac-15 (gate: ac-04)"`). No files are written when the guard fires. The new guard sits in `spec_close` at `verbs.rs:1097`, adjacent to the existing unfinished-tasks check at line 1147; ordering of the two checks is the implementing agent''s call but is named in a code comment.'
  gate: true
  checked: true
  verification: New unit test `spec_close_rejects_unchecked_acs` constructs a spec with one or more unchecked non-time-gated ACs and asserts the verb returns `Error::conflict`, the spec status is unchanged on disk, no linked card is mutated, and the message names every offending AC id. New unit test `spec_close_unchecked_gate_ac_flagged_in_error` asserts gate ACs appear in a distinguished position within the error message (regex or substring assertion). Both tests live alongside `spec_close_rejects_unfinished_tasks` at `verbs.rs:3941`.
- id: ac-03
  description: '`orbit spec close --force <id>` proceeds despite unchecked non-time-gated ACs. The close happens (status flips to closed, linked-card `specs` arrays are updated atomically per the existing transactional discipline). The successful response payload names the bypassed AC ids in a dedicated field (e.g. `forced_unchecked: ["ac-04", "ac-15"]`) so the audit trail is preserved in the structured response, not only in shell history.'
  gate: false
  checked: true
  verification: 'New unit test `spec_close_force_proceeds_despite_unchecked` asserts: (a) status flips to `Closed`, (b) the linked card''s `specs` array is updated, (c) the response payload identifies the bypassed AC ids. Run via `cargo test`.'
- id: ac-04
  description: 'ACs with `time_gated: true` are excluded from the unchecked-blocking set. A spec with all non-time-gated ACs checked plus one or more unchecked `time_gated: true` ACs closes cleanly without `--force`. The successful close response names the deferred ACs in a dedicated field (e.g. `time_gated_open: ["ac-18"]`) so the deliberate-deferral is recorded structurally.'
  gate: false
  checked: true
  verification: 'New unit test `spec_close_time_gated_acs_do_not_block` constructs a spec with mixed checked / unchecked-time-gated ACs (all non-time-gated checked) and asserts: (a) close succeeds without `--force`, (b) status flips to `Closed`, (c) response identifies the time-gated-open AC ids.'
- id: ac-05
  description: 'CLI and MCP surfaces honour the new behaviour identically. The `--force` flag exists on both. Parity tests cover the three new branches: unchecked-AC rejection (ac-02), force-proceeds (ac-03), and time-gated allowance (ac-04). State mutations (canonical files + state.db) are byte-identical between surfaces; error structure is identical (category `conflict`, sentence-form message).'
  gate: true
  checked: true
  verification: Three new parity cases added to the existing parity test suites at `orbit-state/crates/cli/tests/parity.rs` and `orbit-state/crates/mcp/tests/parity.rs`. Each case runs the same operation through both surfaces and asserts (a) identical canonical files on disk, (b) identical state.db rows, (c) equivalent error structure where applicable.
- id: ac-06
  description: The existing unfinished-tasks guard at `verbs.rs:1147` is unchanged in behaviour. The existing `spec_close_rejects_unfinished_tasks` test continues to pass without modifying its assertions (test fixtures may need updated ACs but the behaviour assertion is untouched). A code comment in `spec_close` names the ordering choice between the two guards and the rationale (e.g. "tasks first because they're append-only and faster to read" or the reverse — whichever is chosen).
  gate: false
  checked: true
  verification: '`cargo test spec_close_rejects_unfinished_tasks` passes after fixture updates; assertion lines are unchanged from the pre-change version. The implementing agent leaves a comment at the choice point.'
- id: ac-07
  description: 'The happy path is preserved end-to-end. A spec with every AC `checked: true` (or unchecked + `time_gated: true`) closes exactly as today: no new prompts, no new flags required, status flips, the linked card''s `specs` array is updated. The `SpecCloseResult` response struct gains the new fields (`forced_unchecked: Vec<String>`, `time_gated_open: Vec<String>`) with `#[serde(default, skip_serializing_if = "Vec::is_empty")]` so happy-path responses remain byte-identical to the current shape; the struct does not gain `#[serde(deny_unknown_fields)]` (it lacks the decorator pre-change, verified at `orbit-state/crates/core/src/verbs.rs`), preserving forward-additive read compatibility for existing consumers.'
  gate: false
  checked: true
  verification: 'Existing tests `spec_close_flips_status_and_appends_to_linked_cards` (`verbs.rs:3454`), `spec_close_idempotent_when_card_already_has_ref` (`verbs.rs:3506`), and `spec_close_full_lifecycle_integration` (`verbs.rs:3973`) continue to pass after fixture updates that add `checked: true` to existing ACs. No assertion changes.'
- id: ac-08
  description: '`/orb:drive`''s close step surfaces the unchecked-AC error to the author before invoking close, naming the offending AC ids. If the author elects to proceed despite the gap, the drive invokes `orbit spec close --force` and captures a sentence-form rationale in the drive''s notes (or commit message) — so the substrate guard is honoured at the agent layer too. The wire is documentary in the skill prompt; enforcement happens at the substrate via ac-02 and ac-03.'
  gate: false
  checked: false
  verification: '`plugins/orb/skills/drive/SKILL.md` gains a close-step section that names: the AC pre-flight (`spec.close` will block if any non-time-gated AC is unchecked), the `--force` escape and when to use it, and the rationale-capture expectation. Manual review of the SKILL.md edit confirms the three points are present. A keyword grep for "time_gated" and "--force" in the skill returns hits.'
- id: ac-09
  description: 'Brew-released binary at the new version installs cleanly and the new behaviour is exercisable end-to-end. A spec with a deliberately-unchecked AC blocks close at the released binary; passing `--force` proceeds; an AC marked `time_gated: true` is excluded from the block. Release follows the existing `/orb:release` flow (bump Cargo.toml version, tag, brew tap update). This AC dogfoods the feature on its own delivery: once ac-01 has shipped (the `time_gated` field exists in the canonical schema), this AC is re-declared `time_gated: true` in spec.yaml as a deliberate one-line edit, so the spec can close cleanly with ac-09 still unchecked rather than requiring `--force` for its own release-window close.'
  gate: true
  checked: false
  verification: 'Sequencing: (1) ac-01 lands — `time_gated` field exists in the canonical schema; (2) this AC (ac-09) is amended in spec.yaml to add `time_gated: true` (substrate now accepts the field); (3) remaining ACs ship; (4) `orbit spec close` closes the spec cleanly because ac-09 is time-gated (no `--force`); (5) release runs via `/orb:release` — Cargo.toml bump, tag, brew tap update; (6) smoke on the released binary: `brew upgrade orbit` shows the new tag, then `orbit spec close <test-spec-with-unchecked-ac>` returns `Error::conflict`, `orbit spec close --force <same-spec>` succeeds, `orbit spec close <test-spec-with-only-time-gated-unchecked>` succeeds without `--force`; (7) smoke result captured in a follow-up memory or commit message, and ac-09''s `checked:` is flipped to `true` in a small follow-up commit. The flow validates the feature end-to-end on its own delivery without `--force` theatre.'
  time_gated: true
