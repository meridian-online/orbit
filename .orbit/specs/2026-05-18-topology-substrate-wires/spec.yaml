id: 2026-05-18-topology-substrate-wires
goal: Ship the topology capability envelope and UX wires — /orb:setup scaffolding, session prime topology_drift surface, spec.close topology_warnings with word-boundary heuristic, memory.remember --label topology nudge, and a 4-week observation audit — consuming the substrate shipped by spec 2026-05-18-documentation-topology. Intent contract and pinned approach in design-note.md.
cards:
- 0040-documentation-topology
status: closed
labels:
- spec
acceptance_criteria:
- id: ac-01
  description: '/orb:setup integration. Greenfield path scaffolds .orbit/config.yaml with docs.topology: docs/topology.md (the design-note''s default) and creates a stub docs/topology.md with a heading + a one-paragraph explainer + an empty entry list. Brownfield path detects whether .orbit/config.yaml exists and prompts to add the docs.topology key if missing (operator can decline; declining leaves the topology capability unconfigured but the rest of orbit still works). Brownfield-accept behaviour is explicit: if the target path named by docs.topology does not already exist on disk, /orb:setup ALSO creates the stub file at that path (suppresses first-prime drift noise that would otherwise fire because audit topology would flag a stale pointer). If the target path''s parent directory does not exist, /orb:setup creates the parent directory tree before writing the stub. If a file already exists at the target path, /orb:setup wires the pointer but does NOT overwrite the existing file. The /orb:setup SKILL.md gains a §6e (or equivalent placement) documenting the new scaffolding step in the same byte-compare-and-prompt voice as §6b for METHOD.md.'
  gate: false
  checked: true
  verification: Invoke /orb:setup in a scratch greenfield repo; assert .orbit/config.yaml exists with docs.topology=docs/topology.md and docs/topology.md exists with the stub content. Invoke /orb:setup in a scratch brownfield repo with no .orbit/config.yaml and no existing docs/topology.md; assert the operator is prompted; accept; assert both .orbit/config.yaml AND docs/topology.md are created. Invoke /orb:setup in a scratch brownfield repo with no .orbit/config.yaml but with an existing docs/topology.md; assert the pointer is wired but the existing file is not overwritten (byte-compare before/after). Brownfield-accept on a fixture where docs.topology=docs/architecture/topology.md and docs/architecture/ does not exist; assert both the directory tree and the stub are created. Re-invoke /orb:setup on the same brownfield repo; assert no prompt (idempotent on clean repo). Grep /orb:setup SKILL.md for the new step.
- id: ac-02
  description: orbit session prime envelope extends with a topology_drift field listing subsystems with drift. The session prime envelope today carries handover / item_bound / memories / next_step / open_specs (confirmed via `orbit --json session prime` against this repo on 2026-05-18). topology_drift is added as an additional key in data.result alongside those, additive and non-breaking. Each entry reuses the existing TopologyDriftEntry shape from orbit-state/crates/core/src/verbs.rs (shipped by parent spec ac-06 for audit topology) — do NOT redeclare the type; import or re-export it. Omit the topology_drift key iff `audit_topology(...).configured == false` (canonical predicate defined at verbs.rs:863-865 — true iff `.orbit/config.yaml` exists AND `docs.topology` is set). When configured and clean, the key is present and the value is an empty array. Parity test on CLI + MCP confirms the envelope shape across the four states.
  gate: true
  checked: true
  verification: orbit --json session prime on a fixture with a configured + clean topology returns an envelope where data.result.topology_drift is []. Same on a fixture with drift returns the populated array, each entry shaped per TopologyDriftEntry. Same on a fixture without .orbit/config.yaml returns an envelope without a topology_drift key (assert key absence, not empty array). Same on a fixture where .orbit/config.yaml exists but docs.topology is unset returns the envelope without a topology_drift key (skip-on-default fires on configured==false, not only on file-absent). Parity test in orbit-state/crates/cli/tests/parity.rs and orbit-state/crates/mcp/tests/parity.rs covers all four cases. Grep verbs.rs for a single TopologyDriftEntry definition (DRY assertion — no redeclaration in session_prime).
- id: ac-03
  description: spec.close emits a non-blocking topology_warnings field in its ok envelope when drift exists in subsystems the closing spec touched. "Subsystems touched" detection — read the spec's spec.yaml and (when present) interview.md and design-note.md, then for each topology entry whose subsystem name is ≥ 5 characters long, test for case-insensitive word-boundary match (regex \b<subsystem>\b) in the concatenated spec text. design-note.md is canonical sidecar substrate per the artefact table in METHOD.md and routinely names subsystems by their canonical handle when capturing the pinned approach — excluding it would blind the heuristic to its most discriminating evidence source. The subsystem name MUST be passed through regex::escape before interpolation into the \b...\b pattern — subsystem names may contain regex metacharacters (dots, hyphens, slashes) and an unescaped name would silently mis-match. Subsystems with names < 5 characters are excluded from the heuristic to suppress false-positives on short common tokens (memo, spec, ac). Entries reuse the existing TopologyDriftEntry shape from verbs.rs (same DRY rule as ac-02). A spec that modifies a subsystem will typically mention that subsystem's name and trigger a warning at its own close — this is intended; the warning is non-blocking, and self-reference is exactly the design intent. The warnings do NOT block closure (closure proceeds, exit 0) — they appear in the ok envelope's topology_warnings array. Parity test on CLI + MCP. Per-subsystem suppression via a topology.suppress array on Config is out of scope (named as deferred follow-on).
  gate: true
  checked: true
  verification: spec close on a fixture spec whose text contains the word-boundary subsystem name returns exit 0 with topology_warnings populated. spec close on a fixture spec whose text matches a subsystem name only as a substring (not word-bounded) returns topology_warnings empty for that subsystem. spec close on a fixture spec with a subsystem name < 5 characters anywhere returns topology_warnings empty for that subsystem (length filter holds). spec close on a fixture spec where the subsystem name appears ONLY in design-note.md (not spec.yaml or interview.md) returns topology_warnings populated — proves the design-note.md scan is wired. spec close on a fixture where a topology entry has a regex-metacharacter-bearing subsystem name (e.g. "foo.bar") returns the expected match/no-match outcome — proves regex::escape is applied (test fails if escape is missing). spec close in a repo without .orbit/config.yaml returns the existing envelope shape (no topology_warnings key — skip-on-default). Parity test on CLI + MCP.
- id: ac-04
  description: orbit memory remember with --label topology emits a "consider /orb:topology" nudge via the ok envelope (advisory field — envelope-side is the cross-surface contract). Implementation lives in the memory remember verb's post-store hook — checks the labels for "topology" and populates a nudge field on MemoryRememberResult when present. The nudge is non-blocking (memory still stores successfully) and quiet (suppressible via the --no-nudge flag — mirrors --no-edit / --no-verify naming convention). CLI renders the nudge to stderr in human mode (stderr is the conventional channel for advisory output; stdout is reserved for the primary verb output). Parity test confirms the nudge fires on CLI + MCP.
  gate: false
  checked: true
  verification: orbit memory remember <key> "<body>" --label topology stores the memory and emits the nudge ("consider /orb:topology" or near-equivalent — exact wording locked at implementation; grep for the literal string in verbs.rs). Without the label, no nudge fires (envelope's nudge field is None / absent). With --no-nudge, no nudge fires even when the label is present. CLI human mode renders the nudge to stderr (assert via captured stderr stream; stdout must NOT contain the nudge text). Parity test on CLI + MCP confirms the envelope shape. Grep the verbs.rs handler for the nudge-emission code path.
- id: ac-05
  description: '4-week observation audit of the topology capability. Earliest fire date: 2026-06-15 (parent spec ship-date 2026-05-18 + 4 weeks). Audit reads (a) the topology doc in this repo and any consumer repos where /orb:topology has been adopted, tabulating entry count and update frequency by subsystem, (b) memories labelled topology over the 4-week window, (c) topology_warnings counts emitted by spec.close over the window, (d) topology_drift counts emitted by session prime. Audit produces a memo at .orbit/memos/2026-06-15-topology-4-week-audit.md with the data tables and a recommendation — keep coaching as-is, tighten the audit heuristic, expand the trigger surfaces, or open a follow-on spec if the learning loop revealed a substrate gap. spec.close treats this AC as deferrable per the ac-taxonomy observation band (does not block close).'
  gate: false
  checked: false
  verification: Audit memo exists at .orbit/memos/2026-06-15-topology-4-week-audit.md on or after 2026-06-15. Memo includes entry-count table, update-frequency table, labelled-memory count, topology_warnings count, topology_drift count, recommendation. spec.close on this spec does NOT block on this AC (verifiable via spec.close's deferrable_open list including ac-05).
  ac_type: observation
