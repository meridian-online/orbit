id: 2026-05-19-workflow-conformance
goal: 'Ship `orbit audit conformance` as the agent-on-demand workflow audit. The verb returns a structured findings envelope (severity / subsystem / subject / state / evidence / remediation.verb per finding) covering three new finding families — plugin-canonical-file drift (METHOD.md byte-compare in v1; the inventory expands as the plugin adds further canonical files), card-state (maturity:planned + empty specs), and memo staleness (filename-date >7d) — alongside aggregated audit_drift and audit_topology results carried verbatim under `aggregated.{drift,topology}`. Each finding carries an explicit remediation verb the agent can run without translation. Per-repo plugin-version pin in `.orbit/config.yaml` defaults to current (sourced from the orbit-state binary''s CARGO_PKG_VERSION under lockstep release); pin_behind and pin_ahead each fire a single pin-state finding and suppress per-file findings (single-finding dominance). Audience is agent-first: zero-finding case is silent; the operator only sees output on agent escalation. Intent contract and full pivot rationale in interview.md.'
cards:
- 0039-workflow-conformance
status: open
labels: []
acceptance_criteria:
- id: ac-01
  description: 'ConformanceFinding schema + audit_conformance verb plumbed. orbit-state/crates/core/src/schema.rs gains a ConformanceFinding serde struct with FIELDS const (mirroring DriftEntry / TopologyDriftEntry shape). Required fields: severity (enum: high / medium / low), subsystem (slug-shaped string), subject (opaque path or id string), state (slug-shaped string — finding-family-specific, e.g. byte_drift / ready_for_design / stale / pin_behind / pin_ahead / missing), remediation (struct of {verb: required string, rationale: optional string}). Optional: evidence (free-form serde_yaml::Value for finding-family-specific structured context). orbit-state/crates/core/src/verbs.rs gains audit_conformance(layout, args: &AuditConformanceArgs) -> Result<AuditConformanceResult>, registered in the VerbRequest / VerbResponse dispatch and exposed as the `orbit audit conformance` subcommand on CLI and via MCP tools/call. AuditConformanceArgs has empty public fields in v1 (no CLI/MCP-visible options) — test injection of a controllable `today` (ac-03) lands on a sibling private helper `audit_conformance_at(layout: &OrbitLayout, today: time::Date) -> Result<AuditConformanceResult>`; the public verb calls this with `time::OffsetDateTime::now_local().expect("local offset").date()` (matches the existing `time` crate usage in verbs.rs; no new `chrono` dependency). AuditConformanceResult shape: {findings: Vec<ConformanceFinding>, aggregated: AggregatedAudits, pin: PinState}, where AggregatedAudits = {drift: AuditDriftResult, topology: AuditTopologyResult} reuses the existing types verbatim (byte-equal envelope shape vs the standalone sub-verb Results — see ac-06), and PinState = {pinned: Option<String>, current: String, status: enum(unpinned / matches / pin_behind / pin_ahead)}. Schema tests cover round-trip, deny-unknown-fields, missing-required-field, and severity / state slug-shape constraints. CLI + MCP parity test (one) covers the empty-fixture (clean repo, zero findings) envelope as the parity floor; per-family parity tests are covered in ac-02 / ac-03 / ac-04 / ac-05 / ac-06.'
  gate: true
  checked: false
  verification: 'Grep orbit-state/crates/core/src/schema.rs for `pub struct ConformanceFinding` and the FIELDS const. Run `cargo test -p orbit-state-core schema::conformance` and assert round-trip / unknown-field / missing-field tests pass. Grep verbs.rs for `fn audit_conformance` and the VerbRequest::AuditConformance dispatch arm. Invoke `orbit audit conformance --help` and assert the subcommand is registered. Invoke `orbit audit conformance --json` against an empty / clean fixture and assert envelope shape: {data: {result: {findings: [], aggregated: {drift: ..., topology: ...}, pin: {...}}, verb: "audit.conformance"}, ok: true}. Run the CLI ↔ MCP parity test on the clean-fixture invocation and assert byte-identical JSON payloads.'
- id: ac-02
  description: 'Card-state finding fires on planned + empty specs. audit_conformance walks `.orbit/cards/*.yaml` and emits one ConformanceFinding per card where `maturity == Planned && specs.is_empty()`. Finding shape: {severity: medium, subsystem: "cards", subject: <card.id>, state: "ready_for_design", evidence: {maturity: "planned", specs_count: 0}, remediation: {verb: "/orb:design <numeric-id>", rationale: "card has scenarios but no design pass"}}. Cards at other maturities (emerging / established) do NOT fire; planned cards with non-empty specs do NOT fire. Walk uses the existing Layout::list_card_files() scanner; parse via Card serde. The remediation.verb embeds the card''s numeric id (e.g. "/orb:design 39") matching the convention from `.orbit/conventions/id-conventions.md`.'
  gate: true
  checked: false
  verification: Unit test fixtures under orbit-state/crates/core/src/verbs.rs (or a sibling module). (a) Card at maturity planned with empty specs → exactly one finding fires with the documented shape. (b) Card at maturity planned with one entry in specs → no finding. (c) Card at maturity emerging with empty specs → no finding. (d) Card at maturity established → no finding. (e) Multiple planned + empty cards → one finding per card in declaration order. Assert each finding's remediation.verb is byte-equal to `/orb:design <numeric-id>` with the correct id substituted. CLI + MCP parity test covers the multi-finding fixture envelope.
- id: ac-03
  description: 'Memo-staleness finding fires on filename-date >7d. audit_conformance walks `.orbit/memos/*.md` via a new `Layout::list_memo_files()` helper (parity with the existing `list_card_files()` / `list_memory_files()` helpers in layout.rs) and emits one ConformanceFinding per memo whose filename-date is more than 7 days before today. Memo filename convention is `YYYY-MM-DD-<slug>.md` (per memo skill); parse the leading 10-char date from the filename via `time::Date::parse(&s[..10], &time::format_description::well_known::Iso8601::DATE)` (or the equivalent `time` API surface already imported in verbs.rs). Finding shape: {severity: medium, subsystem: "memos", subject: <memo path relative to .orbit/>, state: "stale", evidence: {filename_date: "<YYYY-MM-DD>", days_old: <N>}, remediation: {verb: "/orb:distill <relative-path>", rationale: "memo undistilled past 7-day threshold"}}. Memos with malformed filenames (no parseable leading date) are skipped silently (defensive — no panic, no finding). The 7-day threshold is a Rust constant in the verb implementation; no `.orbit/config.yaml` override in v1.'
  gate: true
  checked: false
  verification: 'Unit test fixtures. (a) Memo dated 8 days ago → finding fires with days_old: 8. (b) Memo dated exactly 7 days ago → no finding (strict >, not >=). (c) Memo dated 6 days ago → no finding. (d) Memo dated today → no finding. (e) Memo with filename `notes.md` (no leading date) → no finding, no panic. (f) Memo with filename `2026-99-99-bad.md` (invalid date) → no finding, no panic. Assert each fired finding''s remediation.verb is byte-equal to `/orb:distill <relative-path>`. Test uses a controllable `today` (inject via args or test helper) — do NOT rely on system clock in tests. CLI + MCP parity test covers a multi-memo fixture.'
- id: ac-04
  description: 'Plugin-canonical-file drift finding via byte-compare. The canonical-file inventory in v1 is the set of files /orb:setup copies verbatim from the plugin into the operator''s .orbit/. As of orbit 0.4.20, that set contains exactly ONE file: METHOD.md (per /orb:setup §6b). STYLE.md and .gitignore are NOT plugin-shipped today and therefore NOT in v1 scope — when the plugin starts shipping them via /orb:setup, ac-04''s inventory expands without a spec change because the implementation enumerates from a single CANONICAL_FILES const in the verb module. v1 const value: `[(".orbit/METHOD.md", include_str!("../../../../plugins/orb/skills/setup/METHOD.md"))]` (path is the operator-side target; the include_str! pulls the plugin''s canonical bytes at orbit-state compile time — the lockstep release contract per ac-05 means the binary''s embedded bytes always match its CARGO_PKG_VERSION). For each entry in CANONICAL_FILES: read the operator file at the named path; byte-equal → no finding; byte-different → finding with state byte_drift, evidence {canonical_size: usize, operator_size: usize}, remediation {verb: "orbit setup", rationale: "re-run setup to overwrite with canonical"}; operator file absent → finding with state missing, same remediation. Reuses §6b''s byte-equal comparison; no whitespace tolerance. Severity: medium for byte_drift and missing. NOTE: this AC fires findings only when the pin matches the installed plugin OR is unpinned — pin_behind AND pin_ahead both suppress per-file findings per ac-05 (single-finding dominance: the pin issue is upstream of file drift).'
  gate: true
  checked: false
  verification: 'Unit test matrix for METHOD.md (the v1 canonical-file inventory): (a) operator `.orbit/METHOD.md` byte-equal to the include_str!-embedded canonical → no finding; (b) operator file byte-different (one char changed) → finding with state byte_drift, remediation.verb = "orbit setup"; (c) operator file absent → finding with state missing, same remediation. Assert no finding fires for files outside CANONICAL_FILES (e.g. `.orbit/STYLE.md`, `.orbit/.gitignore`, `.orbit/conventions/id-conventions.md`) — those are out of scope until the plugin starts shipping them. Assert the canonical bytes embedded via include_str! match the source `plugins/orb/skills/setup/METHOD.md` exactly (compile-time invariant — no runtime drift). CLI + MCP parity test covers a fixture with `.orbit/METHOD.md` byte-different.'
- id: ac-05
  description: 'Plugin-version pin + pin-state collapses per-file findings. orbit-state Config gains a top-level `plugin_version: Option<String>` field parsed from `.orbit/config.yaml` (serde default is None for unpinned). Field shape: semver-compatible string ("0.4.18"); no validation beyond non-empty when present. The Config::FIELDS const (used by the canonicaliser + verify_all to detect unknown-field drift) is extended in the same edit so `plugin_version` is recognised as a canonical Config key — adding the struct field without updating FIELDS would silently break `orbit verify` on any repo with the field populated. PinState derivation: the "installed plugin version" is read from `env!("CARGO_PKG_VERSION")` of the orbit-state binary at compile time. This relies on the lockstep release contract: the orbit-state binary version and the plugin manifest version (`plugins/orb/.claude-plugin/plugin.json`) are bumped together in every release (verified by /orb:release §1.4 substrate-binary parity gate). The pinned version is read from Config.plugin_version. Compare via semver crate (or string-equality plus a parsed PartialOrd). Four PinState.status values: unpinned (field absent), matches (pinned == current), pin_behind (current > pinned — installed is newer), pin_ahead (current < pinned — installed is older than the operator pinned, anomalous). On pin_behind, audit_conformance emits ONE finding: {severity: medium, subsystem: "setup", subject: ".orbit/config.yaml", state: "pin_behind", evidence: {pinned: "<vN.N.N>", current: "<vM.M.M>"}, remediation: {verb: "orbit setup --bump-pin", rationale: "installed plugin is ahead of pinned version — bump or re-run setup"}} AND suppresses the per-file byte-drift findings from ac-04. On pin_ahead, audit_conformance emits ONE finding: {severity: high, subsystem: "setup", subject: ".orbit/config.yaml", state: "pin_ahead", evidence: {pinned: "<vN.N.N>", current: "<vM.M.M>"}, remediation: {verb: "orbit setup --bump-pin", rationale: "installed plugin is older than pinned version — install matching plugin or rewrite pin"}} AND ALSO suppresses per-file byte-drift findings (single-finding dominance: the pin is upstream of file drift, regardless of direction). Agent escalates pin_ahead to operator because the bytes-on-disk don''t match the operator''s declared canonical version. aggregated.drift / aggregated.topology continue to surface substrate-level drift unrelated to the pin under both pin states. Pin-bump remediation: `orbit setup --bump-pin` re-runs setup at the current binary version and rewrites the pin to match — implementing agent adds the flag if absent, or documents that `orbit setup` already rewrites the pin and `--bump-pin` is an alias. PinState round-trips through Config::from_str and the canonical writer (orbit verify clean after edit).'
  gate: true
  checked: false
  verification: 'Schema test: Config parses `.orbit/config.yaml` with `plugin_version: "0.4.18"` at top level; round-trips through canonical writer. Unit test matrix on PinState derivation (with installed version mocked via a test helper that overrides the const, or by parameterising `installed: &str` on the private helper): (a) field absent → unpinned; (b) field == installed → matches; (c) field < installed → pin_behind; (d) field > installed → pin_ahead. Behaviour matrix: (a) pin_behind fires exactly one pin_behind finding (severity medium) AND suppresses ac-04 byte-drift findings (assert findings list does NOT contain byte_drift entries even when METHOD.md differs); (b) pin_ahead fires exactly one pin_ahead finding (severity high) AND ALSO suppresses ac-04 byte-drift findings (symmetric to pin_behind); (c) matches and unpinned do NOT fire pin_behind / pin_ahead and DO surface ac-04 findings when METHOD.md differs. Integration test: invoke `orbit setup --bump-pin` (or `orbit setup` if it''s the existing path) against a fixture with `plugin_version: "0.4.18"` and the binary at 0.4.20; assert post-invocation config has `plugin_version: "0.4.20"`. CLI + MCP parity test on both pin_behind and pin_ahead envelopes.'
- id: ac-06
  description: 'Aggregate over audit_drift + audit_topology. AuditConformanceResult.aggregated is a struct `AggregatedAudits { drift: AuditDriftResult, topology: AuditTopologyResult }` carrying the existing sub-verb result types VERBATIM — same field shapes, same JSON serialisation. audit_conformance invokes audit_drift and audit_topology internally and embeds the returned Results unchanged. The composition is non-mutating: audit_drift and audit_topology continue to exist as independent CLI/MCP verbs with unchanged signatures and parity contracts. AuditConformanceResult.findings does NOT duplicate sub-verb findings — schema drift entries live exclusively at `aggregated.drift.drift` (the existing `Vec<DriftEntry>` field on AuditDriftResult); topology drift entries live exclusively at `aggregated.topology.topology_drift` (the existing `Vec<TopologyDriftEntry>` field on AuditTopologyResult, alongside its existing `configured: bool` field). Byte-equal contract: serialising AuditConformanceResult.aggregated.drift produces JSON byte-identical to the standalone `orbit audit drift --json`''s `data.result` payload (modulo wrapping); same for aggregated.topology vs `orbit audit topology --json`. The conformance envelope lets an agent read all three audits from one invocation rather than three. Aggregation runs unconditionally on every conformance call (even when topology is unconfigured — `aggregated.topology.configured == false` is a valid state).'
  gate: true
  checked: false
  verification: 'Integration test fixture combining: (a) one schema-field drift case (`.orbit/cards/<id>.yaml` with an unknown field — audit_drift would detect); (b) one topology drift case (`.orbit/topology/<entry>.yaml` with a stale_pointer — audit_topology would detect); (c) one stale memo (>7d — ac-03 detects). Invoke `orbit audit conformance --json`; assert: `data.result.aggregated.drift.drift` contains the schema DriftEntry; `data.result.aggregated.topology.topology_drift` contains the TopologyDriftEntry; `data.result.aggregated.topology.configured` is true; `data.result.findings` contains exactly one entry (the stale memo) — no duplication of schema/topology entries in findings. Run `orbit audit drift --json` and `orbit audit topology --json` independently against the same fixture and assert the sub-verb `data.result` payloads serialise byte-identical to the corresponding `aggregated.{drift,topology}` slices of the conformance result. Also verify the unconfigured-topology case: fixture without `.orbit/topology/` populated → `aggregated.topology.configured == false` and `aggregated.topology.topology_drift` is empty; audit_conformance still succeeds (the unconfigured branch is not a fault). CLI + MCP parity test on the combined-drift fixture.'
- id: ac-07
  description: 'Clean repo zero findings, exits 0, idempotent. When the operator repo matches the pinned plugin contract on all three new finding families AND audit_drift is clean AND audit_topology is clean, audit_conformance returns `{findings: [], aggregated: {drift: clean, topology: clean}, pin: matches-or-unpinned}` and the CLI exits 0. The verb is read-only — re-invocation produces byte-identical envelope output. Agent reads zero findings as "no workflow drift, propose new work."'
  gate: false
  checked: false
  verification: Fixture matching all clean criteria (no card-state findings, no stale memos, all three canonical files byte-equal to canonical, audit_drift clean, audit_topology clean, pin matches-or-unpinned). Invoke `orbit audit conformance --json` twice; assert (a) both exit 0; (b) both return zero findings; (c) both produce byte-identical JSON output (read-only idempotence). Assert exit code 0 with `--json` and 0 in human mode.
- id: ac-08
  description: Cross-skill prose discovery surface. Update plugins/orb/skills/setup/SKILL.md with a new section (likely §6e or a top-level discovery note) naming `orbit audit conformance` as the audit verb paired with /orb:setup — operators discover the verb as part of setup; agents discover it via the setup SKILL.md prose. Update plugins/orb/skills/setup/METHOD.md ("Substrate rules" or equivalent) with a one-line mention of the verb. Update CLAUDE.md (or its referenced files) only if the consumer-facing prose surfaces the verb. NO new `/orb:*` SKILL.md is created — the verb is CLI/MCP-only; agents call it directly via Bash. The /orb:setup SKILL.md prose names what the verb does (workflow conformance), what it returns (structured findings envelope), and what the agent should do with findings (triage + remediate per finding's remediation.verb).
  gate: false
  checked: false
  verification: 'Grep plugins/orb/skills/setup/SKILL.md for `orbit audit conformance` AND assert that within the SAME section (the contiguous prose block under the markdown header where the verb first appears — not "anywhere in the file") all three documented claims appear: (a) what the verb does — phrase matching "workflow conformance" or "audit … substrate"; (b) what it returns — phrase matching "structured findings" or "findings envelope"; (c) what the agent should do — phrase matching "remediation" (the per-finding remediation handle the agent acts on). Grep plugins/orb/skills/setup/METHOD.md for `orbit audit conformance`. Assert no new SKILL.md file under plugins/orb/skills/ is named "conformance" or similar (verb is not surfaced as a /orb:* skill — agent-only consumer). Grep CLAUDE.md (project + global, if relevant) for the verb name; mention is optional, but if present, the same three-phrase requirement applies.'
  ac_type: doc
