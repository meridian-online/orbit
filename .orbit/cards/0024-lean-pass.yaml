id: 0024-lean-pass
feature: Lean pass — periodic system-level audit against accretion
as_a: orbit user
i_want: a recurring discipline that surfaces stale or duplicate artefacts (memories, skills, choices, cards, specs, branches, prose, code) — flagging candidates without auto-acting
so_that: the workflow stays lean as artefacts accrete; signal-from-noise is automated, judgement stays human; lean stays a tool rather than becoming a bureaucracy
goal: artefacts stay lean as the project ages; accretion is detected by mechanical signals; archive (recoverable) is the default action; lean is a recurring discipline, not a heroic-effort event
maturity: planned
scenarios:
- name: Lean is the inverse of distill
  given: an orbit project under steady operation
  when: a lean pass runs
  then: it identifies what to remove (stale, duplicate, superseded), not what to extract — distill extracts signal from raw input, lean removes artefacts that no longer carry it
  gate: false
- name: Each category has signal, action, cadence, recovery
  given: a lean category (memory, skills, choices, cards, specs, memos, branches, code, CLAUDE.md drift)
  when: the audit runs
  then: each is checked against its signal (mtime, status field, length, dependency); action is named (archive, supersede, compress, refactor); cadence is known; recovery path is documented
  gate: false
- name: Three cadences operate
  given: an orbit project's lifecycle
  when: lean runs
  then: per-session-close (light — mostly memory dedup), per-release (heavy — every category), age-triggered (automated alerts; reports only, never auto-acts)
  gate: false
- name: No-op is success
  given: nothing has accreted since the last lean
  when: the audit runs
  then: it returns "clean" and stops — no theatre, no padding, no manufactured items to act on
  gate: true
- name: Threshold-driven, never judgement-driven
  given: an artefact below the staleness threshold (e.g., memory < 30d, skill < 30d)
  when: the audit runs
  then: it is ignored entirely; judgement only fires past threshold; per-item deliberation has a clear gate
  gate: false
- name: Archive, never delete
  given: an item marked for removal
  when: the action is taken
  then: it is archived (recoverable); deletion is reserved only for items lean explicitly identifies as fully superseded with another record holding their content
  gate: true
- name: Lean is bounded by budget
  given: a per-release lean
  when: it runs
  then: it caps at one hour; if more lean is needed, it spawns a follow-up; lean-as-ceremony (auditing for the sake of auditing) is the named failure mode
  gate: false
specs:
- .orbit/specs/2026-05-10-repo-cruft-removal.yaml
relations:
- card: 0002-distill
  type: depends-on
  reason: lean is the inverse operation of distill — same mechanism, opposite direction (extract vs remove)
