relations:
- card: 0026-executive-communication
  type: feeds
  reason: the principle of paying the compression cost extends from agent prose to agent questions — the agent should offer prose for the author to react to rather than extract prose from the author via Q&A
- card: 0028-four-pillars
  type: feeds
  reason: grounds in pillar 1 (executive interaction) — design sessions that drift to implementation burn the author's attention budget on questions they cannot usefully answer
