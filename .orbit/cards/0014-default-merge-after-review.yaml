id: 0014-default-merge-after-review
feature: Default-merge after review-pr approval
as_a: author
i_want: the agent to merge a PR automatically once review-pr returns APPROVE, while still notifying me and preserving my override
so_that: the substantive review (cold-fork, context-separated) is the actual quality gate, not a rubber-stamp ceremony I have to perform after it
goal: review-pr's verdict is the merge gate; APPROVE merges by default with notification, REQUEST_CHANGES and BLOCK do not
maturity: planned
scenarios:
- name: Cold-fork APPROVE auto-merges
  given: a PR has been opened and review-pr has run as a forked context-separated agent
  when: the verdict is APPROVE
  then: the agent merges the PR without waiting for an explicit "merge it" approval from the author
  gate: false
- name: Author retains visibility, not a blocking step
  given: a PR is about to be auto-merged after APPROVE
  when: the merge fires
  then: the author is notified of the merge (PR opened, review verdict, merge timestamp) — the author sees the PR but is not a blocking step in the pipeline
  gate: false
- name: Override remains available
  given: an auto-merge is configured
  when: the author wants to reject or hold a PR
  then: the author can do so at any point — auto-merge is the default behaviour on APPROVE, not a removal of the human from the loop
  gate: false
- name: Non-APPROVE verdicts do not auto-merge
  given: review-pr returns REQUEST_CHANGES or BLOCK
  when: the agent considers next steps
  then: no merge fires — the verdict routes through the existing NO-GO / request-changes paths exactly as today
  gate: false
- name: Removes ceremony from the drive pipeline
  given: a /orb:drive run reaches the review-pr stage
  when: the cold-fork reviewer approves
  then: drive merges and continues without pausing for a "merge it" handshake — the only operator-bottleneck step in full-autonomy drive is removed
  gate: false
specs: []
relations:
- card: 0007-drive-forked-reviews
  type: depends-on
  reason: review-pr already runs as a forked context-separated agent — the gate this card relies on
- card: 0005-drive
  type: feeds
  reason: the "Full autonomy drive" scenario in 0005 currently says "pausing only for PR merge" — this card removes that pause
references:
- .orbit/cards/memos/2026-04-29-merge-approval-ceremony.md
- .orbit/cards/0007-drive-forked-reviews.yaml
- .orbit/cards/0005-drive.yaml
notes: []
