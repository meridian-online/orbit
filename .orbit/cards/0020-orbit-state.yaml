id: 0020-orbit-state
feature: orbit-state — files-canonical agent substrate
as_a: agent working in an orbit project
i_want: a Rust + SQLite + MCP state manager where text files are the canonical truth and a SQLite index is rebuildable from them, exposed through MCP verbs so I never edit raw YAML
so_that: agent state is git-trackable, branch-aware, recoverable from clone alone, inspectable without learning new tools, and queryable at scale via the index — while format integrity is parser-enforced rather than trust-enforced
goal: agent state is files-canonical with a derived SQLite index; git is the version control; the MCP server is the operator that protects format integrity, atomicity, and concurrency without the agent ever touching raw files
maturity: planned
scenarios:
- name: Files are canonical, database is derived
  given: an orbit project with state in .orbit/
  when: the SQLite index is deleted
  then: orbit-state rebuilds the index from the files alone — no data loss, no separate canonical store; files are the source of truth
  gate: true
- name: Git diff shows semantic state changes
  given: a state mutation (e.g., spec status change, task event appended)
  when: I look at git diff
  then: the change is visible as a normal file diff; PR review can see state mutations alongside code changes
  gate: false
- name: Branches carry their own state
  given: an experimental branch with diverging spec progress
  when: I check out the branch
  then: the spec state on that branch is what's in the files; checking out main returns main's state — no separate Dolt branching needed
  gate: false
- name: Agent invokes via MCP, never touches raw YAML
  given: an agent claiming a spec
  when: it calls orbit spec.claim <id> through the MCP server
  then: the server round-trips through serde; the file is rewritten in canonical format; agents never edit YAML directly
  gate: true
- name: Cross-machine sync is just git
  given: I clone the repo on a new machine
  when: I run orbit prime
  then: all spec state, memories, and active tasks are present — no separate database sync, no Dolt push/pull, no .beads/ reinit dance
  gate: false
- name: Single binary, no runtime dependencies
  given: a fresh machine
  when: I install orbit-state
  then: one statically-linked binary works — no Go runtime, no Python venv, no embedded Dolt
  gate: false
- name: The .orbit/.gitignore selectively tracks
  given: an orbit-state repo
  when: I inspect .orbit/
  then: cards, choices, specs, memories, memos are tracked; state.db, schema-version, locks/ are gitignored — canonical files travel with git, derived index does not
  gate: false
