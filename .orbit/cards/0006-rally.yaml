  type: depends-on
  reason: rally consumes the specs tabletop produces — each spec carries its own pre-flight contract that drives consume
- card: 0005-drive
  type: feeds
  reason: rally spawns drives; each drive is one fan-out track within the rally
- card: 0007-drive-forked-reviews
  type: depends-on
  reason: the cold-fork review fan-out is the post-rally quality gate; preserved from v1
