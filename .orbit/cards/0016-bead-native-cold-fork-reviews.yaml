id: 0016-bead-native-cold-fork-reviews
feature: Bead-native cold-fork reviews
as_a: author
i_want: /orb:review-spec and /orb:review-pr to read directly from the bead's structured acceptance field, with the same rule coverage they had against spec.yaml
so_that: the cold-fork review gate doesn't silently degrade as orbit migrates from spec.yaml to beads — production projects get the full review depth they had under 0.3.3
goal: review-spec and review-pr operate on the bead acceptance field with rule-coverage parity to the prior spec.yaml-based reviewers — zero regression in the cold-fork review gate's depth
maturity: emerging
scenarios:
- name: review-spec reads bead via bd show, not a markdown snapshot
  given: drive has reached its review-spec stage with bead BEAD-123
  when: drive forks /orb:review-spec
  then: the forked reviewer reads the bead's description, acceptance field, and metadata via `bd show BEAD-123 --json` rather than reading a pre-rendered markdown snapshot file
  gate: false
- name: Gate-AC verification check fires on parsed acceptance entries
  given: a bead has gate-marked acceptance criteria with verification text
  when: review-spec runs Pass 1's gate-AC verification check
  then: the deterministic rules (non-empty, not-placeholder, ≥20 chars) fire against each gate AC's verification field — currently they silently no-op because the snapshot drops the verification structure
  gate: true
- name: Acceptance-field parser is shared with implement
  given: review-spec/review-pr need to parse the bead acceptance field
  when: the skill resolves the structured AC list
  then: it uses plugins/orb/scripts/parse-acceptance.sh — the same parser /orb:implement uses — so AC interpretation cannot drift between implement and review
  gate: false
- name: review-pr cross-references PR diff against bead acceptance
  given: a PR exists for bead BEAD-123 and review-pr has been forked
  when: the reviewer evaluates AC coverage
  then: the reviewer reads the bead's acceptance field directly (not a snapshot) and cross-references each AC against `git diff main...HEAD`, producing per-AC coverage findings
  gate: false
- name: Cold-fork architecture is preserved
  given: drive forks a reviewer
  when: the Agent tool is invoked
  then: the reviewer runs in a fresh general-purpose subagent with zero shared conversation history, exactly as today — substrate change does not alter the fork contract (decision 0011 D2)
  gate: false
- name: Verdict contract is unchanged
  given: a reviewer has reached a verdict
  when: the verdict is written
  then: the canonical line format `**Verdict:** APPROVE | REQUEST_CHANGES | BLOCK` is used at the same path drive expects (`orbit/reviews/<bead-id>/review-{spec,pr}-<date>.md`) — drive's verdict-parsing logic does not change
  gate: false
- name: Bead snapshot is removed from drive's review path
  given: review-spec and review-pr now read the bead directly
  when: drive enters a review stage
  then: no `bead-snapshot-<date>.md` file is written or read for review purposes — the snapshot mechanism (orbit-6da.2 bridge) is removed since reviewers query bd directly
  gate: false
- name: Coverage parity with 0.3.3 spec.yaml flow
  given: a bead derived from a card with constraints, gate ACs, and verification text
  when: review-spec runs against it
  then: every rule that fired under 0.3.3's spec.yaml flow (constraint conflicts, gate-AC verification, AC testability, content signal scan) fires against the bead substrate with equivalent or better coverage
  gate: false
- name: Production rollout is unblocked by this card
  given: the spec-heavy downstream projects (FineType, Brightfield, Arcform, and others) have not yet migrated to bead-native orbit
  when: this card ships
  then: review-gate quality regression is removed and the 0.4.0 release can be cut without exporting a degraded review depth to production projects
  gate: false
specs:
- .orbit/specs/2026-05-01-bead-native-cold-fork-reviews/spec.yaml
relations:
- card: 0007-drive-forked-reviews
  type: depends-on
  reason: 0007 established that drive runs reviews as forked context-separated agents — this card is the substrate change to that mechanism
- card: 0004-specs-array-integrity
  type: feeds
  reason: when this card ships, drive no longer writes spec.yaml so the specs-array-integrity gap (memo 2026-04-20) does not apply to bead-native drives
- card: 0007-drive-forked-reviews
  type: superseded-by
  reason: deprecation supersedure
- card: 0020-orbit-state
  type: superseded-by
  reason: deprecation supersedure
references:
- '.orbit/choices/0011-beads-execution-layer.md §D2: ''Cold-fork stays. Reads from beads (acceptance field) instead of spec.yaml.'''
- 'plugins/orb/skills/drive/SKILL.md §1.1: current bead-snapshot bridge mechanism that this card replaces'
- 'plugins/orb/skills/review-spec/SKILL.md: current rules calibrated for spec.yaml; need substrate update'
- 'plugins/orb/skills/review-pr/SKILL.md: same'
- 'plugins/orb/scripts/parse-acceptance.sh: the shared bead acceptance parser /orb:implement uses today'
- '.orbit/cards/memos/2026-04-20-specs-array-prose-enforcement-gap.md: dissolves under bead-native drive'
notes: []
