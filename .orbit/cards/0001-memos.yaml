id: 0001-memos
feature: Capture rough ideas as memos
as_a: author
i_want: to jot down a rough idea — typed in markdown or dictated as a voice memo — and have it live in the card pipeline
so_that: I do not lose ideas that are not yet structured enough for a full card; capture is friction-free regardless of input medium
goal: Capture rough ideas — typed or dictated — without forcing structure, so the pipeline never loses unformed thinking.
maturity: established
scenarios:
- name: Quick capture from a note-taking app
  given: I have a half-formed idea written in Obsidian or similar
  when: I save it as .orbit/cards/memos/YYYY-MM-DD-slug.md
  then: it is part of the orbit workflow and discoverable alongside cards
  gate: false
- name: Voice memo as an input path
  given: I am away from the keyboard and have an idea
  when: I record a voice memo and the transcription (Whisper or similar) lands at .orbit/cards/memos/YYYY-MM-DD-slug.md
  then: the memo joins the same pipeline as typed memos — input medium does not affect downstream handling
  gate: true
- name: Memo is freeform
  given: I am capturing an idea quickly
  when: I write or dictate the memo
  then: there is no required structure — any markdown is valid
  gate: false
- name: Session start surfaces memos
  given: memos exist in .orbit/cards/memos/
  when: a new session starts
  then: orbit prime mentions outstanding memos so the agent knows what is awaiting distillation
  gate: false
- name: Memo referenced after distill
  given: a memo has been distilled into a card
  when: I look at the resulting card
  then: the card's references field points back to the memo
  gate: false
- name: Memo deleted after promotion
  given: a memo has been distilled into one or more cards
  when: the cards are written and Hugh approves
  then: the memo is deleted (or archived under cards/memos/.archive/) — memos do not accumulate post-distillation
  gate: false
specs:
- .orbit/specs/2026-04-04-memos/spec.yaml
relations: []
references:
- cards are living documents — no done/ directory, git history is the audit trail
- '.orbit/cards/memos/2026-05-06-orbit-unarchive.md: voice-memo path articulated as input substrate'
notes: []
