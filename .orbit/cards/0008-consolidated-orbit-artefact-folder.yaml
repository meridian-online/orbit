id: 0008-consolidated-orbit-artefact-folder
feature: Consolidated orbit artefact folder under .orbit/
as_a: developer using the orbit workflow
i_want: all orbit-managed artefacts (cards, choices, specs, memories, memos, derived index) to live under a single hidden .orbit/ folder with selective gitignore
so_that: the repo root stays clean, orbit's workflow state is clearly distinguished from source code, canonical files are git-tracked while the derived index is not, and the cognitive footprint of adopting orbit in a project is minimal
goal: Orbit-workflow artefacts in any project live under a single .orbit/ folder with selective gitignore (canonical files tracked, derived index ignored); no cards/, specs/, decisions/, or choices/ directory appears at the repo root or under orbit/
maturity: planned
scenarios:
- name: Fresh project adopts orbit-state
  given: a new project runs /orb:setup
  when: setup completes
  then: a single .orbit/ directory is created at the repo root, containing cards/, choices/, specs/, memories.jsonl, the derived state.db, and a shipped .gitignore — no orbit artefact folders appear at the repo root
  gate: true
- name: Selective gitignore inside .orbit/
  given: a freshly initialised .orbit/ directory
  when: I inspect .orbit/.gitignore
  then: it ignores state.db, schema-version, locks/ (derived index, gitignored); cards/, choices/, specs/, memories.jsonl are tracked (canonical files, in git)
  gate: true
- name: Skills write to the .orbit/ folder
  given: a user runs /orb:card, /orb:tabletop, /orb:spec, or any skill that persists an artefact
  when: the skill writes its output
  then: the file lands under .orbit/<subdir>/ (e.g. .orbit/cards/NNNN-slug.yaml, .orbit/specs/<id>.yaml) — never at the repo root, never under orbit/
  gate: false
- name: Skills read from the .orbit/ folder
  given: a skill needs to load prior artefacts (e.g. /orb:tabletop reading a card, /orb:review-pr finding the spec for a PR)
  when: the skill looks up paths
  then: it resolves them under .orbit/ — no skill references bare cards/, specs/, decisions/, or discovery/ at the root
  gate: false
- name: Hooks and scripts respect the new layout
  given: orbit prime, file-watchers, or coherence scans look for outstanding memos, active specs, or keyword matches
  when: they run
  then: they scan .orbit/memos/, .orbit/specs/, .orbit/choices/ — not the old locations
  gate: false
- name: Migration from orbit/ to .orbit/ ships with orbit-state
  given: an existing orbit-using repo with .orbit/cards, .orbit/choices, .orbit/specs at its root
  when: the repo upgrades to orbit-state
  then: a one-shot migration moves the directories under .orbit/ (renaming decisions → choices and converting MD → YAML in the same pass); cross-references inside shipped artefacts are rewritten; a grep for the old paths in any live file returns nothing
  gate: false
- name: orbit repo migrates itself when orbit-state ships
  given: this repository currently has .orbit/cards, .orbit/choices, .orbit/specs at orbit/
  when: orbit-state v0.1 ships
  then: a migration spec opens to move artefacts into .orbit/ — orbit dogfoods its own setup migration, just as it dogfoods every other capability
  gate: false
specs:
- .orbit/archive/specs/2026-04-20-orbit-artefact-folder/spec.yaml
- .orbit/specs/2026-05-10-spec-folders-migration/spec.yaml
- .orbit/specs/2026-05-16-memos-own-folder/spec.yaml
relations:
- card: 0020-orbit-state
  type: depends-on
  reason: the substrate for the .orbit/ layout is orbit-state; without it, the folder is just convention
- card: 0017-setup-is-bead-aware
  type: feeds
  reason: setup creates the .orbit/ structure as part of its bootstrap
references:
- '.orbit/memos/2026-05-06-orbit-state.md: the .orbit/ layout with selective gitignore'
- '.orbit/choices/0015-orbit-state-architecture.md: substrate decision that ships the layout'
- '.orbit/choices/0016-choices-vocabulary.md: decisions/ → choices/ rename within orbit'
notes:
- 'The hidden directory mirrors how .git/ and .beads/ work — tool-managed state in one place. Difference: .orbit/.gitignore *selectively* tracks the canonical files (cards, choices, specs, memories) and ignores the derived index (state.db, schema-version, locks).'
- No top-level designs/ folder. Per rally/drive (plugins/orb/skills/rally/SKILL.md), design artefacts live inside the per-spec context — there is no flat designs/NNNN-<slug>.md pattern.
