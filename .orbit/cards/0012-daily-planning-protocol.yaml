id: 0012-daily-planning-protocol
feature: Structured daily human-agent sync
as_a: author
i_want: a daily planning session with defined inputs, outputs, and expected duration
so_that: vision, prioritisation, and unblocking happen efficiently and set the ceiling on the next day's autonomous work
goal: two hours of daily planning yields twenty-two hours of autonomous execution
maturity: planned
scenarios:
- name: Planning session has defined inputs
  given: shift reports have accumulated since the last planning session
  when: I begin the daily planning session
  then: the agent presents objective function status, shift report summaries, blocked items, and pending decisions in a structured format
  gate: false
- name: Planning session produces priority changes
  given: I review the accumulated shift reports and objective status
  when: I make prioritisation decisions
  then: the agent updates work priorities, unblocks items, and records decisions
  gate: false
- name: Planning session surfaces new work
  given: the objective function or shift reports reveal gaps
  when: I identify new cards or memos
  then: new direction artefacts are captured without leaving the planning flow
  gate: false
- name: Planning session stays under two hours
  given: I begin a daily planning session
  when: the session runs
  then: the protocol is designed to complete within two hours, covering all active projects
  gate: false
- name: Planning quality sets the autonomous ceiling
  given: decisions and priorities are set during planning
  when: the next cron cycle begins
  then: agents work within the bounds established during planning without requiring further human input until the next session
  gate: false
- name: Pending decisions are resolved
  given: cron runs surfaced decision boundaries they could not resolve
  when: the planning session addresses them
  then: decisions are made, recorded, and the corresponding work is unblocked
  gate: false
specs: []
relations:
- card: 0010-objective-functions
  type: depends-on
  reason: objective function status is a primary planning input
- card: 0011-cron-driven-execution
  type: depends-on
  reason: shift reports and blocked items from cron runs feed the planning session
references:
- '.orbit/discovery/orbit-autonomy.md: §Daily planning sessions become the linchpin'
- '.orbit/discovery/orbit-autonomy.md: §Orbit''s own objective function — less than two hours per day managing agents'
notes: []
