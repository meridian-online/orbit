id: 0028-four-pillars
feature: Four pillars — the load-bearing user outcomes orbit exists to deliver
as_a: orbit author / contributor / agent
i_want: a named, single-source articulation of the four user outcomes orbit optimises for, with every card citing which pillar(s) it serves
so_that: cards, skills, and design choices are evaluated against an explicit why-test rather than argued in isolation — and new contributors / future agents inherit the framework that has been held implicitly
goal: orbit's four user outcomes are documented in CLAUDE.md and README.md, and the relations graph that pillar-defining cards form (each pillar has cards that operationalise it) is the framework's structural wire; cards may declare pillar contribution via existing relations:feeds edges, optional and emergent at distill time
maturity: emerging
scenarios:
- name: The four pillars are named in canonical text
  given: a contributor or agent reading the project for the first time
  when: they read CLAUDE.md or README.md
  then: they encounter the four pillars as a top-level section — executive-level interaction, agent self-learning, agent state-persistence, long-running R&D — stated as user outcomes, not mechanisms
  gate: true
- name: Cards may declare pillar contribution via the relations graph
  given: a card is being drafted, distilled, or audited
  when: the card is reviewed
  then: 'cards may declare pillar contribution via an existing `relations: feeds` edge to a pillar-defining card (one of those 0028 itself names — 0026, 0023, 0022, 0009, 0020, 0006) — optional and emergent at distill time, not a required schema field; cards that cannot make the claim are not blocked, but the question may surface during retrospective curation'
  gate: true
- name: Existing cards are audited and annotated
  given: this card is filed
  when: a one-time audit pass runs across .orbit/cards/
  then: every existing card has a pillar field added; cards serving no pillar after honest examination are re-scoped, merged, or retired
  gate: false
- name: Distill is silently pillar-aware
  given: a memo being distilled into a card
  when: the agent drafts the card
  then: 'the agent reads card 0028''s pillar-defining cards as context and may propose a `relations: feeds` entry in the draft if the candidate aligns with a pillar mechanism — pillar awareness informs shaping silently; the pillar question is not surfaced to the author as an interview question'
  gate: false
- name: Design and review-spec read parent's pillar relations as context
  given: 'a card with `relations: feeds` edges to a pillar-defining card enters /orb:design or /orb:review-spec'
  when: the spec is being shaped or reviewed
  then: the agent reads the parent's pillar relations as agent-side context — informing question selection in design and drift detection in review-spec — without surfacing the pillar to the author as a mid-flow question
  gate: false
- name: Pillar theatre is rejected
  given: a card claiming to serve all four pillars
  when: review evaluates the claim
  then: the card is split or its pillar list is reduced — the test is exclusion, not inclusion; cards claiming more than two pillars are split
  gate: false
- name: The four pillars do not grow by accretion
  given: a candidate capability that doesn't fit any of the four pillars
  when: someone proposes adding a fifth pillar
  then: the proposal is rejected at the pillar level — the candidate is examined for whether it is truly a user outcome of orbit, not whether to grow the framework
  gate: false
- name: Wired into the framework
  given: this card declares the four pillars as the why-test
  when: enforcement is examined
  then: CLAUDE.md and README.md name the pillars at top level, and the relations graph that pillar-defining cards form is intact — each pillar has at least one card that operationalises it (executive interaction → 0026; self-learning → 0023, 0022; state-persistence → 0009, 0020; long-running R&D → 0006), and each `feeds` edge's reason text names the pillar served, so the graph is self-describing; without these wires the card describes intent but the framework does not surface it
  gate: true
specs:
- .orbit/specs/2026-05-08-four-pillars-wires.yaml
relations:
- card: 0026-executive-communication
  type: feeds
  reason: defines pillar 1 (executive interaction) — 0026 operationalises it via BLUF / Decision Brief discipline
- card: 0023-memory-loop
  type: feeds
  reason: defines pillar 2 (self-learning) — 0023 operationalises it via accreted memories surfaced at prime
- card: 0022-skill-curator
  type: feeds
  reason: defines pillar 2 (self-learning) — 0022 operationalises it via promotion of recurring procedures to skills
- card: 0009-mission-resilience
  type: feeds
  reason: defines pillar 3 (state-persistence) — 0009 operationalises it via spec contract + notes.jsonl keeping drives anchored through disruption
- card: 0020-orbit-state
  type: feeds
  reason: defines pillar 3 (state-persistence) — 0020 is the substrate (cards / specs / tasks / memories / decisions) agents serve from
- card: 0006-rally
  type: feeds
  reason: defines pillar 4 (long-running R&D) — 0006 operationalises it via fan-out across drives
references:
- 'historical: 2026-05-08 distillation memo (four-pillars) — deleted after promotion per orbit convention; original distillation captured the four pillars verbatim from author framing, with the audit-existing-cards path'
