id: 0019-tabletop
feature: Tabletop — front-loaded thinking before specs are written
as_a: orbit user
i_want: a structured session that extracts values, articulates trade-offs, walks lateral scenarios, and pre-commits halt conditions and escalation triggers — across one card or many — before any spec or implementation is drafted
so_that: drives run aligned with the work's actual goal; wrong-track R&D is caught upstream; the agent has pre-committed answers for predictable forks instead of asking me mid-flight; cross-cutting work gets cross-cutting alignment in one session rather than N redundant ones
goal: tabletop is goal-scoped (taking one or more cards or a goal string as input), produces specs whose cards array links to one or more cards each, and saves many hours of correctly-aligned downstream work — wrong-track R&D drops to near-zero on substantive work
maturity: planned
scenarios:
- name: Tabletop is goal-scoped, taking one or more cards as input
  given: a goal that touches one or more cards (a single capability, or a cluster of related capabilities)
  when: I open a tabletop session
  then: the session covers all the input cards' alignment in one pass; output specs each link to one or more cards via a cards array; advancing a spec advances each linked card's maturity
  gate: true
- name: Tabletop produces aligned specs from the right questions
  given: one or more cards with work to advance
  when: I open a tabletop session
  then: the agent walks the right questions (goal, value, simplest way, what could go wrong, lateral approaches, success criteria, escalations, adjacent code, budget, kill conditions); the output is one or more specs each carrying a pre-flight contract
  gate: true
- name: Multi-card tabletop spans related capabilities
  given: multiple cards that share a goal or subsystem (e.g., orbit-state plus tasks plus the .orbit/ layout)
  when: a single tabletop session is opened with the cluster
  then: alignment is settled across all cards in one pass; cross-card trade-offs surface explicitly; specs may advance multiple cards' maturity at once
  gate: true
- name: Goal-scoped tabletop infers cards from the goal
  given: a goal string ("ship orbit-state v0.1") with no card list
  when: tabletop opens
  then: the agent identifies which cards the goal touches and offers them as the tabletop's scope; I approve or modify the inferred set before alignment work begins
  gate: false
- name: Tabletop output is the contract, not the solution
  given: a tabletop session producing one or more specs
  when: the output is written
  then: each spec captures values plus trade-offs plus halt conditions plus escalation triggers plus acceptance criteria — and explicitly does NOT capture the implementation approach
  gate: true
- name: Specs link to one or more cards via the cards array
  given: a tabletop producing specs
  when: each spec is written
  then: the spec's cards field is a list — single-card specs have one entry, cross-cutting specs have multiple; the spec's contract advances each linked card by its own AC contribution
  gate: false
- name: Real scenarios preferred over imagined ones
  given: cards that have had prior specs
  when: scenarios are walked
  then: the session reaches for past run-logs as scenario sources before resorting to imagined ones; imagined scenarios are explicitly flagged
  gate: false
- name: Halt conditions are pre-committed with revert paths
  given: the kill-conditions step
  when: halt switches are enumerated
  then: each halt condition names a measurable trigger and a revert path — "drop below X" not "things go wrong"; "halt and reassess" not just "halt"
  gate: false
- name: Escalation triggers are narrow and actionable
  given: the escalations step
  when: triggers are enumerated
  then: each trigger names the condition, the state snapshot to surface to me, and a proposed action — "ask Hugh if confused" is rejected as non-actionable
  gate: false
- name: Trivial work skips tabletop
  given: a typo fix or single-line change
  when: I open the work
  then: tabletop is not invoked; a direct spec captures the work; tabletop is reserved for substantive R&D where alignment cost would otherwise compound
  gate: false
- name: Hot-wash debrief catches meta-observations
  given: the session is closing
  when: the contract is being written
  then: a brief hot-wash captures what kept coming up and what was unclear — fresh, before formal write-up sanitises the signal
  gate: false
specs: []
relations:
- card: 0010-objective-functions
  type: depends-on
  reason: tabletop's goal-narrowing question requires a measurable objective function as the anchor
- card: 0009-mission-resilience
  type: feeds
  reason: tabletop's halt-condition output is the mission-resilience pre-flight artefact — drives consume it
- card: 0006-rally
  type: feeds
  reason: tabletop's specs are what rallies orchestrate — including specs that span multiple cards
references:
- '.orbit/choices/0017-tabletop-output-is-contract.md: load-bearing rule that prevents the v1 design failure mode'
- '.orbit/cards/0026-executive-communication.yaml: governs closing-recommendation prose inside tabletop; see notes above for the overlap'
- '.orbit/archive/specs/2026-05-07-orbit-state-v0.1/tabletop.md: first multi-card tabletop run — methodology dogfood'
- '.orbit/memos/2026-05-06-tabletop-the-killer-feature.md (consumed): distillation source — ten right questions and the contract-not-solution rule'
notes:
- |
  Relationship to card 0026 (executive-communication): tabletop is a collaborative working format; 0026 is a deliverable communication format. Inside a tabletop, 0026 applies to closing recommendations and summaries (BLUF-led, imperative, capped reasoning). Opening questions, scenario walks, and lateral-approach naming legitimately diverge from 0026's "menu-presenting" anti-pattern — naming alternatives is what tabletop is for. Without this note, the two cards silently conflict and agents pick whichever they remember.
- |
  Tool support: AskUserQuestion suits the closing picks inside a tabletop (option-selection, ambiguity-resolution, halt-trigger confirmation) but foreclosed creative reframes when used on opening questions. The hybrid pattern is "prose opens, AUQ closes" — keep prose where free-form pushback is the value, switch to AUQ once the fork is genuinely discrete. Surfaced during the 2026-05-07 orbit-state v0.1 tabletop.
