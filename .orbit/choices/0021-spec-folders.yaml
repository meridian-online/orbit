id: '0021'
title: Spec layout reverts to per-spec folders
status: accepted
date_created: 2026-05-10
date_modified: 2026-05-10
body: |
  # 0021. Spec layout reverts to per-spec folders

  ## Context and Problem Statement

  The 2026-05-09 sidecar-layout migration (spec `2026-05-09-drive-rally-sidecar-layout`, card 0005-drive + 0006-rally) moved per-spec artefacts from the bd-era folder layout into a flat sidecar layout under `.orbit/specs/`. Each spec is now a yaml plus sibling files sharing the spec id as a prefix:

  ```
  .orbit/specs/2026-05-09-drive-rally-sidecar-layout.yaml
  .orbit/specs/2026-05-09-drive-rally-sidecar-layout.drive.yaml
  .orbit/specs/2026-05-09-drive-rally-sidecar-layout.notes.jsonl
  .orbit/specs/2026-05-09-drive-rally-sidecar-layout.review-spec-2026-05-09.md
  .orbit/specs/2026-05-09-drive-rally-sidecar-layout.review-spec-2026-05-09-v2.md
  .orbit/specs/2026-05-09-drive-rally-sidecar-layout.review-spec-2026-05-09-v3.md
  .orbit/specs/2026-05-09-drive-rally-sidecar-layout.review-pr-2026-05-09.md
  ```

  Live state: `ls .orbit/specs/` returns ~53 entries (24 bd-era folders left as historical, plus ~29 flat files for newer specs and their sidecars). The flat layout's stated rationale was uniformity ("the entire substrate uses one flat layout consistently"). The cost is visual noise: a single review-heavy spec produces 7+ entries at the same level as the spec itself, with nothing visually grouping them.

  Author feedback in the 2026-05-10 design session: *"Really, it's looking messy now."* The cost was underweighted at migration time.

  Three discrimination signals favour folders over flat-with-sidecars:

  1. **`ls` cleanliness.** One folder per spec is the minimum viable directory listing. Flat-with-sidecars multiplies entries by the number of sidecar types in use.
  2. **Atomic ops.** Renaming a spec id is `mv <old-id> <new-id>` for a folder; for flat it is "rename the yaml plus every sidecar matching the prefix" — an N-step op that can partially fail.
  3. **Prefix-collision risk.** Flat layout has a latent issue: ids that prefix each other (`2026-05-09-foo` vs `2026-05-09-foo-bar`) make sidecar ownership ambiguous in principle. Folders eliminate it by construction.

  The argument for the flat layout was substrate uniformity — cards, choices, memories are flat directories of yamls; specs being folder-per-row breaks the symmetry. That argument is real but small: at the time of this decision, `memos/` was already nested under `cards/` — the "everything flat" mental model was not load-bearing even then.

  ## Considered Options

  - **A. Status quo — keep flat sidecars.** Pro: the recent migration is fresh, undoing it costs churn; the dotless-stem scanner filter is simple. Con: the messiness is real and accretes — every new sidecar type (e.g. `.tasks.jsonl`, `.interview.md`) multiplies the listing further; spec rename / delete is multi-op; prefix collision is latent.

  - **B. Hybrid — spec at `<id>.yaml`, sidecars under `<id>/`.** Pro: `ls .orbit/specs/` shows one yaml per spec; preserves "spec id is the file path" lookup. Con: spec rename is two ops (`mv <id>.yaml <new>.yaml` + `mv <id>/ <new>/`); two distinct shapes for related-to-spec artefacts is itself a smell; co-located backup-via-folder pattern is forfeited.

  - **C. Pure folders — `.orbit/specs/<id>/spec.yaml` plus sidecars in the same folder.** Pro: cleanest `ls`; atomic rename / delete / archive; no prefix collision; restores the bd-era pattern that ran for many sessions without complaint. Con: substrate uniformity asymmetry (specs are folders, cards/choices/memories are flat); scanner gains one descend step; spec id no longer maps to a single file path.

  - **D. SQLite-canonical — push spec body and sidecars into the index DB.** Pro: zero directory noise; queryable. Con: violates choice 0015's files-canonical commitment; loses git-trackability of review prose and drive state; loses portability — fresh checkout has no state without rebuilding; reviews-as-files were the explicit substrate for cold-fork review per AC-13 of choice 0013.

  ## Decision Outcome

  Chosen option: **C — pure folders.**

  The layout becomes:

  ```
  .orbit/specs/<id>/
    spec.yaml                       (the spec itself, canonical)
    drive.yaml                      (drive sidecar, when applicable)
    rally.yaml                      (rally sidecar, when applicable)
    notes.jsonl                     (append-only notes)
    tasks.jsonl                     (task event stream)
    review-spec-<date>.md           (review artefact, optionally cycle-suffixed -v2 / -v3)
    review-pr-<date>.md             (PR review artefact)
    interview.md                    (design interview, when applicable)
  ```

  Treatment of the recent flat-sidecar migration: **supersession, not failure.** The sidecar migration shipped a real piece of work — it decoupled spec id from path shape, taught the scanner to filter by stem, and exercised the substrate-binary parity gate. None of that is wasted. Choice 0021 reverts only the *file shape*, not those underlying gains.

  Rationale for folders over hybrid:

  - The hybrid keeps two distinct shapes for things that are conceptually one spec's artefacts. That's optimising for a property (one-row-per-spec in `ls`) that pure folders deliver more cleanly anyway.
  - Atomic rename / delete is the more important operational property. Drive and rally fork specs frequently; spec lifecycle ops should be one syscall.
  - A substrate-uniformity asymmetry already existed at decision time (`memos/` was nested under `cards/`). Adding `specs/<id>/` is not a new break.

  ### Migration plan (out of scope for this choice — drives a follow-up spec)

  1. Scanner update in `orbit-state/crates/core/src/layout.rs`: `list_spec_files()` returns `<id>/spec.yaml` per folder under `specs_dir()`. Old flat `<id>.yaml` files are no longer recognised as canonical.
  2. One-shot migration verb (`orbit spec migrate-layout` or similar): for each `.orbit/specs/<id>.yaml` plus its prefix-matched sidecars, create `.orbit/specs/<id>/` and move the files in (renaming `<id>.yaml` → `<id>/spec.yaml`, `<id>.drive.yaml` → `<id>/drive.yaml`, `<id>.review-spec-<date>.md` → `<id>/review-spec-<date>.md`, etc.). Idempotent; safe to re-run.
  3. SKILL.md edits to /orb:drive, /orb:rally, /orb:review-spec, /orb:review-pr: every cited path reverts from sidecar to folder form. Mirror of the recent migration, in the opposite direction.
  4. `.orbit/conventions/spec-layout.md` rewritten to document the folder shape as canonical; flat sidecar layout named as the prior experiment.
  5. `.orbit/METHOD.md` vocabulary table updated to folder paths.
  6. The 24 bd-era historical folders are already in folder shape — they pre-existed. The migration only converts the post-2026-05-08 flat specs.
  7. Smoke test: after migration, `orbit spec list`, `orbit verify`, and `/orb:drive` resumption all work against the new layout.

  ### Out of scope

  - Whether sidecars should themselves be SQLite-backed (drive/rally state, notes/tasks streams). That is a separate question (option D variant). Files stay canonical for now per choice 0015.
  - Renaming the bd-era historical folders (none required — they already use the target shape).
  - Schema changes to spec.yaml itself.

  ## Consequences

  - The recent sidecar-layout migration (spec `2026-05-09-drive-rally-sidecar-layout`) is superseded for the file-shape decision but retains its scanner-filter and substrate-binary-parity work. The shipped choice it implicitly carried ("flat over folder") is overturned by this choice.
  - Choice 0015 (files-canonical) is unaffected — files remain the truth, just organised differently.
  - Future skills that produce per-spec artefacts default to writing inside `.orbit/specs/<id>/` rather than as siblings prefixed by id.
  - The dotless-stem filter in `list_yaml_files` is no longer load-bearing for spec discovery (specs aren't yamls directly under `specs/` any more) but is harmless and may stay as a defensive filter.
  - Substrate uniformity is partially broken (specs differ from cards/choices/memories). Documented and accepted; the asymmetry is bounded to one entity type.
