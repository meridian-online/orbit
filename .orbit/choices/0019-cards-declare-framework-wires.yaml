id: '0019'
title: Cards declare framework wires in scenarios; aspirational cards don't pass review
status: accepted
date_created: 2026-05-08
date_modified: 2026-05-08
body: |
  # 0019. Cards declare framework wires in scenarios; aspirational cards don't pass review

  ## Context and Problem Statement

  Cards in `.orbit/cards/` describe capabilities the framework should produce, but until 2026-05-08 there was no discipline requiring cards to name how their contract is enforced. Card 0026 (executive-communication) is the canonical example — a full BLUF / Decision Brief contract specified, zero references in any skill prompt, hook, or CLAUDE.md preamble. Repo-wide search for BLUF / TL;DR / decision brief returns no hits outside the card itself. The discipline runs only when an agent happens to read the card.

  Without an explicit rule, every new card defaults to aspirational. The card describes the desired behaviour; the behaviour does not happen, because nothing in the framework's context-loading, skill prompts, hooks, or audits encodes it.

  ## Considered Options

  - **A. No discipline.** Cards continue to describe intent without declaring enforcement; agents apply contracts only when they happen to read the relevant card. Re-introduces the failure 0026 demonstrates: contract specified, contract not delivered, gap invisible.
  - **B. Soft guidance ("name your wires when you can").** Captures intent but does not prevent drift; cards still default to aspirational. The same failure as A, slower.
  - **C. Hard rule, schema-level.** Add a top-level `wires:` array to the card schema; every card lists its enforcement points there. Adds a parallel structure to the existing `specs:` array, which already references the work that built the card. Duplicates the diagnostic without adding signal.
  - **D. Hard rule, scenario-level, audited via existing fields.** Every card with planned enforcement carries an explicit "Wired into the framework" gate scenario naming the expected enforcement points. The card's existing `specs:` array is ground truth for whether the wires are live. `/orb:audit` flags `maturity: planned` cards with `specs: []` — aspirational by the existing data model.

  ## Decision Outcome

  Chosen option: **D — hard rule, scenario-level, audited via existing fields.**

  Cards already carry a `specs:` array (card 0004 treats it as load-bearing). An empty `specs:` on a `maturity: planned` card is the diagnostic: the capability is described but no work has shipped to wire it. No new schema field is needed; no parallel `wires:` array is introduced.

  A **wire** is a concrete enforcement point. The set is small and finite — useful as a design heuristic when authoring the gate scenario:

  - CLAUDE.md preamble (loaded into every agent's context)
  - Skill prompt citation (the SKILL.md tells the agent to apply the card's contract)
  - Substrate schema field (the substrate refuses cards that don't conform)
  - SessionStart or PreToolUse hook (the harness enforces it before the agent acts)
  - `/orb:audit` column (the audit flags drift)
  - Test or CI check (the build enforces it)

  Wires live in the card's `scenarios:` array as a "Wired into the framework" gate scenario. The scenario expresses the author's wiring expectation; the spec referenced from `specs:` is responsible for delivering it. The implementing spec's ACs name the enforcement points and `/orb:review-pr` checks them.

  Three different concerns, three different fields — do not merge:

  - `scenarios:` — behavioural expectations (including "Wired into the framework")
  - `specs:` — references to the work that built (or is building) the card
  - `relations:` — graph edges to other cards

  Wires are **not a substitute for specs**. Naming the wire in a scenario is the *contract* for the implementing spec. A card with a wiring scenario but `specs: []` is aspirational; the audit flags it.

  `/orb:audit` gains one column: `maturity: planned` AND `specs: []` → aspirational, flagged. No schema migration required; uses fields that already exist.

  Hidden dependency on agent reading is **not a wire**. A wire that depends on "the agent reads card 0026 before responding" is a hope, not a wire. Real wires are loaded into context regardless of what the agent reads, or run by the substrate without the agent's involvement.

  ### Consequences

  - Good, because aspirational cards are caught at review time rather than discovered six months later when an agent isn't applying their contract.
  - Good, because each card carries its own "how is this enforced" narrative in scenarios, removing the need to scan the codebase to find out.
  - Good, because cards force a question at distill time that is otherwise easy to defer indefinitely: "how would the framework produce this?"
  - Good, because the rule operationalises pillar 3 (state-persistence): contracts live in the substrate (specs that ship code), not in the agent's optional reading list.
  - Good, because no new schema field is introduced — the diagnostic uses `specs:` and `maturity:` which already exist, so 0030's canonical-schema-and-glossary work is untouched by this choice.
  - Bad, because some cards genuinely describe capabilities the framework can't yet enforce (early `planned` cards) — they will sit with `specs: []` until specs are written. The audit must distinguish "planned and not yet specced" from "planned and specs queued"; `specs:` cardinality and spec status are the distinction.
  - Bad, because new contributors face a higher bar to land a card — they must think through enforcement in scenarios, not just describe intent. This is intentional: the cost compounds the other way without the rule.
  - Neutral, because the wires vs relations vs specs distinction is a vocabulary item the schema-glossary card (0030) should capture in prose, without adding a new field.

  ## Related

  - 0004-specs-array-integrity — the `specs:` array is load-bearing; this choice depends on that
  - 0026-executive-communication — canonical example of the failure mode this choice prevents; carries a wiring scenario; `specs: []` flags it as aspirational until a spec ships the BLUF wires
  - 0028-four-pillars — wiring scenario added; this choice operationalises pillar 3 (state-persistence) by moving contracts from agent-readable cards to substrate-enforced wires
  - 0030-canonical-schema-and-glossary — captures the vocabulary (wires, relations, specs) without adding a new field for wires
  - 0031-design-session-user-language — wiring scenario added; one of the first new cards distilled under this choice
